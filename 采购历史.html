<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>采购历史 - 记录管理</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            padding-bottom: 30px;
        }
        .header-bar {
            position: sticky;
            top: 0;
            z-index: 110;
            backdrop-filter: blur(24px);
            background: rgba(30, 22, 14, 0.7);
            border-bottom: 1px solid rgba(255, 160, 70, 0.6);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: rgba(255, 200, 140, 0.2);
            border: 1px solid rgba(255, 150, 60, 0.7);
            color: #ffc285;
            font-size: 26px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header-title {
            flex: 1;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcd94, #ffa044);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .add-record-btn {
            background: linear-gradient(120deg, #f9732e, #e05a1a);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .history-list {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .history-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 245, 230, 0.2);
            border: 1px solid rgba(255, 170, 80, 0.6);
            border-radius: 32px;
            padding: 16px;
            transition: all 0.2s;
        }
        .history-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 245, 230, 0.3);
            border-color: rgba(255, 150, 70, 0.9);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px dashed rgba(255, 180, 100, 0.4);
            padding-bottom: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .date {
            font-size: 18px;
            font-weight: bold;
            color: #ffd8a8;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .edit-btn, .delete-btn, .copy-btn {
            background: rgba(255, 200, 140, 0.2);
            border: 1px solid rgba(255, 150, 60, 0.7);
            color: #ffc285;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .edit-btn:hover, .delete-btn:hover, .copy-btn:hover {
            background: rgba(255, 140, 50, 0.45);
            border-color: #ffaa66;
        }
        .summary {
            display: flex;
            justify-content: flex-start;
            margin: 12px 0;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 28px;
        }
        .summary span {
            color: #ffcf8e;
        }
        .detail-btn {
            background: rgba(255, 140, 50, 0.3);
            border: none;
            color: #ffcf94;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }
        .detail-btn:hover {
            background: rgba(255, 140, 50, 0.6);
        }
        .items-detail {
            display: none;
            margin-top: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .items-detail.show {
            display: block;
        }
        .items-detail p {
            color: #ffebc2;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,160,70,0.3);
        }
        .empty-msg {
            text-align: center;
            color: #ffcf94;
            padding: 40px;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: #ffcf94;
            padding: 40px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: rgba(30, 22, 14, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            width: 95%;
            max-width: 550px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #ffac62;
            color: #ffefcf;
        }
        .modal-content h3 {
            margin-bottom: 16px;
            color: #ffb45e;
        }
        .item-row-editor {
            background: rgba(255,245,230,0.1);
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .item-row-editor input {
            flex: 1;
            min-width: 80px;
            background: rgba(255,250,235,0.8);
            border: 1px solid #ffac62;
            padding: 6px 10px;
            border-radius: 28px;
            font-size: 14px;
            color: #5a3412;
        }
        .item-row-editor input[type="number"] {
            width: 100px;
        }
        .remove-item-btn {
            background: rgba(255,80,50,0.6);
            border: none;
            color: white;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
        }
        .add-item-btn {
            background: rgba(255,140,50,0.5);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin: 8px 0;
        }
        .save-modal-btn {
            background: linear-gradient(100deg, #fa6928, #cf5016);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 44px;
            font-weight: bold;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
        }
        .close-modal {
            background: rgba(200,200,200,0.2);
            border: none;
            color: #ffcf94;
            padding: 8px;
            border-radius: 40px;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
        }
        .date-input {
            background: rgba(255,250,235,0.8);
            border: 1px solid #ffac62;
            padding: 8px 12px;
            border-radius: 32px;
            width: 100%;
            margin-bottom: 16px;
            color: #5a3412;
        }
    </style>
</head>
<body>
<div class="header-bar">
    <a href="16.36.html" class="back-btn">←</a>
    <div class="header-title">📜 采购历史</div>
    <button class="add-record-btn" onclick="openAddModal()">+ 添加记录</button>
</div>
<div class="history-list" id="historyList">
    <div class="loading">加载历史记录中...</div>
</div>

<div id="editorModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">编辑采购记录</h3>
        <input type="date" id="recordDate" class="date-input">
        <div id="itemsContainer"></div>
        <button class="add-item-btn" onclick="addItemRow()">+ 添加采购项</button>
        <button class="save-modal-btn" id="saveModalBtn">保存修改</button>
        <button class="close-modal" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log("Firebase 初始化成功");
    } catch (e) {
        console.error("Firebase 初始化失败", e);
        document.getElementById('historyList').innerHTML = '<div class="empty-msg">Firebase 初始化失败，请检查网络或配置</div>';
    }

    const HISTORY_COLLECTION = "purchase_history";
    let currentEditGroup = null;
    let currentItems = [];

    function formatNumber(num) {
        if (num === undefined || num === null || isNaN(num)) return "0";
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function extractPreferredLanguage(text) {
        if (!text) return '';
        const chineseMatch = text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]+/g);
        if (chineseMatch) {
            return chineseMatch.join('');
        }
        return text;
    }

    async function loadAndGroupHistory() {
        const container = document.getElementById('historyList');
        if (!db) return;
        container.innerHTML = '<div class="loading">加载历史记录中...</div>';
        try {
            const snapshot = await db.collection(HISTORY_COLLECTION).orderBy('timestamp', 'desc').get();
            console.log("获取到记录数:", snapshot.size);
            const records = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                records.push({
                    id: doc.id,
                    dateStr: data.dateStr || '未知日期',
                    totalCost: data.totalCost || 0,
                    purchasedItems: data.purchasedItems || []
                });
            });
            
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-msg">暂无采购历史，请先提交采购单或手动添加</div>';
                return;
            }
            
            const groupMap = new Map();
            for (const record of records) {
                const date = record.dateStr;
                if (!groupMap.has(date)) {
                    groupMap.set(date, {
                        dateStr: date,
                        purchasedItems: [],
                        totalCost: 0,
                        recordIds: []
                    });
                }
                const group = groupMap.get(date);
                group.purchasedItems.push(...record.purchasedItems);
                group.totalCost += record.totalCost;
                group.recordIds.push(record.id);
            }
            const grouped = Array.from(groupMap.values());
            grouped.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            renderGroupedHistory(grouped);
        } catch (err) {
            console.error("加载历史失败", err);
            container.innerHTML = `<div class="empty-msg">加载失败：${err.message || '请检查网络或Firebase权限'}</div>`;
        }
    }

    function renderGroupedHistory(groups) {
        const container = document.getElementById('historyList');
        if (!groups.length) {
            container.innerHTML = '<div class="empty-msg">暂无采购历史，请先提交采购单或手动添加</div>';
            return;
        }
        container.innerHTML = '';
        groups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="date">📅 ${group.dateStr}</div>
                    <div class="actions">
                        <button class="copy-btn" data-date="${group.dateStr}">📋 复制</button>
                        <button class="edit-btn" data-date="${group.dateStr}">✏️ 编辑</button>
                        <button class="delete-btn" data-date="${group.dateStr}">🗑️ 删除</button>
                    </div>
                </div>
                <div class="summary">
                    <span>💰 总支出: ${formatNumber(group.totalCost)} Ks</span>
                </div>
                <button class="detail-btn" data-date="${group.dateStr}">📋 查看详细清单</button>
                <div class="items-detail" id="detail-${group.dateStr.replace(/-/g, '')}">
                    ${group.purchasedItems.map(item => {
                        const unitText = item.unit ? ` ${item.unit}` : '';
                        return `<p>✅ ${item.name} (x${item.qty}${unitText}) : ${formatNumber(item.price * item.qty)} Ks</p>`;
                    }).join('')}
                </div>
            `;
            container.appendChild(card);
        });

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const date = btn.getAttribute('data-date');
                const group = groups.find(g => g.dateStr === date);
                if (group) copyGroupToClipboard(group);
            });
        });
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const date = btn.getAttribute('data-date');
                const group = groups.find(g => g.dateStr === date);
                if (group) await openEditGroupModal(group);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const date = btn.getAttribute('data-date');
                const group = groups.find(g => g.dateStr === date);
                if (group && confirm(`确定要删除 ${date} 的所有采购记录吗？`)) {
                    try {
                        const snapshot = await db.collection(HISTORY_COLLECTION).where("dateStr", "==", date).get();
                        const batch = db.batch();
                        snapshot.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                        loadAndGroupHistory();
                    } catch (err) {
                        alert('删除失败：' + err.message);
                    }
                }
            });
        });
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const date = btn.getAttribute('data-date');
                const detailId = `detail-${date.replace(/-/g, '')}`;
                const detailDiv = document.getElementById(detailId);
                if (detailDiv) {
                    detailDiv.classList.toggle('show');
                    btn.textContent = detailDiv.classList.contains('show') ? '🔽 收起清单' : '📋 查看详细清单';
                }
            });
        });
    }

    function copyGroupToClipboard(group) {
        let text = `📅 日期: ${group.dateStr}\n📋 采购清单\n----------------------\n`;
        let totalCost = 0;
        group.purchasedItems.forEach(item => {
            const price = item.price || 0;
            const qty = item.qty || 1;
            const cost = price * qty;
            totalCost += cost;
            const unitText = item.unit ? ` ${item.unit}` : '';
            const displayName = extractPreferredLanguage(item.name);
            text += `✅ ${displayName} (x${qty}${unitText}) : ${formatNumber(cost)} Ks\n`;
        });
        text += `----------------------\n💰 总计支出: ${formatNumber(totalCost)} Ks`;
        navigator.clipboard.writeText(text).then(() => {
            alert("已复制该日期的采购清单！");
        }).catch(() => {
            alert("复制失败，可手动复制");
        });
    }

    async function openEditGroupModal(group) {
        currentEditGroup = group;
        document.getElementById('modalTitle').innerText = '编辑采购记录（合并当天所有）';
        document.getElementById('recordDate').value = group.dateStr;
        currentItems = group.purchasedItems.map(item => ({
            name: item.name,
            qty: item.qty,
            price: item.price,
            unit: item.unit || ''
        }));
        renderItemsEditor();
        document.getElementById('editorModal').classList.add('open');
    }

    function openAddModal() {
        currentEditGroup = null;
        document.getElementById('modalTitle').innerText = '添加采购记录';
        const today = new Date().toISOString().slice(0,10);
        document.getElementById('recordDate').value = today;
        currentItems = [];
        renderItemsEditor();
        document.getElementById('editorModal').classList.add('open');
    }

    function renderItemsEditor() {
        const container = document.getElementById('itemsContainer');
        if (!container) return;
        container.innerHTML = '';
        if (currentItems.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#ffcf94;">暂无采购项，点击下方按钮添加</p>';
        }
        currentItems.forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = 'item-row-editor';
            row.innerHTML = `
                <input type="text" placeholder="品名" value="${escapeHtml(item.name)}" data-index="${idx}" data-field="name" style="flex:2;">
                <input type="number" placeholder="数量" value="${item.qty}" data-index="${idx}" data-field="qty" style="width:90px;">
                <input type="text" placeholder="单位 (箱/斤)" value="${escapeHtml(item.unit)}" data-index="${idx}" data-field="unit" style="width:100px;">
                <input type="number" placeholder="单价(Ks)" value="${item.price}" data-index="${idx}" data-field="price" style="width:110px;">
                <button class="remove-item-btn" data-index="${idx}">删除</button>
            `;
            container.appendChild(row);
        });

        document.querySelectorAll('#itemsContainer input').forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(input.getAttribute('data-index'));
                const field = input.getAttribute('data-field');
                if (field === 'name') currentItems[idx].name = input.value;
                else if (field === 'qty') currentItems[idx].qty = parseInt(input.value) || 0;
                else if (field === 'unit') currentItems[idx].unit = input.value;
                else if (field === 'price') currentItems[idx].price = parseFloat(input.value) || 0;
            });
        });
        document.querySelectorAll('#itemsContainer .remove-item-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                currentItems.splice(idx, 1);
                renderItemsEditor();
            });
        });
    }

    function addItemRow() {
        currentItems.push({ name: '新商品', qty: 1, price: 0, unit: '' });
        renderItemsEditor();
    }

    // 修复后的保存函数：按日期彻底删除原记录，再新增
    async function saveModalChanges() {
        const dateStr = document.getElementById('recordDate').value;
        if (!dateStr) {
            alert('请选择日期');
            return;
        }
        const validItems = currentItems.filter(item => item.name.trim() !== '' && item.qty > 0);
        if (validItems.length === 0) {
            alert('请至少添加一个有效的采购项');
            return;
        }
        const totalCost = validItems.reduce((sum, item) => sum + (item.qty * item.price), 0);
        const recordData = {
            dateStr: dateStr,
            totalCost: totalCost,
            purchasedItems: validItems,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            if (currentEditGroup) {
                // 获取原日期
                const originalDate = currentEditGroup.dateStr;
                // 删除原日期下的所有记录（不管是否在分组中，彻底删除）
                const originalSnapshot = await db.collection(HISTORY_COLLECTION).where("dateStr", "==", originalDate).get();
                const batch = db.batch();
                originalSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                
                // 如果新日期与原日期不同，还需删除新日期下的所有记录（否则会与新增的记录重复合并）
                if (originalDate !== dateStr) {
                    const newSnapshot = await db.collection(HISTORY_COLLECTION).where("dateStr", "==", dateStr).get();
                    const newBatch = db.batch();
                    newSnapshot.forEach(doc => newBatch.delete(doc.ref));
                    await newBatch.commit();
                }
                // 添加新记录
                await db.collection(HISTORY_COLLECTION).add(recordData);
            } else {
                // 新增记录：直接添加（不删除任何现有记录，符合预期）
                await db.collection(HISTORY_COLLECTION).add(recordData);
            }
            closeModal();
            loadAndGroupHistory();
        } catch (err) {
            console.error("保存失败", err);
            alert('保存失败：' + err.message);
        }
    }

    function closeModal() {
        document.getElementById('editorModal').classList.remove('open');
        currentEditGroup = null;
        currentItems = [];
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('saveModalBtn').addEventListener('click', saveModalChanges);
    
    if (db) {
        loadAndGroupHistory();
    }
</script>
</body>
</html>
