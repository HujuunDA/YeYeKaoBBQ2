<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>待结算订单 - 烧烤店明亮版</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 明亮深色渐变 + 光晕氛围 */
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            position: relative;
        }

        /* 暖色光晕层 */
        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -15%;
            width: 130%;
            height: 130%;
            background: radial-gradient(ellipse at 40% 50%, rgba(255, 160, 70, 0.25), rgba(255, 100, 30, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -15%;
            right: -10%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 85%, rgba(255, 140, 50, 0.22), transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .admin-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* 头部导航 - 玻璃质感 */
        .admin-header {
            background: rgba(30, 22, 14, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 160, 70, 0.5);
            padding-top: calc(12px + env(safe-area-inset-top));
        }

        .btn-back {
            background: rgba(255, 200, 140, 0.25);
            border: 1px solid rgba(255, 150, 60, 0.7);
            color: #ffd7a5;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 22px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-back:active {
            transform: scale(0.96);
            background: rgba(255, 140, 50, 0.45);
        }

        .admin-header > div:last-child {
            text-align: right;
        }

        .admin-header div div:first-child {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcd94, #ffa044);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        #online-status {
            font-size: 10px;
            color: #4ade80;
            font-weight: 600;
            margin-top: 2px;
        }

        /* 订单列表网格 */
        .order-list {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        @media (max-width: 450px) {
            .order-list {
                padding: 12px;
                gap: 12px;
            }
        }

        /* 订单卡片 - 玻璃质感圆润 */
        .order-card {
            background: rgba(35, 26, 18, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 18px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            margin-bottom: 0;
        }

        .order-card:hover {
            transform: translateY(-4px);
            background: rgba(45, 34, 24, 0.85);
            border-color: rgba(255, 150, 70, 0.9);
            box-shadow: 0 16px 28px -8px rgba(0, 0, 0, 0.3);
        }

        /* 桌号标签 */
        .table-label {
            background: linear-gradient(105deg, rgba(255, 120, 40, 0.9), rgba(220, 80, 20, 0.9));
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 14px;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(255, 100, 0, 0.2);
        }

        /* 订单包装器 */
        .orders-wrapper {
            position: relative;
            max-height: 200px;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .orders-wrapper.expanded {
            max-height: 5000px;
        }

        .fade-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to top, rgba(35, 26, 18, 0.9), rgba(35, 26, 18, 0));
            pointer-events: none;
            z-index: 2;
            border-radius: 0 0 24px 24px;
        }

        .expanded .fade-overlay {
            display: none;
        }

        /* 子订单区块 */
        .sub-order {
            border-left: 3px solid #ffaa55;
            padding-left: 12px;
            margin-bottom: 14px;
            background: rgba(255, 245, 230, 0.08);
            border-radius: 0 16px 16px 0;
            padding: 10px 12px;
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .order-tag {
            font-size: 10px;
            background: rgba(255, 140, 50, 0.35);
            color: #ffcd94;
            padding: 3px 10px;
            border-radius: 40px;
            font-weight: 700;
        }

        .order-time {
            color: #d4aa77;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 500;
        }

        .device-tag {
            font-size: 10px;
            color: #b47c44;
            margin-left: 8px;
            font-style: italic;
        }

        .btn-cancel-small {
            color: #ffaa88;
            font-size: 12px;
            cursor: pointer;
            font-weight: 700;
            padding: 4px 10px;
            background: rgba(200, 60, 30, 0.3);
            border-radius: 40px;
            transition: 0.15s;
        }

        .btn-cancel-small:active {
            transform: scale(0.94);
            background: rgba(220, 60, 30, 0.5);
        }

        .food-item {
            color: #ffefcf;
            font-size: 14px;
            font-weight: 600;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
        }

        .item-price-tag {
            color: #d4aa77;
            font-size: 12px;
            font-weight: 500;
        }

        .remark-box {
            background: rgba(255, 140, 50, 0.25);
            border-radius: 20px;
            padding: 5px 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #ffcd94;
            display: inline-block;
            border: 1px solid rgba(255, 160, 70, 0.4);
        }

        .toggle-btn {
            text-align: center;
            color: #ffcd94;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 0;
            cursor: pointer;
            border-top: 1px solid rgba(255, 180, 100, 0.3);
            margin: 12px 0 8px;
            transition: 0.15s;
        }

        .toggle-btn:active {
            transform: scale(0.98);
            color: #ffaa55;
        }

        /* 结算输入区 */
        .settle-inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .mini-input {
            border: 1px solid rgba(255, 150, 60, 0.6);
            border-radius: 40px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 250, 240, 0.9);
            color: #4a2a10;
            font-weight: 500;
            -webkit-appearance: none;
        }

        .mini-input:focus {
            border-color: #ff8c42;
            box-shadow: 0 0 0 2px rgba(255, 120, 30, 0.2);
        }

        .disc-input {
            width: 85px;
            text-align: center;
            color: #e05a1a;
            font-weight: 700;
        }

        .disc-input::placeholder {
            color: #b47c44;
            font-weight: normal;
        }

        .note-input {
            flex: 1;
        }

        /* 支付行 */
        .pay-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 180, 100, 0.3);
            padding-top: 14px;
            margin-top: 4px;
        }

        .pay-methods {
            display: flex;
            background: rgba(45, 34, 24, 0.6);
            border-radius: 60px;
            padding: 4px;
            gap: 4px;
            border: 1px solid rgba(255, 150, 60, 0.3);
        }

        .method-btn {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 40px;
            font-size: 18px;
            transition: all 0.2s;
            background: transparent;
            color: #d4aa77;
        }

        .method-btn.active {
            background: linear-gradient(120deg, #f9732e, #e05a1a);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 100, 0, 0.3);
        }

        .method-btn:active {
            transform: scale(0.94);
        }

        .total-price {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffcd94, #ffa044);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .total-price::after {
            content: " Ks";
            font-size: 13px;
            font-weight: 600;
            background: none;
            -webkit-background-clip: unset;
            color: #d4aa77;
        }

        .btn-pay {
            background: linear-gradient(120deg, #16a34a, #15803d);
            color: white;
            padding: 10px 24px;
            border-radius: 48px;
            font-size: 15px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
        }

        .btn-pay:active {
            transform: scale(0.96);
        }

        #toast {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            color: #ffddbb;
            padding: 14px 32px;
            border-radius: 60px;
            z-index: 1000;
            font-weight: 700;
            border: 1px solid #ffaa55;
            white-space: nowrap;
        }

        .debug-panel {
            display: none;
        }
    </style>
</head>
<body>

<div id="toast">操作成功！</div>

<div class="admin-container">
    <div class="admin-header">
        <a href="index.html" class="btn-back">←</a>
        <div>
            <div>待结算订单</div>
            <div id="online-status">● 实时同步中</div>
        </div>
    </div>
    <div class="order-list" id="list-container">
        <div style="text-align:center; padding-top:100px; color:#d4aa77; grid-column: 1/-1;">正在加载云端数据...</div>
    </div>
</div>

<script>
    // ==================== 功能代码 100% 原样保留 ====================
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tablePayMethods = {};

    function showToast(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 1500);
    }

    function toggleOrder(btn) {
        const wrapper = btn.previousElementSibling;
        wrapper.classList.toggle('expanded');
        btn.innerText = wrapper.classList.contains('expanded') ? '收起订单 ▴' : '查看全部订单 ▾';
    }

    function updatePrice(tableNum, originalTotal) {
        const discount = Number(document.getElementById(`disc-${tableNum}`).value) || 0;
        const final = Math.max(0, originalTotal - discount);
        document.getElementById(`price-${tableNum}`).innerText = final.toLocaleString();
    }

    function setMethod(table, method, el) {
        tablePayMethods[table] = method;
        el.parentElement.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function getDeviceName() {
        const ua = navigator.userAgent;
        if (/iPhone/i.test(ua)) return "iPhone";
        if (/Macintosh/i.test(ua)) return "MacBook";
        return "其它设备";
    }

    async function deductStockFromInventory(orderItems, tableNum) {
        console.log("========== 开始扣减库存（静默模式）==========");
        console.log("订单商品列表:", JSON.stringify(orderItems, null, 2));
        
        const inventorySnapshot = await db.collection("inventory").get();
        
        if (inventorySnapshot.empty) {
            console.log("❌ 库存集合为空！跳过扣减");
            return [];
        }
        
        const inventoryMap = new Map();
        
        inventorySnapshot.forEach(doc => {
            const data = doc.data();
            const productName = data.name || data.productName;
            if (productName) {
                inventoryMap.set(productName.trim().toLowerCase(), { 
                    id: doc.id, 
                    ...data, 
                    originalName: productName 
                });
                console.log(`📦 库存商品: "${productName}" (库存: ${data.stock} ${data.unit || ''})`);
            }
        });
        
        console.log(`共找到 ${inventoryMap.size} 个库存商品`);
        
        let successItems = [];
        
        for (let item of orderItems) {
            const itemName = item.name;
            const quantityToDeduct = Number(item.quantity) || 0;
            
            if (!itemName || quantityToDeduct <= 0) {
                continue;
            }
            
            console.log(`\n🔍 处理: "${itemName}", 数量: ${quantityToDeduct}`);
            
            let normalizedItemName = itemName.trim().toLowerCase();
            let inventoryItem = inventoryMap.get(normalizedItemName);
            
            if (!inventoryItem) {
                const cleanedName = normalizedItemName.replace(/[.,，。、!！?？]$/, '');
                if (cleanedName !== normalizedItemName) {
                    inventoryItem = inventoryMap.get(cleanedName);
                    if (inventoryItem) {
                        console.log(`✅ 模糊匹配成功: "${itemName}" → "${inventoryItem.originalName}"`);
                    }
                }
            }
            
            if (!inventoryItem) {
                console.log(`❌ 未找到商品: "${itemName}"，跳过扣减`);
                continue;
            }
            
            if (inventoryItem.stock < quantityToDeduct) {
                console.log(`⚠️ 商品“${itemName}”库存不足（现有 ${inventoryItem.stock}，需要 ${quantityToDeduct}），跳过扣减`);
                continue;
            }
            
            const newStock = inventoryItem.stock - quantityToDeduct;
            
            try {
                await db.collection("inventory").doc(inventoryItem.id).update({ stock: newStock });
                console.log(`✅ 扣减成功：${itemName} ${inventoryItem.stock} → ${newStock}`);
                
                successItems.push({
                    productId: inventoryItem.id,
                    productName: inventoryItem.originalName,
                    oldStock: inventoryItem.stock,
                    newStock: newStock,
                    quantity: quantityToDeduct,
                    unit: inventoryItem.unit || '个',
                    type: 'out',
                    tableNum: tableNum
                });
                
            } catch (err) {
                console.error(`❌ 更新失败: ${itemName}`, err);
            }
        }
        
        if (successItems.length > 0) {
            console.log(`\n📝 正在写入 ${successItems.length} 条库存历史记录...`);
            const historyBatch = db.batch();
            const nowStr = new Date().toLocaleString('zh-CN');
            
            for (let item of successItems) {
                const historyRef = db.collection("inventory_history").doc();
                const historyRecord = {
                    id: Date.now() + Math.floor(Math.random() * 10000),
                    timestamp: nowStr,
                    productName: item.productName,
                    productId: item.productId,
                    type: 'out',
                    quantity: item.quantity,
                    unit: item.unit,
                    oldStock: item.oldStock,
                    newStock: item.newStock,
                    source: 'pos-settlement',
                    tableNum: item.tableNum
                };
                historyBatch.set(historyRef, historyRecord);
                console.log(`   ✅ 历史记录: ${item.productName} 出库 ${item.quantity}${item.unit} (${item.oldStock} → ${item.newStock})`);
            }
            
            try {
                await historyBatch.commit();
                console.log("✅ 所有库存历史记录已成功写入 inventory_history 集合");
            } catch (histError) {
                console.error("❌ 写入历史记录失败:", histError);
            }
        } else {
            console.log("⚠️ 没有商品成功扣减，跳过历史记录写入");
        }
        
        console.log(`\n========== 扣减完成 ==========`);
        console.log(`成功扣减: ${successItems.length} 种商品`);
        
        return [];
    }

    async function confirmPay(tableNum, originalTotal) {
        const disc = Number(document.getElementById(`disc-${tableNum}`).value) || 0;
        const final = originalTotal - disc;
        const method = tablePayMethods[tableNum];
        const settleNote = document.getElementById(`note-${tableNum}`).value;
        const deviceName = localStorage.getItem('deviceName') || getDeviceName();

        if(!confirm(`#${tableNum}号桌 确认结算？\n\n实收: ${final.toLocaleString()} Ks\n方式: ${method}`)) return;

        try {
            const snap = await db.collection("pending_orders").where("table", "==", tableNum).get();
            const allItems = [];
            const ids = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (data.items && data.items.length > 0) {
                    allItems.push(...data.items);
                }
                ids.push(doc.id);
            });

            console.log("该桌所有商品明细:", allItems);

            await deductStockFromInventory(allItems, tableNum);

            await db.collection("orders").add({
                table: tableNum,
                total: final,
                discount: disc,
                paymentMethod: method,
                settleNote: settleNote,
                items: allItems,
                device: deviceName,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                type: "快速结算"
            });

            const batch = db.batch();
            ids.forEach(id => batch.delete(db.collection("pending_orders").doc(id)));
            await batch.commit();
            
            showToast(`✅ #${tableNum}号桌 结算成功！`);
        } catch (e) { 
            console.error("结算错误:", e);
            alert("结算失败: " + e.message); 
        }
    }

    async function deleteOrder(id) {
        if(confirm("确定取消吗？")) await db.collection("pending_orders").doc(id).delete();
    }

    function startListening() {
        db.collection("pending_orders").orderBy("timestamp", "asc").onSnapshot(snap => {
            const container = document.getElementById('list-container');
            const groups = {};
            snap.forEach(doc => {
                const d = doc.data(); d.docId = doc.id;
                if (!groups[d.table]) groups[d.table] = [];
                groups[d.table].push(d);
            });

            if (Object.keys(groups).length === 0) {
                container.innerHTML = '<div style="text-align:center; padding-top:100px; color:#d4aa77; grid-column: 1/-1;">目前没有待结算的桌位</div>';
                return;
            }

            container.innerHTML = '';
            Object.keys(groups).forEach(tableNum => {
                const orders = groups[tableNum];
                let tableTotal = 0;
                let ordersHtml = '';
                if (!tablePayMethods[tableNum]) tablePayMethods[tableNum] = '现金';

                orders.forEach((order, index) => {
                    const tag = index === 0 ? "初始" : "加单";
                    const time = order.timestamp ? new Date(order.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                    let itemsHtml = '';
                    if (order.items) {
                        itemsHtml = order.items.map(i => {
                            tableTotal += (Number(i.price) * Number(i.quantity));
                            return `<div class="food-item"><span>${i.name} × ${i.quantity}</span><span class="item-price-tag">(${Number(i.price).toLocaleString()} Ks)</span></div>`;
                        }).join('');
                    }

                    ordersHtml += `<div class="sub-order"><div class="order-header"><div><span class="order-tag">${tag}</span><span class="order-time">${time}</span><span class="device-tag">📱 ${order.device||'未知'}</span></div><div class="btn-cancel-small" onclick="deleteOrder('${order.docId}')">取消</div></div>${itemsHtml}${order.notes && order.notes !== '无备注' ? `<div class="remark-box">💬 ${order.notes}</div>` : ''}</div>`;
                });

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="table-label"># ${tableNum}</div>
                    <div class="orders-wrapper">${ordersHtml}<div class="fade-overlay"></div></div>
                    <div class="toggle-btn" onclick="toggleOrder(this)">查看全部订单 ▾</div>
                    
                    <div class="settle-inputs">
                        <input type="tel" id="disc-${tableNum}" class="mini-input disc-input" placeholder="优惠" oninput="updatePrice('${tableNum}', ${tableTotal})">
                        <input type="text" id="note-${tableNum}" class="mini-input note-input" placeholder="添加备注...">
                    </div>

                    <div class="pay-row">
                        <div class="pay-methods">
                            <div class="method-btn ${tablePayMethods[tableNum]==='现金'?'active':''}" onclick="setMethod('${tableNum}','现金',this)">💵</div>
                            <div class="method-btn ${tablePayMethods[tableNum]==='转账'?'active':''}" onclick="setMethod('${tableNum}','转账',this)">🏦</div>
                        </div>
                        <div class="total-price" id="price-${tableNum}">${tableTotal.toLocaleString()}</div>
                        <button class="btn-pay" onclick='confirmPay("${tableNum}", ${tableTotal})'>结账</button>
                    </div>`;
                container.appendChild(card);
            });
        });
    }

    window.onload = startListening;
</script>
</body>
</html>
