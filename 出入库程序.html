<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>烧烤库存·自动扣减 | 手机优化版</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f5f7; font-family: 'Inter', -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; padding: 16px 12px 32px; color: #1c1c1e; }
        .mobile-container { max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 20px; text-align: center; padding: 40px 0 4px; position: relative; }
        .back-btn { position: absolute; left: 0; top: 0; background: #ffffff; border: 1px solid #ddd; padding: 8px 15px; border-radius: 12px; font-size: 14px; font-weight: 600; color: #c2410c; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 4px; }
        .back-btn:active { background: #f2f2f5; transform: scale(0.95); }
        .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, #c2410c, #e65c1e); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 6px; }
        .header p { font-size: 13px; color: #8e8e93; margin-top: 4px; }
        .clear-trash { position: absolute; top: 0; right: 0; background: transparent; border: none; font-size: 24px; cursor: pointer; color: #8e8e93; padding: 8px; }
        .card { background: rgba(255, 255, 255, 0.96); border-radius: 24px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06); padding: 18px 16px 20px; margin-bottom: 16px; border: 0.5px solid rgba(224, 224, 230, 0.6); }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 14px; font-weight: 600; color: #1c1c1e; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .ios-input, .ios-select { width: 100%; background: #f9f9fb; border: 0.5px solid #d9d9df; border-radius: 14px; padding: 12px 14px; font-size: 15px; font-family: inherit; color: #1c1c1e; }
        .ios-input:focus, .ios-select:focus { outline: none; border-color: #c2410c; background: white; }
        .row-2 { display: flex; gap: 12px; }
        .row-2 .form-group { flex: 1; }
        .unit-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .chip { background: #f2f2f5; padding: 5px 14px; border-radius: 40px; font-size: 12px; font-weight: 500; color: #3a3a3e; cursor: pointer; }
        .chip:active { background: #e5e5ea; }
        .btn { border: none; border-radius: 14px; padding: 12px 16px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #c2410c; color: white; }
        .btn-primary:active { background: #9a3412; transform: scale(0.97); }
        .btn-success { background: #2c6e4e; color: white; }
        .btn-success:active { background: #20573d; transform: scale(0.97);}
        .segmented-control { background: #e9e9ef; border-radius: 100px; padding: 4px; display: flex; gap: 6px; margin-bottom: 16px; }
        .segment { flex: 1; text-align: center; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 40px; background: transparent; color: #5e5e66; cursor: pointer; border: none; }
        .segment.active { background: #ffffff; color: #c2410c; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08); font-weight: 600; }
        .table-wrapper { overflow-x: auto; border-radius: 20px; margin-bottom: 8px; }
        .inventory-table, .history-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 420px; }
        .inventory-table th, .history-table th { text-align: left; padding: 12px 6px 8px 6px; font-size: 12px; color: #6c6c70; border-bottom: 0.5px solid #e3e3e8; }
        .inventory-table td, .history-table td { padding: 12px 6px; border-bottom: 0.5px solid #efeff4; font-size: 13px; color: #1c1c1e; }
        .stock-badge { font-weight: 600; background: #f2f2f5; padding: 3px 10px; border-radius: 30px; font-size: 13px; display: inline-block; }
        .stock-low { background: #fee2e2; color: #b91c1c; }
        .category-tag { font-size: 11px; padding: 3px 8px; border-radius: 40px; font-weight: 500; background: #eef2ff; color: #1e40af; }
        .category-drink { background: #e6f7ec; color: #166534; }
        .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #8e8e93; }
        .stats-row { display: flex; justify-content: space-between; background: #f9f9fb; border-radius: 20px; padding: 12px 12px; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 20px; font-weight: 700; color: #1c1c1e; }
        .stat-label { font-size: 11px; color: #8e8e93; }
        .message-bubble { background: #e9f5ff; border-radius: 40px; padding: 8px 14px; font-size: 12px; margin-top: 14px; text-align: center; color: #0369a1; }
        .flex-between { display: flex; justify-content: space-between; align-items: baseline; }
        .total-badge { background: #e9e9ef; padding: 4px 10px; border-radius: 40px; font-size: 12px; }
        .time-text { font-size: 11px; color: #8e8e93; font-family: monospace; }
        .history-badge-in { background: #e0f2e9; color: #2c6e4e; padding: 2px 10px; border-radius: 30px; font-size: 11px; font-weight: 600; display: inline-block; }
        .history-badge-out { background: #fee2e2; color: #b45353; padding: 2px 10px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .history-scroll { max-height: 360px; overflow-y: auto; border-radius: 16px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .undo-btn { background: #f2f2f5; border: none; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 500; color: #c2410c; cursor: pointer; }
        .loading { text-align: center; padding: 20px; color: #8e8e93; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div class="header">
        <a href="index.html" class="back-btn">⬅ 返回点单</a>
        <h1>🍢 烤仓 · 冰饮管家</h1>
        <p>自动同步 | 可撤销历史</p>
        <button id="clearAllBtn" class="clear-trash" title="清空全部数据">🗑️</button>
    </div>

    <div class="card">
        <div class="form-label">➕ 新增商品</div>
        <div class="form-group">
            <input type="text" id="productName" class="ios-input" placeholder="例: 羊肉串、雪花啤酒" autocomplete="off">
        </div>
        <div class="row-2">
            <div class="form-group">
                <select id="category" class="ios-select">
                    <option value="freeze">❄️ 冰冻食品</option>
                    <option value="drink">🥤 饮料 / 酒水</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="unit" class="ios-input" placeholder="单位" value="串">
            </div>
        </div>
        <div class="unit-chips">
            <span class="chip" data-unit="串">🍢 串</span>
            <span class="chip" data-unit="袋">📦 袋</span>
            <span class="chip" data-unit="箱">📦 箱</span>
            <span class="chip" data-unit="瓶">🍾 瓶</span>
            <span class="chip" data-unit="听">🥫 听</span>
            <span class="chip" data-unit="斤">⚖️ 斤</span>
        </div>
        <div class="form-group" style="margin-top: 8px;">
            <input type="number" id="initialStock" class="ios-input" value="0" min="0" step="1" placeholder="初始库存">
        </div>
        <button class="btn btn-primary" id="addProductBtn">✨ 添加商品</button>
        <div id="addMessage" class="message-bubble" style="margin-top: 12px; display: none;"></div>
    </div>

    <div class="card">
        <div class="form-label">🔄 快速出入库 · 可撤销</div>
        <div class="form-group">
            <select id="selectProduct" class="ios-select"></select>
        </div>
        <div class="row-2">
            <div class="form-group">
                <select id="operationType" class="ios-select">
                    <option value="in">📥 入库 (进货)</option>
                    <option value="out">📤 出库 (售卖)</option>
                </select>
            </div>
            <div class="form-group">
                <input type="number" id="quantity" class="ios-input" value="1" min="1" step="1">
            </div>
        </div>
        <button class="btn btn-success" id="applyStockBtn">执行出入库</button>
        <div id="actionMessage" class="message-bubble" style="margin-top: 12px;">✨ 操作后可在历史记录中撤销</div>
    </div>

    <div class="card" style="padding-bottom: 16px;">
        <div class="flex-between" style="margin-bottom: 12px;">
            <span class="form-label" style="margin-bottom: 0;">📋 当前库存</span>
            <span class="total-badge" id="totalItemsBadge">0 项</span>
        </div>
        <div class="segmented-control">
            <button class="segment active" data-filter="all">全部</button>
            <button class="segment" data-filter="freeze">❄️ 冰冻</button>
            <button class="segment" data-filter="drink">🥤 饮料</button>
            <button class="segment" data-filter="lowstock">⚠️ 低库存(≤5)</button>
        </div>
        <div class="table-wrapper">
            <table class="inventory-table">
                <thead><tr><th>商品</th><th>分类</th><th>库存</th><th>单位</th><th></th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
            </table>
        </div>
        <div class="stats-row">
            <div class="stat-item"><div class="stat-value" id="totalStockSum">0</div><div class="stat-label">总库存</div></div>
            <div class="stat-item"><div class="stat-value" id="freezeCount">0</div><div class="stat-label">❄️ 冰冻</div></div>
            <div class="stat-item"><div class="stat-value" id="drinkCount">0</div><div class="stat-label">🥤 饮料</div></div>
            <div class="stat-item"><div class="stat-value" id="lowStockCount">0</div><div class="stat-label">⚠️ 低于5</div></div>
        </div>
    </div>

    <div class="card">
        <div class="flex-between" style="margin-bottom: 10px;">
            <span class="section-title">📜 出入库历史记录</span>
            <button id="clearHistoryBtn" class="undo-btn" style="background:#e9e9ef;">清空历史</button>
        </div>
        <div class="history-scroll">
            <table class="history-table">
                <thead><tr><th>时间</th><th>商品</th><th>类型</th><th>数量</th><th></th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let products = [];
    let historyRecords = [];
    let currentFilter = "all";
    
    function showMessage(elId, msg, isError) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerText = msg;
            el.style.display = 'block';
            el.style.color = isError ? '#b91c1c' : '#0369a1';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    }
    
    async function loadData() {
        try {
            const invSnap = await db.collection("inventory").get();
            products = [];
            invSnap.forEach(doc => {
                products.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
            renderSelect();
            updateStats();
            
            const histSnap = await db.collection("inventory_history").orderBy("timestamp", "desc").get();
            historyRecords = [];
            histSnap.forEach(doc => historyRecords.push(doc.data()));
            renderHistory();
        } catch (err) {
            console.error(err);
        }
    }
    
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        let filtered = products;
        if (currentFilter === 'lowstock') filtered = products.filter(p => p.stock <= 5);
        else if (currentFilter !== 'all') filtered = products.filter(p => p.category === currentFilter);
        
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="5">暂无商品，请添加</td></tr>';
            return;
        }
        tbody.innerHTML = filtered.map(p => `
            <tr>
                <td>${p.name}</td>
                <td><span class="category-tag ${p.category==='drink'?'category-drink':''}">${p.category==='freeze'?'❄️ 冰冻':'🥤 饮料'}</span></td>
                <td><span class="stock-badge ${p.stock<=5?'stock-low':''}">${p.stock}</span></td>
                <td>${p.unit}</td>
                <td><button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️</button></td>
            </tr>
        `).join('');
        document.getElementById('totalItemsBadge').innerText = `${products.length} 项`;
    }
    
    function renderSelect() {
        const sel = document.getElementById('selectProduct');
        if (!products.length) { sel.innerHTML = '<option>暂无商品</option>'; return; }
        sel.innerHTML = products.map(p => `<option value="${p.id}">${p.category==='freeze'?'❄️':'🥤'} ${p.name} (${p.stock} ${p.unit})</option>`).join('');
    }
    
    function renderHistory() {
        const tbody = document.getElementById('historyBody');
        if (!historyRecords.length) {
            tbody.innerHTML = '<tr><td colspan="5">暂无记录</td></tr>';
            return;
        }
        tbody.innerHTML = historyRecords.slice(0, 50).map(r => `
            <tr>
                <td class="time-text">${r.timestamp}</td>
                <td>${r.productName}</td>
                <td><span class="${r.type==='in'?'history-badge-in':'history-badge-out'}">${r.type==='in'?'📥 入库':'📤 出库'}</span></td>
                <td>${r.type==='in'?'+':'-'}${r.quantity} ${r.unit}</td>
                <td><button class="undo-btn" onclick="undoHistory('${r.id}')">撤销</button></td>
            </tr>
        `).join('');
    }
    
    function updateStats() {
        document.getElementById('totalStockSum').innerText = products.reduce((s,p)=>s+(p.stock||0),0);
        document.getElementById('freezeCount').innerText = products.filter(p=>p.category==='freeze').length;
        document.getElementById('drinkCount').innerText = products.filter(p=>p.category==='drink').length;
        document.getElementById('lowStockCount').innerText = products.filter(p=>p.stock<=5).length;
    }
    
    window.deleteProduct = async function(id) {
        if (!confirm('删除商品？')) return;
        await db.collection("inventory").doc(id).delete();
        await loadData();
    };
    
    window.undoHistory = async function(historyId) {
        const record = historyRecords.find(r => r.id == historyId);
        if (!record) return;
        const product = products.find(p => p.id === record.productId);
        if (!product || product.stock !== record.newStock) {
            showMessage('actionMessage', '无法撤销：库存已变化', true);
            return;
        }
        await db.collection("inventory").doc(product.id).update({ stock: record.oldStock });
        const histSnap = await db.collection("inventory_history").where("id", "==", record.id).get();
        histSnap.forEach(d => d.ref.delete());
        await loadData();
        showMessage('actionMessage', '已撤销', false);
    };
    
    document.addEventListener('DOMContentLoaded', async () => {
        await loadData();
        
        document.querySelectorAll('.segment').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.segment').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTable();
            };
        });
        
        document.querySelectorAll('.chip').forEach(c => {
            c.onclick = () => document.getElementById('unit').value = c.dataset.unit;
        });
        
        document.getElementById('addProductBtn').onclick = async () => {
            const name = document.getElementById('productName').value.trim();
            const category = document.getElementById('category').value;
            const unit = document.getElementById('unit').value.trim();
            const stock = parseInt(document.getElementById('initialStock').value) || 0;
            if (!name) { showMessage('addMessage', '请输入名称', true); return; }
            if (!unit) { showMessage('addMessage', '请输入单位', true); return; }
            
            // 检查是否已存在同名商品
            if (products.some(p => p.name === name)) {
                showMessage('addMessage', '商品已存在，请勿重复添加', true);
                return;
            }
            
            const newProduct = { name, category, stock, unit };
            const docRef = await db.collection("inventory").add(newProduct);
            if (stock > 0) {
                await db.collection("inventory_history").add({
                    id: Date.now(),
                    timestamp: new Date().toLocaleString('zh-CN'),
                    productName: name,
                    productId: docRef.id,
                    type: 'in',
                    quantity: stock,
                    unit: unit,
                    oldStock: 0,
                    newStock: stock
                });
            }
            document.getElementById('productName').value = '';
            document.getElementById('initialStock').value = '0';
            await loadData();
            showMessage('addMessage', '添加成功', false);
        };
        
        document.getElementById('applyStockBtn').onclick = async () => {
            const productId = document.getElementById('selectProduct').value;
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            const type = document.getElementById('operationType').value;
            const product = products.find(p => p.id === productId);
            if (!product) { showMessage('actionMessage', '请选择商品', true); return; }
            if (qty <= 0) { showMessage('actionMessage', '数量无效', true); return; }
            if (type === 'out' && product.stock < qty) {
                showMessage('actionMessage', `库存不足！现有 ${product.stock}`, true);
                return;
            }
            const oldStock = product.stock;
            const newStock = type === 'in' ? oldStock + qty : oldStock - qty;
            await db.collection("inventory").doc(product.id).update({ stock: newStock });
            await db.collection("inventory_history").add({
                id: Date.now(),
                timestamp: new Date().toLocaleString('zh-CN'),
                productName: product.name,
                productId: product.id,
                type: type,
                quantity: qty,
                unit: product.unit,
                oldStock: oldStock,
                newStock: newStock
            });
            await loadData();
            showMessage('actionMessage', `${type==='in'?'入库':'出库'}成功`, false);
            document.getElementById('quantity').value = '1';
        };
        
        document.getElementById('clearAllBtn').onclick = async () => {
            if (!confirm('删除所有数据？')) return;
            const inv = await db.collection("inventory").get();
            const hist = await db.collection("inventory_history").get();
            const batch = db.batch();
            inv.forEach(d => batch.delete(d.ref));
            hist.forEach(d => batch.delete(d.ref));
            await batch.commit();
            await loadData();
            showMessage('actionMessage', '已清空', false);
        };
        
        document.getElementById('clearHistoryBtn').onclick = async () => {
            if (!confirm('清空历史？')) return;
            const hist = await db.collection("inventory_history").get();
            const batch = db.batch();
            hist.forEach(d => batch.delete(d.ref));
            await batch.commit();
            await loadData();
            showMessage('actionMessage', '历史已清空', false);
        };
    });
</script>
</body>
</html>
