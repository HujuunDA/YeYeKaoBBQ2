<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>数据中心 - 智能排行版</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #FF8C00; --bg: #f6f7fb; --text: #333; --danger: #ff4d4d; --success: #4CAF50; --gold: #FFD700; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); padding-bottom: 50px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-left { display: flex; gap: 8px; }
        .back-btn { padding: 10px 18px; background: #666; color: white; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; }
        .pending-link { padding: 10px 18px; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; }

        .revenue-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; background: linear-gradient(135deg, #ffffff 0%, #fff9f0 100%); }
        .rev-label { font-size: 13px; color: #999; }
        .rev-val { font-size: 30px; font-weight: 900; color: #FF4500; margin-top: 5px; }

        .rank-box { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .rank-title { font-size: 16px; font-weight: 800; }
        .rank-list { display: flex; flex-direction: column; gap: 8px; }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .rank-left { display: flex; align-items: center; gap: 10px; }
        .rank-num { width: 22px; height: 22px; border-radius: 6px; background: #f0f0f0; font-size: 11px; display: flex; align-items: center; justify-content: center; color: #777; font-weight: bold; }
        .rank-top3 { background: var(--gold); color: #fff; }
        .rank-name { font-size: 14px; color: #444; }
        .rank-qty { font-weight: 800; color: var(--primary); font-size: 14px; }
        
        .toggle-btn { width: 100%; padding: 12px; margin-top: 10px; background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; color: var(--primary); font-size: 13px; font-weight: bold; cursor: pointer; }

        .filter-row { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn { padding: 10px 16px; background: white; border-radius: 12px; font-size: 13px; border: none; color: #666; font-weight: 600; white-space: nowrap; }
        .filter-btn.active { background: var(--primary); color: white; }

        .order-card { background: white; padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #f0f0f0; position: relative; }
        .order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .table-no { font-weight: 800; font-size: 16px; color: #333; }
        .order-time { font-size: 12px; color: #bbb; }

        .btn-del { background: #f5f5f5; color: #ccc; border: none; width: 28px; height: 28px; border-radius: 8px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-del:active { background: #ffebeb; color: #ff4d4d; }

        .order-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; border-top: 1px solid #f9f9f9; padding-top: 8px; }
        .total-info { text-align: right; flex-grow: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">返回</a>
            <a href="带结算.html" class="pending-link" id="pending-btn">待结算</a>
        </div>
        <button onclick="exportDetailedCSV()" style="border:none; background:var(--success); color:white; padding:8px 12px; border-radius:10px; font-size:12px;">导出报表</button>
    </div>

    <div class="revenue-card">
        <div class="rev-label" id="revenue-title">今日总营收</div>
        <div class="rev-val" id="today-total">0 Ks</div>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" id="f-today" onclick="setFilter('today')">今日</button>
        <button class="filter-btn" id="f-yesterday" onclick="setFilter('yesterday')">昨天</button>
        <button class="filter-btn" id="f-p1" onclick="setFilter('p1')">1-10号</button>
        <button class="filter-btn" id="f-p2" onclick="setFilter('p2')">11-20号</button>
        <button class="filter-btn" id="f-p3" onclick="setFilter('p3')">21-月底</button>
        <button class="filter-btn" id="f-all" onclick="setFilter('all')">全部历史</button>
    </div>

    <div class="rank-box" id="rank-section" style="display: none;">
        <div class="rank-header">
            <div class="rank-title">📊 菜品销量排行</div>
        </div>
        <div class="rank-list" id="rank-content"></div>
        <button class="toggle-btn" id="toggle-rank-btn" onclick="toggleRank()">查看全部排行 ↓</button>
    </div>

    <div id="order-history"></div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
            authDomain: "yeyekao-3878d.firebaseapp.com", 
            projectId: "yeyekao-3878d", 
            storageBucket: "yeyekao-3878d.firebasestorage.app", 
            messagingSenderId: "560765118345", 
            appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allOrders = [];
        let currentFilter = 'today';
        let isRankExpanded = false;

        function loadData() {
            // 监听已结算订单集合
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                allOrders = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    allOrders.push({ ...d, id: doc.id, date: d.timestamp?.toDate() || new Date() });
                });
                render();
            });

            // 监听待结算订单集合，统计金额并更新按钮
            db.collection("pending_orders").onSnapshot(snap => {
                let pendingTotal = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.items) {
                        d.items.forEach(item => {
                            pendingTotal += (Number(item.price) * Number(item.quantity));
                        });
                    }
                });
                const btn = document.getElementById('pending-btn');
                if (btn) {
                    btn.innerText = `待结算 (${pendingTotal.toLocaleString()} Ks)`;
                }
            });
        }

        function toggleRank() {
            isRankExpanded = !isRankExpanded;
            document.getElementById('toggle-rank-btn').innerText = isRankExpanded ? '收起排行 ↑' : '查看全部排行 ↓';
            render();
        }

        function render() {
            const now = new Date();
            let displayOrders = [];
            let title = "";

            if (currentFilter === 'today') {
                displayOrders = allOrders.filter(o => o.date.toDateString() === now.toDateString());
                title = "今日总营收";
            } else if (currentFilter === 'yesterday') {
                const yesterday = new Date();
                yesterday.setDate(now.getDate() - 1);
                displayOrders = allOrders.filter(o => o.date.toDateString() === yesterday.toDateString());
                title = "昨日总营收";
            } else if (currentFilter === 'all') {
                displayOrders = allOrders;
                title = "全部历史营收";
            } else {
                displayOrders = allOrders.filter(o => {
                    const d = o.date.getDate();
                    const m = o.date.getMonth();
                    return m === now.getMonth() && (currentFilter==='p1'? (d>=1&&d<=10): currentFilter==='p2'? (d>=11&&d<=20): (d>=21));
                });
                title = currentFilter==='p1'?"上旬营收":currentFilter==='p2'?"中旬营收":"下旬营收";
            }

            document.getElementById('revenue-title').innerText = title;
            document.getElementById('today-total').innerText = displayOrders.reduce((s, o)=>s+(Number(o.total)||0), 0).toLocaleString() + ' Ks';

            const salesMap = {};
            displayOrders.forEach(o => (o.items || []).forEach(i => salesMap[i.name] = (salesMap[i.name] || 0) + (Number(i.quantity) || 0)));
            const sortedSales = Object.entries(salesMap).sort((a, b) => b[1] - a[1]);
            const rankSection = document.getElementById('rank-section');
            const rankContent = document.getElementById('rank-content');
            const toggleBtn = document.getElementById('toggle-rank-btn');

            if (sortedSales.length > 0) {
                rankSection.style.display = 'block';
                const showCount = isRankExpanded ? sortedSales.length : 5;
                toggleBtn.style.display = sortedSales.length > 5 ? 'block' : 'none';
                rankContent.innerHTML = sortedSales.slice(0, showCount).map(([name, qty], idx) => `
                    <div class="rank-item">
                        <div class="rank-left">
                            <div class="rank-num ${idx < 3 ? 'rank-top3' : ''}">${idx + 1}</div>
                            <div class="rank-name">${name}</div>
                        </div>
                        <div class="rank-qty">${qty} 份</div>
                    </div>
                `).join('');
            } else {
                rankSection.style.display = 'none';
            }

            const container = document.getElementById('order-history');
            container.innerHTML = displayOrders.map(o => {
                const discountValue = Number(o.discount || 0);
                const discountHTML = discountValue > 0 ? `<div style="font-size:12px; color:#999;">已优惠: -${discountValue.toLocaleString()} Ks</div>` : '';
                const timeStr = `${o.date.getHours().toString().padStart(2,'0')}:${o.date.getMinutes().toString().padStart(2,'0')}`;
                
                // 获取设备来源信息
                const deviceName = o.device || "未知设备";

                return `
                <div class="order-card">
                    <div class="order-top">
                        <div style="display: flex; flex-direction: column;">
                            <span class="table-no">桌号: ${o.table}</span>
                            <span style="font-size: 10px; color: #aaa; margin-top: 2px;">📱 来源: ${deviceName}</span>
                        </div>
                        <span class="order-time">${timeStr}</span>
                    </div>
                    ${(o.items || []).map(i => `<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;"><span>${i.name}</span><span>x${i.quantity}</span></div>`).join('')}
                    
                    <div class="order-footer">
                        <button class="btn-del" onclick="deleteOrder('${o.id}')" title="删除订单">×</button>
                        <div class="total-info">
                            ${discountHTML}
                            <div style="font-weight:800;color:#FF4500;font-size:16px;">实付: ${Number(o.total).toLocaleString()} Ks</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            render();
        }

        async function deleteOrder(id) {
            if(confirm("确定要删除这条订单吗？删除后营收数据会同步扣除。")) {
                try {
                    await db.collection("orders").doc(id).delete();
                } catch (e) {
                    alert("删除失败: " + e.message);
                }
            }
        }

        function exportDetailedCSV() {
            if (allOrders.length === 0) return;
            let csv = "\uFEFF日期,时间,桌号,菜品,数量,单价,总额\n";
            allOrders.forEach(o => {
                const d = o.date.toLocaleDateString();
                const t = o.date.toLocaleTimeString();
                (o.items || []).forEach((i, idx) => {
                    csv += `${idx===0?d:''},${idx===0?t:''},${idx===0?o.table:''},${i.name},${i.quantity},${i.price},${idx===0?o.total:''}\n`;
                });
            });
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `财务报表.csv`;
            link.click();
        }

        loadData();
    </script>
</body>
</html>
