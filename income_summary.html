<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>数据中心 - 财务报表</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #FF8C00; --bg: #f6f7fb; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); padding-bottom: 50px; }
        
        /* 顶部导航 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { padding: 10px 18px; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .top-ops { display: flex; gap: 8px; }
        .op-btn { background: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; color: #666; }
        .op-btn.clear { color: #ff4d4d; }

        /* 总营收卡片 */
        .revenue-card { background: white; padding: 25px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .rev-label { font-size: 14px; color: #999; margin-bottom: 8px; }
        .rev-val { font-size: 34px; font-weight: 900; color: #FF4500; letter-spacing: -1px; }

        /* 修改：销量排行改为横向滚动卡片组 */
        .rank-section { margin-bottom: 25px; }
        .section-title { font-weight: 800; font-size: 16px; margin-bottom: 12px; padding-left: 5px; display: flex; justify-content: space-between; }
        
        .rank-container { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 5px 5px 15px 5px; 
            scrollbar-width: none; 
        }
        .rank-container::-webkit-scrollbar { display: none; }
        
        .rank-item-card { 
            background: white; 
            min-width: 120px; 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center;
            flex-shrink: 0;
            border-bottom: 4px solid #fff1e6;
        }
        .rank-badge { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            font-size: 10px; 
            padding: 2px 8px; 
            border-radius: 8px; 
            margin-bottom: 8px;
            font-weight: bold;
        }
        .rank-name { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 5px; display: block; }
        .rank-qty { font-size: 18px; font-weight: 800; color: var(--primary); }

        /* 筛选菜单 */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 20px; background: white; border-radius: 15px; font-size: 14px; border: none; white-space: nowrap; color: #666; font-weight: 600; }
        .filter-btn.active { background: var(--primary); color: white; }

        /* 订单详情列表 */
        .order-card { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .order-top { display: flex; justify-content: space-between; border-bottom: 1px solid #f5f5f5; padding-bottom: 10px; margin-bottom: 10px; }
        .table-no { font-weight: 800; font-size: 16px; }
        .order-time { font-size: 12px; color: #bbb; }
        .order-item-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .order-remark { background: #fdf6ec; color: #e6a23c; padding: 8px; border-radius: 8px; font-size: 12px; margin-top: 10px; border: 1px dashed #f5dab1; }
        .order-total { text-align: right; margin-top: 12px; font-size: 18px; font-weight: 800; color: #FF4500; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← 返回</a>
        <div class="top-ops">
            <button class="op-btn" onclick="exportData()">导出 CSV</button>
            <button class="op-btn clear" onclick="clearData()">清空</button>
        </div>
    </div>

    <div class="revenue-card">
        <div class="rev-label">今日合计营收</div>
        <div class="rev-val" id="today-total">0 Ks</div>
        <div style="font-size:12px; color:#aaa; margin-top:10px;">
            共成交 <span id="today-count" style="color:var(--text); font-weight:bold;">0</span> 笔订单
        </div>
    </div>

    <div class="rank-section">
        <div class="section-title">
            <span>🔥 菜品销量榜 (今日)</span>
        </div>
        <div class="rank-container" id="rank-list">
            </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('today', this)">今日账单</button>
        <button class="filter-btn" onclick="setFilter('all', this)">历史账单</button>
    </div>

    <div id="order-history">
        <div style="text-align:center; padding:50px; color:#ccc;">加载中...</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
            authDomain: "yeyekao-3878d.firebaseapp.com", 
            projectId: "yeyekao-3878d", 
            storageBucket: "yeyekao-3878d.firebasestorage.app", 
            messagingSenderId: "560765118345", 
            appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allOrders = [];
        let currentFilter = 'today';

        function loadData() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                allOrders = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    allOrders.push({ ...d, id: doc.id, date: d.timestamp?.toDate() || new Date() });
                });
                render();
            });
        }

        function render() {
            const todayStr = new Date().toDateString();
            const todayOrders = allOrders.filter(o => o.date.toDateString() === todayStr);
            
            // 营收数据
            const total = todayOrders.reduce((sum, o) => sum + (o.total || 0), 0);
            document.getElementById('today-total').innerText = total.toLocaleString() + ' Ks';
            document.getElementById('today-count').innerText = todayOrders.length;

            // 销量排行 - 渲染为独立卡片
            const sales = {};
            todayOrders.forEach(o => o.items?.forEach(i => sales[i.name] = (sales[i.name] || 0) + i.quantity));
            const sorted = Object.entries(sales).sort((a,b) => b[1] - a[1]).slice(0, 10);
            
            document.getElementById('rank-list').innerHTML = sorted.map(([name, qty], idx) => `
                <div class="rank-item-card">
                    <span class="rank-badge">TOP ${idx+1}</span>
                    <span class="rank-name">${name}</span>
                    <span class="rank-qty">${qty}<small style="font-size:10px;margin-left:2px;">份</small></span>
                </div>
            `).join('') || '<div style="color:#ccc; font-size:12px; padding-left:10px;">今日暂无销量记录</div>';

            // 订单列表
            const displayOrders = currentFilter === 'today' ? todayOrders : allOrders;
            const historyBox = document.getElementById('order-history');
            
            if (displayOrders.length === 0) {
                historyBox.innerHTML = '<div style="text-align:center;padding:50px;color:#ccc;">📭 暂无数据</div>';
                return;
            }

            historyBox.innerHTML = displayOrders.map(o => `
                <div class="order-card">
                    <div class="order-top">
                        <span class="table-no">第 ${o.table} 桌</span>
                        <span class="order-time">${o.date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    ${o.items.map(i => `
                        <div class="order-item-line">
                            <span>${i.name} x ${i.quantity}</span>
                            <span>${(i.price*i.quantity).toLocaleString()}</span>
                        </div>
                    `).join('')}
                    ${o.remark && o.remark !== "无" ? `<div class="order-remark">💬 ${o.remark}</div>` : ''}
                    <div class="order-total">合计: ${o.total.toLocaleString()} Ks</div>
                </div>
            `).join('');
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        async function clearData() {
            if(confirm("确定清空所有数据吗？")) {
                const snap = await db.collection("orders").get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            }
        }

        function exportData() {
            let csv = "\uFEFF时间,桌号,金额,备注\n";
            allOrders.forEach(o => csv += `${o.date.toLocaleString()},${o.table},${o.total},${o.remark}\n`);
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `账单_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        loadData();
    </script>
</body>
</html>
