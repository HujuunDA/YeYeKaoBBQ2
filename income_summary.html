<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数据中心 - YeYeKao</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #FF8C00; --bg: #ffffff; --text: #333; --danger: #ff4d4d; --success: #32d74b; --gold: #FFD700; }
        
        /* 基础设置：统一字体大小，防止缩放 */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); padding-bottom: calc(50px + env(safe-area-inset-bottom)); -webkit-tap-highlight-color: transparent; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-top: env(safe-area-inset-top); }
        .header-left { display: flex; gap: 10px; }
        
        /* 按钮字体设为 16px 防止 iOS 缩放 */
        .back-btn, .pending-link, .filter-btn, .export-btn { font-size: 16px !important; font-weight: 600; border-radius: 12px; cursor: pointer; border: none; }
        
        .back-btn { padding: 8px 16px; background: #f0f0f0; color: #666; text-decoration: none; }
        .pending-link { padding: 8px 16px; background: var(--primary); color: white; text-decoration: none; }
        .export-btn { background: var(--success); color: white; padding: 8px 12px; }

        .revenue-card { background: linear-gradient(135deg, #fff 0%, #fff9f0 100%); padding: 25px 20px; border-radius: 24px; border: 1px solid #fdf2e9; margin-bottom: 20px; }
        .rev-label { font-size: 14px; color: #999; margin-bottom: 5px; }
        .rev-val { font-size: 34px; font-weight: 900; color: #FF4500; }

        .filter-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 18px; background: #f5f5f7; color: #666; white-space: nowrap; transition: 0.2s; }
        .filter-btn.active { background: var(--primary); color: white; }

        .rank-box { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .rank-title { font-size: 17px; font-weight: 800; margin-bottom: 15px; }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .rank-num { width: 24px; height: 24px; border-radius: 8px; background: #f0f0f0; font-size: 12px; display: flex; align-items: center; justify-content: center; color: #777; font-weight: bold; }
        .rank-top3 { background: var(--gold); color: #fff; }
        .rank-name { font-size: 15px; font-weight: 500; }
        .rank-qty { font-weight: 800; color: var(--primary); font-size: 16px; }

        .order-card { background: white; padding: 18px; border-radius: 22px; margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .table-no { font-weight: 800; font-size: 18px; color: #333; }
        .pay-method-tag { font-size: 12px; padding: 3px 8px; border-radius: 6px; margin-left: 8px; font-weight: bold; }
        .method-cash { background: #e8f5e9; color: #2e7d32; }
        .method-transfer { background: #e3f2fd; color: #1565c0; }
        
        /* 详情文本稍微加大，方便阅读 */
        .food-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 6px; color: #444; }
        .settle-remark { background: #fff5eb; color: #d35400; font-size: 13px; padding: 8px 12px; border-radius: 10px; margin-top: 10px; display: block; border: 1px solid #ffe0c1; }

        .order-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 12px; border-top: 1px solid #f9f9f9; padding-top: 10px; }
        .btn-del { background: #fdfdfd; color: #ddd; border: 1px solid #eee; width: 32px; height: 32px; border-radius: 10px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .total-info { text-align: right; }
        .final-pay { font-weight: 900; color: #FF4500; font-size: 18px; }

        #pending-btn { transition: transform 0.2s; }
        #pending-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">返回</a>
            <a href="带结算.html" class="pending-link" id="pending-btn">待结算</a>
        </div>
        <button onclick="exportDetailedCSV()" class="export-btn">导出报表</button>
    </div>

    <div class="revenue-card">
        <div class="rev-label" id="revenue-title">今日总营收</div>
        <div class="rev-val" id="today-total">0 Ks</div>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" id="f-today" onclick="setFilter('today')">今日</button>
        <button class="filter-btn" id="f-yesterday" onclick="setFilter('yesterday')">昨天</button>
        <button class="filter-btn" id="f-p1" onclick="setFilter('p1')">1-10号</button>
        <button class="filter-btn" id="f-p2" onclick="setFilter('p2')">11-20号</button>
        <button class="filter-btn" id="f-p3" onclick="setFilter('p3')">21-月底</button>
        <button class="filter-btn" id="f-all" onclick="setFilter('all')">全部历史</button>
    </div>

    <div class="rank-box" id="rank-section" style="display: none;">
        <div class="rank-title">📊 菜品销量排行</div>
        <div id="rank-content"></div>
        <button style="width:100%; padding:12px; margin-top:10px; background:none; border:none; color:var(--primary); font-size:14px; font-weight:bold;" id="toggle-rank-btn" onclick="toggleRank()">查看全部排行 ↓</button>
    </div>

    <div id="order-history"></div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
            authDomain: "yeyekao-3878d.firebaseapp.com", 
            projectId: "yeyekao-3878d", 
            storageBucket: "yeyekao-3878d.firebasestorage.app", 
            messagingSenderId: "560765118345", 
            appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allOrders = [];
        let currentFilter = 'today';
        let isRankExpanded = false;

        function loadData() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                allOrders = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    allOrders.push({ ...d, id: doc.id, date: d.timestamp?.toDate() || new Date() });
                });
                render();
            });

            db.collection("pending_orders").onSnapshot(snap => {
                let pendingTotal = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.items) d.items.forEach(item => { pendingTotal += (Number(item.price) * Number(item.quantity)); });
                });
                const btn = document.getElementById('pending-btn');
                if (btn) btn.innerText = `待结算 (${pendingTotal.toLocaleString()} Ks)`;
            });
        }

        function toggleRank() {
            isRankExpanded = !isRankExpanded;
            document.getElementById('toggle-rank-btn').innerText = isRankExpanded ? '收起排行 ↑' : '查看全部排行 ↓';
            render();
        }

        function render() {
            const now = new Date();
            let displayOrders = [];
            let title = "";

            if (currentFilter === 'today') {
                displayOrders = allOrders.filter(o => o.date.toDateString() === now.toDateString());
                title = "今日总营收";
            } else if (currentFilter === 'yesterday') {
                const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
                displayOrders = allOrders.filter(o => o.date.toDateString() === yesterday.toDateString());
                title = "昨日总营收";
            } else if (currentFilter === 'all') {
                displayOrders = allOrders;
                title = "全部历史营收";
            } else {
                displayOrders = allOrders.filter(o => {
                    const d = o.date.getDate(); const m = o.date.getMonth();
                    return m === now.getMonth() && (currentFilter==='p1'? (d>=1&&d<=10): currentFilter==='p2'? (d>=11&&d<=20): (d>=21));
                });
                title = currentFilter==='p1'?"上旬营收":currentFilter==='p2'?"中旬营收":"下旬营收";
            }

            document.getElementById('revenue-title').innerText = title;
            document.getElementById('today-total').innerText = displayOrders.reduce((s, o)=>s+(Number(o.total)||0), 0).toLocaleString() + ' Ks';

            // 排行逻辑
            const salesMap = {};
            displayOrders.forEach(o => (o.items || []).forEach(i => salesMap[i.name] = (salesMap[i.name] || 0) + (Number(i.quantity) || 0)));
            const sortedSales = Object.entries(salesMap).sort((a, b) => b[1] - a[1]);
            const rankSection = document.getElementById('rank-section');
            if (sortedSales.length > 0) {
                rankSection.style.display = 'block';
                const showCount = isRankExpanded ? sortedSales.length : 5;
                document.getElementById('toggle-rank-btn').style.display = sortedSales.length > 5 ? 'block' : 'none';
                document.getElementById('rank-content').innerHTML = sortedSales.slice(0, showCount).map(([name, qty], idx) => `
                    <div class="rank-item">
                        <div class="rank-left" style="display:flex; align-items:center; gap:12px;">
                            <div class="rank-num ${idx < 3 ? 'rank-top3' : ''}">${idx + 1}</div>
                            <div class="rank-name">${name}</div>
                        </div>
                        <div class="rank-qty">${qty} 份</div>
                    </div>
                `).join('');
            } else { rankSection.style.display = 'none'; }

            // 订单列表逻辑
            document.getElementById('order-history').innerHTML = displayOrders.map(o => {
                const discountValue = Number(o.discount || 0);
                const timeStr = `${o.date.getHours().toString().padStart(2,'0')}:${o.date.getMinutes().toString().padStart(2,'0')}`;
                const payMethod = o.paymentMethod || "现金";
                const methodClass = payMethod === "现金" ? "method-cash" : "method-transfer";

                return `
                <div class="order-card">
                    <div class="order-top">
                        <div>
                            <div style="display: flex; align-items: center;">
                                <span class="table-no"># ${o.table}</span>
                                <span class="pay-method-tag ${methodClass}">${payMethod === "现金" ? "💵" : "🏦"} ${payMethod}</span>
                            </div>
                            <div style="font-size: 11px; color: #bbb; margin-top: 4px;">📱 ${o.device || "未知设备"}</div>
                        </div>
                        <span style="font-size:12px; color:#aaa;">${timeStr}</span>
                    </div>
                    ${(o.items || []).map(i => `<div class="food-row"><span>${i.name}</span><span>x${i.quantity}</span></div>`).join('')}
                    ${o.settleNote ? `<span class="settle-remark">💬 ${o.settleNote}</span>` : ''}
                    <div class="order-footer">
                        <button class="btn-del" onclick="deleteOrder('${o.id}')">×</button>
                        <div class="total-info">
                            ${discountValue > 0 ? `<div style="font-size:12px; color:#999; margin-bottom:2px;">已优: -${discountValue.toLocaleString()} Ks</div>` : ''}
                            <div class="final-pay">实付: ${Number(o.total).toLocaleString()} Ks</div>
                        </div>
                    </div>
                </div>`}).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            render();
        }

        async function deleteOrder(id) {
            if(confirm("确定要删除这条订单吗？删除后营收数据会同步扣除。")) {
                try { await db.collection("orders").doc(id).delete(); } 
                catch (e) { alert("删除失败: " + e.message); }
            }
        }

        function exportDetailedCSV() {
            if (allOrders.length === 0) return;
            let csv = "\uFEFF日期,时间,桌号,支付方式,备注,菜品,数量,单价,总额\n";
            allOrders.forEach(o => {
                const d = o.date.toLocaleDateString();
                const t = o.date.toLocaleTimeString();
                (o.items || []).forEach((i, idx) => {
                    csv += `${idx===0?d:''},${idx===0?t:''},${idx===0?o.table:''},${idx===0?(o.paymentMethod||'现金'):''},${idx===0?(o.settleNote||''):''},${i.name},${i.quantity},${i.price},${idx===0?o.total:''}\n`;
                });
            });
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `财务报表.csv`;
            link.click();
        }

        loadData();
    </script>
</body>
</html>
