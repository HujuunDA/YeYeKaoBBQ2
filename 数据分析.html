<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数据分析看板 · 烧烤店智析</title>
    <!-- Firebase SDK & Firestore -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- Chart.js 轻量图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 延续暖色玻璃质感 + 深邃光晕背景 */
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 40px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -15%;
            width: 130%;
            height: 130%;
            background: radial-gradient(ellipse at 40% 50%, rgba(255, 160, 70, 0.28), rgba(255, 100, 30, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -15%;
            right: -10%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 85%, rgba(255, 140, 50, 0.22), transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* 所有内容浮在光晕之上 */
        .dashboard-container, .header, .kpi-row, .chart-card, .rank-card {
            position: relative;
            z-index: 2;
        }

        /* 头部导航 玻璃质感 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: env(safe-area-inset-top);
        }

        .back-btn {
            font-size: 15px;
            font-weight: 700;
            border-radius: 40px;
            padding: 10px 18px;
            background: rgba(255, 200, 140, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 150, 60, 0.7);
            color: #ffd7a5;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .back-btn:active { transform: scale(0.96); }

        .refresh-btn {
            background: rgba(80, 180, 120, 0.4);
            border: 1px solid rgba(80, 200, 120, 0.6);
            padding: 10px 18px;
            border-radius: 40px;
            color: #ccffdd;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(12px);
        }
        .refresh-btn:active { transform: scale(0.96); }

        /* KPI 卡片组 */
        .kpi-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 24px;
        }
        .kpi-card {
            flex: 1 1 180px;
            background: rgba(35, 26, 18, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px 12px;
            border: 1px solid rgba(255, 170, 80, 0.55);
            text-align: center;
            transition: all 0.2s;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            background: rgba(55, 42, 30, 0.85);
            border-color: #ffa044;
        }
        .kpi-label {
            font-size: 13px;
            font-weight: 600;
            color: #ffddbb;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffcd94, #ffa044);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .kpi-sub {
            font-size: 12px;
            color: #e0b87a;
            margin-top: 6px;
        }

        /* 日期筛选栏 */
        .filter-bar {
            background: rgba(25, 18, 12, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 6px 12px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 160, 70, 0.5);
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            background: rgba(45, 34, 24, 0.7);
            border: 1px solid rgba(255, 150, 60, 0.5);
            color: #ffdfb3;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: linear-gradient(105deg, rgba(255, 120, 40, 0.95), rgba(220, 80, 20, 0.95));
            color: white;
            border-color: #ffcc88;
            box-shadow: 0 2px 8px rgba(255, 100, 0, 0.3);
        }
        .date-range {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 60px;
        }
        .date-input {
            background: rgba(30, 22, 16, 0.8);
            border: 1px solid #ffa84d;
            color: #ffefcf;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        .apply-custom {
            background: #d97a2b;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: white;
        }

        /* 图表卡片通用样式 */
        .chart-card {
            background: rgba(35, 26, 18, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 18px 16px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 170, 80, 0.6);
            transition: 0.2s;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 800;
            color: #ffddb5;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #ffa044;
            padding-left: 12px;
        }
        .chart-canvas-container {
            position: relative;
            width: 100%;
            min-height: 220px;
        }
        canvas { max-height: 250px; width: 100%; }

        /* 双图表同行响应式 */
        .row-2cols {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }
        .row-2cols .chart-card {
            flex: 1 1 280px;
        }

        /* 菜品排行列表 + 条形图风格 */
        .rank-list {
            margin-top: 8px;
        }
        .rank-item-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .rank-name {
            width: 110px;
            font-weight: 600;
            color: #ffefcf;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bar-wrapper {
            flex: 1;
            background: rgba(255,200,140,0.2);
            border-radius: 20px;
            overflow: hidden;
            height: 28px;
        }
        .bar-fill {
            background: linear-gradient(90deg, #ffa044, #ff7b2c);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .rank-qty-num {
            min-width: 45px;
            text-align: right;
            color: #ffce9e;
            font-weight: 700;
            font-size: 13px;
        }

        /* 无数据提示 */
        .empty-tip {
            text-align: center;
            padding: 30px;
            color: #ffc285;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #bb9a6e;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <a href="income_summary.html" class="back-btn">← </a>
        <button class="refresh-btn" id="manualRefresh">⟳ 刷新</button>
    </div>

    <!-- KPI 关键指标 -->
    <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">💰 总营收</div><div class="kpi-value" id="totalRevenue">0 Ks</div><div class="kpi-sub" id="revenueCompare"></div></div>
        <div class="kpi-card"><div class="kpi-label">📋 总订单数</div><div class="kpi-value" id="totalOrders">0</div><div class="kpi-sub">已完成</div></div>
        <div class="kpi-card"><div class="kpi-label">🍢 总销量(份)</div><div class="kpi-value" id="totalItemsQty">0</div><div class="kpi-sub">菜品份数</div></div>
        <div class="kpi-card"><div class="kpi-label">🧾 客单价</div><div class="kpi-value" id="avgTicket">0 Ks</div><div class="kpi-sub">每单平均</div></div>
    </div>

    <!-- 日期筛选器（灵活区间） -->
    <div class="filter-bar">
        <button class="filter-btn" data-range="today">今日</button>
        <button class="filter-btn" data-range="last7">近7天</button>
        <button class="filter-btn" data-range="last30">近30天</button>
        <button class="filter-btn" data-range="thisMonth">本月</button>
        <button class="filter-btn" data-range="lastMonth">上月</button>
        <div class="date-range">
            <input type="date" id="startDate" class="date-input">
            <span style="color:#ffc285;">—</span>
            <input type="date" id="endDate" class="date-input">
            <button id="applyCustomRange" class="apply-custom">自定义</button>
        </div>
    </div>

    <!-- 趋势图表：营收+订单双线分开更直观 -->
    <div class="row-2cols">
        <div class="chart-card">
            <div class="chart-title">📈 每日营收趋势 (Ks)</div>
            <div class="chart-canvas-container">
                <canvas id="revenueTrendChart" width="400" height="200" style="max-height:220px"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">📊 每日订单数量趋势</div>
            <div class="chart-canvas-container">
                <canvas id="ordersTrendChart" width="400" height="200" style="max-height:220px"></canvas>
            </div>
        </div>
    </div>

    <!-- 环形图 + 时段热力折线 -->
    <div class="row-2cols">
        <div class="chart-card">
            <div class="chart-title">💳 支付方式占比 (金额)</div>
            <div class="chart-canvas-container">
                <canvas id="paymentChart" width="300" height="200" style="max-height:200px"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">⏰ 时段营收折线 (小时)</div>
            <div class="chart-canvas-container">
                <canvas id="hourlyRevenueChart" width="400" height="200" style="max-height:200px"></canvas>
            </div>
        </div>
    </div>

    <!-- 菜品销量排行 + 条形图 -->
    <div class="chart-card">
        <div class="chart-title">🔥 热销菜品排行 (按销量份数)</div>
        <div id="rankListContainer" class="rank-list"></div>
    </div>

    <footer>数据基于订单实时同步 · 分析看板助力经营决策</footer>
</div>

<script>
    // ---------- Firebase 配置 (与原有项目一致) ----------
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ---------- 全局变量 ----------
    let allOrders = [];          // 存储原始订单 { id, date, total, items, paymentMethod, ... }
    let currentStartDate = null;   // Date 对象 (开始日期的00:00)
    let currentEndDate = null;     // Date 对象 (结束日期的23:59)
    
    // Chart 实例
    let revenueChart, ordersChart, paymentDonutChart, hourlyChart;
    
    // DOM 元素
    const totalRevenueEl = document.getElementById('totalRevenue');
    const totalOrdersEl = document.getElementById('totalOrders');
    const totalItemsQtyEl = document.getElementById('totalItemsQty');
    const avgTicketEl = document.getElementById('avgTicket');
    const rankContainer = document.getElementById('rankListContainer');
    
    // ---------- 辅助函数 ----------
    function formatKs(value) { return value.toLocaleString() + ' Ks'; }
    
    // 设置活跃筛选按钮样式
    function setActiveFilterButton(activeRange) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-range') === activeRange) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // 根据当前日期范围筛选订单 (基于 allOrders)
    function filterOrdersByDateRange(orders, start, end) {
        if (!start || !end) return orders.slice(); // 无筛选返回全部
        return orders.filter(order => {
            const orderDate = order.date;
            return orderDate >= start && orderDate <= end;
        });
    }
    
    // 聚合指标：总营收、订单数、总份数、客单价
    function computeKPIs(ordersInRange) {
        let revenue = 0, orderCount = ordersInRange.length, totalQty = 0;
        ordersInRange.forEach(order => {
            revenue += Number(order.total) || 0;
            if (order.items && Array.isArray(order.items)) {
                order.items.forEach(item => { totalQty += Number(item.quantity) || 0; });
            }
        });
        const avgTicket = orderCount === 0 ? 0 : revenue / orderCount;
        return { revenue, orderCount, totalQty, avgTicket };
    }
    
    // 聚合支付方式占比 (现金 vs 银行转账)
    function getPaymentDistribution(ordersInRange) {
        let cash = 0, transfer = 0;
        ordersInRange.forEach(order => {
            const method = order.paymentMethod || "现金";
            const amount = Number(order.total) || 0;
            if (method === "现金") cash += amount;
            else transfer += amount;  // 包括银行转账或其他非现金
        });
        return { cash, transfer };
    }
    
    // 聚合每日营收 & 每日订单数 (用于折线图)
    function getDailyAggregation(ordersInRange, start, end) {
        // 生成日期范围内的所有天 (用于填0)
        const daysMap = new Map();
        const current = new Date(start);
        while (current <= end) {
            const key = current.toISOString().slice(0,10);
            daysMap.set(key, { revenue: 0, orders: 0 });
            current.setDate(current.getDate() + 1);
        }
        ordersInRange.forEach(order => {
            const dateKey = order.date.toISOString().slice(0,10);
            if (daysMap.has(dateKey)) {
                const day = daysMap.get(dateKey);
                day.revenue += Number(order.total) || 0;
                day.orders += 1;
                daysMap.set(dateKey, day);
            } else {
                // 若超出边界忽略（理论上不会）
                daysMap.set(dateKey, { revenue: Number(order.total)||0, orders: 1 });
            }
        });
        // 转为排序后的数组
        const sortedKeys = Array.from(daysMap.keys()).sort();
        const labels = sortedKeys.map(d => d.slice(5)); // MM-DD
        const revenueData = sortedKeys.map(d => daysMap.get(d).revenue);
        const ordersData = sortedKeys.map(d => daysMap.get(d).orders);
        return { labels, revenueData, ordersData };
    }
    
    // 时段营收 (按小时 0~23)
    function getHourlyRevenue(ordersInRange) {
        const hourly = new Array(24).fill(0);
        ordersInRange.forEach(order => {
            const hour = order.date.getHours();
            const amount = Number(order.total) || 0;
            hourly[hour] += amount;
        });
        return hourly;
    }
    
    // 菜品销量排行 (前10)
    function getTopDishes(ordersInRange) {
        const dishMap = new Map(); // name -> 总份数
        ordersInRange.forEach(order => {
            if (order.items) {
                order.items.forEach(item => {
                    const name = item.name;
                    const qty = Number(item.quantity) || 0;
                    dishMap.set(name, (dishMap.get(name) || 0) + qty);
                });
            }
        });
        const sorted = Array.from(dishMap.entries()).sort((a,b) => b[1] - a[1]);
        const top10 = sorted.slice(0, 10);
        const maxQty = top10.length ? top10[0][1] : 1;
        return { top10, maxQty };
    }
    
    // 渲染排行榜（条形图样式）
    function renderRanking(ordersInRange) {
        const { top10, maxQty } = getTopDishes(ordersInRange);
        if (!top10.length) {
            rankContainer.innerHTML = '<div class="empty-tip">暂无菜品销售数据</div>';
            return;
        }
        let html = '';
        top10.forEach(([name, qty]) => {
            const percent = (qty / maxQty) * 100;
            html += `
                <div class="rank-item-bar">
                    <div class="rank-name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
                    <div class="bar-wrapper">
                        <div class="bar-fill" style="width: ${percent}%;">${qty}份</div>
                    </div>
                    <div class="rank-qty-num">${qty}</div>
                </div>
            `;
        });
        rankContainer.innerHTML = html;
    }
    
    // 更新所有图表（基于当前筛选出的订单）
    function updateAllChartsAndMetrics(ordersInRange, startDate, endDate) {
        // 1. KPI
        const { revenue, orderCount, totalQty, avgTicket } = computeKPIs(ordersInRange);
        totalRevenueEl.innerText = formatKs(revenue);
        totalOrdersEl.innerText = orderCount;
        totalItemsQtyEl.innerText = totalQty;
        avgTicketEl.innerText = formatKs(avgTicket);
        
        // 2. 支付环形图
        const { cash, transfer } = getPaymentDistribution(ordersInRange);
        if (paymentDonutChart) paymentDonutChart.destroy();
        const ctxPayment = document.getElementById('paymentChart').getContext('2d');
        paymentDonutChart = new Chart(ctxPayment, {
            type: 'doughnut',
            data: {
                labels: ['现金 💵', '银行转账 🏦'],
                datasets: [{
                    data: [cash, transfer],
                    backgroundColor: ['#f59e0b', '#3b82f6'],
                    borderColor: 'rgba(255,180,100,0.8)',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: true,
                plugins: { legend: { position: 'bottom', labels: { color: '#ffddbb', font: { weight: 'bold' } } } }
            }
        });
        
        // 3. 每日趋势 (折线)
        const { labels, revenueData, ordersData } = getDailyAggregation(ordersInRange, startDate, endDate);
        if (revenueChart) revenueChart.destroy();
        const revCtx = document.getElementById('revenueTrendChart').getContext('2d');
        revenueChart = new Chart(revCtx, {
            type: 'line',
            data: { labels, datasets: [{ label: '营收 (Ks)', data: revenueData, borderColor: '#ffa044', backgroundColor: 'rgba(255,160,68,0.1)', tension: 0.2, fill: true, pointBackgroundColor: '#ff7b2c' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} Ks` } } } }
        });
        if (ordersChart) ordersChart.destroy();
        const ordersCtx = document.getElementById('ordersTrendChart').getContext('2d');
        ordersChart = new Chart(ordersCtx, {
            type: 'line',
            data: { labels, datasets: [{ label: '订单数', data: ordersData, borderColor: '#67c8a0', backgroundColor: 'rgba(103,200,160,0.05)', tension: 0.2, fill: true, pointBackgroundColor: '#40b981' }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        // 4. 时段营收折线
        const hourlyData = getHourlyRevenue(ordersInRange);
        const hourLabels = Array.from({length:24}, (_,i) => `${i}:00`);
        if (hourlyChart) hourlyChart.destroy();
        const hourCtx = document.getElementById('hourlyRevenueChart').getContext('2d');
        hourlyChart = new Chart(hourCtx, {
            type: 'line',
            data: { labels: hourLabels, datasets: [{ label: '营收 (Ks)', data: hourlyData, borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} Ks` } } } }
        });
        
        // 5. 菜品排行渲染
        renderRanking(ordersInRange);
    }
    
    // ---------- 日期范围预设 + 刷新看板 ----------
    let currentRangeKey = 'last7'; // 默认近7天
    
    function setDateRangeAndRefresh(start, end, rangeKey = null) {
        if (!start || !end) return;
        currentStartDate = new Date(start);
        currentStartDate.setHours(0,0,0,0);
        currentEndDate = new Date(end);
        currentEndDate.setHours(23,59,59,999);
        
        if (rangeKey) {
            currentRangeKey = rangeKey;
            setActiveFilterButton(rangeKey);
        } else {
            // 自定义时清除按钮高亮
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        }
        
        if (allOrders.length === 0) return;
        const filtered = filterOrdersByDateRange(allOrders, currentStartDate, currentEndDate);
        updateAllChartsAndMetrics(filtered, currentStartDate, currentEndDate);
    }
    
    // 预设范围函数
    function setToday() {
        const today = new Date();
        const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const end = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23,59,59);
        setDateRangeAndRefresh(start, end, 'today');
    }
    function setLast7Days() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 6);
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        setDateRangeAndRefresh(start, end, 'last7');
    }
    function setLast30Days() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 29);
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        setDateRangeAndRefresh(start, end, 'last30');
    }
    function setThisMonth() {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1);
        const end = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23,59,59);
        setDateRangeAndRefresh(start, end, 'thisMonth');
    }
    function setLastMonth() {
        const now = new Date();
        const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0, 23,59,59);
        setDateRangeAndRefresh(lastMonthStart, lastMonthEnd, 'lastMonth');
    }
    function applyCustomRange() {
        const startInput = document.getElementById('startDate').value;
        const endInput = document.getElementById('endDate').value;
        if (!startInput || !endInput) { alert("请填写起始日期和结束日期"); return; }
        const start = new Date(startInput); start.setHours(0,0,0,0);
        const end = new Date(endInput); end.setHours(23,59,59,999);
        if (start > end) { alert("起始日期不能晚于结束日期"); return; }
        setDateRangeAndRefresh(start, end, null);
        // 保存到输入框显示
        document.getElementById('startDate').value = startInput;
        document.getElementById('endDate').value = endInput;
    }
    
    // 绑定UI事件
    function bindEvents() {
        document.querySelector('[data-range="today"]').addEventListener('click', setToday);
        document.querySelector('[data-range="last7"]').addEventListener('click', setLast7Days);
        document.querySelector('[data-range="last30"]').addEventListener('click', setLast30Days);
        document.querySelector('[data-range="thisMonth"]').addEventListener('click', setThisMonth);
        document.querySelector('[data-range="lastMonth"]').addEventListener('click', setLastMonth);
        document.getElementById('applyCustomRange').addEventListener('click', applyCustomRange);
        document.getElementById('manualRefresh').addEventListener('click', () => {
            // 手动强制重新从firestore拉取一次（不用取消监听，直接重新拉取最新数据）
            fetchOrdersOnce();
        });
    }
    
    // 拉取所有订单 (实时监听，但为了初始 + 手动刷新，采用 onSnapshot)
    let unsubscribeOrders = null;
    function initFirestoreListener() {
        if (unsubscribeOrders) unsubscribeOrders();
        unsubscribeOrders = db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const orders = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                let orderDate = data.timestamp?.toDate() || new Date();
                orders.push({
                    id: doc.id,
                    date: orderDate,
                    total: Number(data.total) || 0,
                    items: data.items || [],
                    paymentMethod: data.paymentMethod || "现金",
                    table: data.table || "?",
                });
            });
            allOrders = orders;
            // 初次加载后，如果还没有日期范围，默认近7天
            if (!currentStartDate || !currentEndDate) {
                setLast7Days();
            } else {
                // 重新根据现有范围刷新所有图表
                const filtered = filterOrdersByDateRange(allOrders, currentStartDate, currentEndDate);
                updateAllChartsAndMetrics(filtered, currentStartDate, currentEndDate);
            }
        }, error => {
            console.error("监听订单失败", error);
        });
    }
    
    // 手动刷新一次（重新触发快照，但会再次触发上面的回调，无需额外）
    function fetchOrdersOnce() {
        // 实际上onSnapshot会自动更新，无需额外代码，但为了反馈，显示tip
        alert("数据已从云端同步最新");
    }
    
    // 页面初始化
    function init() {
        bindEvents();
        initFirestoreListener();
        // 设置默认日期选择器占位值
        const todayStr = new Date().toISOString().slice(0,10);
        document.getElementById('endDate').value = todayStr;
        const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-6);
        document.getElementById('startDate').value = sevenDaysAgo.toISOString().slice(0,10);
    }
    
    // 转义xss
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    init();
</script>
</body>
</html>
