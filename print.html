<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .header { text-align: center; margin-bottom: 24px; position: relative; }
        .logo-box {
            width: 76px; height: 76px;
            background: linear-gradient(135deg, #ff7b00, #ff4500);
            border-radius: 22px; margin: 0 auto 14px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 12px 24px rgba(255, 69, 0, 0.3);
        }
        .logo-box svg { width: 38px; height: 38px; fill: #fff; }
        h1 { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
        .subtitle { color: #a0968c; font-size: 13px; }
        .preview-box {
            background: #fff; border-radius: 24px; padding: 14px;
            margin-bottom: 24px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            overflow: hidden; display: flex; justify-content: center;
        }
        canvas { background: #fff; width: 100%; max-width: 384px; height: auto; display: block; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            width: 100%; border: none; padding: 15px 24px; border-radius: 18px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff7b00, #ff4500); color: #fff;
            box-shadow: 0 8px 20px rgba(255, 69, 0, 0.25);
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.95; }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08); color: #e6e0da;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-secondary:active { background: rgba(255, 255, 255, 0.15); }
        .status-panel {
            margin-top: 16px; background: rgba(0, 0, 0, 0.2);
            border-radius: 14px; padding: 12px 16px;
            font-size: 13px; color: #ffb86c; font-family: monospace;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.03);
        }
        #contentArea { color: #e6e0da; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo-box">
                <svg viewBox="0 0 24 24">
                    <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
                </svg>
            </div>
            <h1>小票无线打印面板</h1>
            <p class="subtitle">超高速图形驱动架构（已优化清晰度）</p>
        </div>
        
        <div id="contentArea">
            <div class="preview-box">
                <canvas id="printCanvas" width="384"></canvas>
            </div>
            
            <div class="btn-group">
                <button id="bluetoothBtn" class="btn btn-primary">
                    <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24">
                        <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.29L13 18.17v-3.76l1.88 1.88z"/>
                    </svg>
                    闪电图像打印 (含Logo+单价)
                </button>
                <button id="backBtn" class="btn btn-secondary" style="display:none;" onclick="window.history.back()">返回上一页</button>
            </div>
            
            <div id="status" class="status-panel">⏰ 就绪：等待连接蓝牙打印机</div>
        </div>
    </div>
</div>

<script>
    // 1. 清空原有的超长图片代码
    const EMBEDDED_LOGO_BASE64 = "";

    // 2. 新增：定义店名文字
    const LOGO_TEXT_EN = "YeYeKao"; // 英文大字
    const LOGO_TEXT_ZH = "夜夜烤";   // 中文字点缀

    const firebaseConfig = {
        apiKey: "AIzaSyDEz" + "9V8_3g6" + "XwWlqF8" + "sY7M4n" + "Z2j0E0c",
        authDomain: "pos-system-7b83d.firebaseapp.com",
        projectId: "pos-system-7b83d",
        storageBucket: "pos-system-7b83d.appspot.com",
        messagingSenderId: "1057422204642",
        appId: "1:1057422204642:web:6ee72782998a442ae979df"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    let currentOrderData = null;
    let customLogoImage = null;
    let printDataBytes = null;
    
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    function formatNum(num) {
        if(!num) return '0';
        return Number(num).toLocaleString('en-US');
    }
    
    function drawTextWithWrapping(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split('');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }
    
    async function loadOrder() {
        const orderId = getQueryParam('id');
        if(!orderId) {
            document.getElementById('contentArea').innerHTML='<div>❌ 缺少订单 ID 参数</div>';
            return false;
        }
        try {
            const doc = await db.collection('orders').doc(orderId).get();
            if(!doc.exists) {
                document.getElementById('contentArea').innerHTML='<div>❌ 订单不存在</div>';
                return false;
            }
            const data = doc.data();
            const table = data.tableName || '随缘';
            const discount = data.discount || 0;
            const note = data.notes || '';
            const method = data.paymentMethod || '未指定';
            const total = data.totalPrice || 0;
            const finalTotal = data.finalPrice || 0;
            
            let items = [];
            if(data.items && Array.isArray(data.items)){
                items = data.items.map(i => ({
                    name: i.name || '未知菜品',
                    price: i.price || 0,
                    qty: i.quantity || 1,
                    subtotal: (i.price || 0) * (i.quantity || 1)
                }));
            }
            
            let now = new Date();
            if(data.createdAt) {
                if(data.createdAt.toDate) now = data.createdAt.toDate();
                else if(data.createdAt.seconds) now = new Date(data.createdAt.seconds * 1000);
            }
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            currentOrderData = {table, discount, note, method, items, total, finalTotal, timeStr};
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML = `<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display = 'block';
            return false;
        }
    }
    
    function loadEmbeddedLogo() {
        if(EMBEDDED_LOGO_BASE64 && EMBEDDED_LOGO_BASE64.startsWith('data:image')){
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                customLogoImage = img;
                refreshPrint();
            };
            img.onerror = () => { customLogoImage=null; refreshPrint(); };
            img.src = EMBEDDED_LOGO_BASE64;
        } else {
            customLogoImage = null;
            refreshPrint();
        }
    }
    
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        loadEmbeddedLogo();
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
    }
    
    function refreshPrint() {
        if(!currentOrderData) return;
        printDataBytes = generateReceiptImageBytes(currentOrderData, customLogoImage);
    }

    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, method, items, total, finalTotal, timeStr } = order;
        
        // 临时绘制用于精确测算高度 (调大品名字体到 19px bold)
        ctx.font = 'bold 19px "Segoe UI", sans-serif';
        let calculatedItemsHeight = 0;
        for (let it of items) {
            let itemLines = 1;
            let line = '';
            for (let char of it.name.split('')) {
                if (ctx.measureText(line + char).width > 165) {
                    itemLines++;
                    line = char;
                } else {
                    line += char;
                }
            }
            calculatedItemsHeight += Math.max(32, itemLines * 24) + 8;
        }

        let padding = 12;
        let titleHeight = 95; 
        let infoHeight = 32 * 4 + 28; 
        let headerHeight = 36;
        let summaryHeight = 28 + 28 + 36 + (discount > 0 ? 28 : 0) + (note ? 38 : 0) + 32 + 32;
        
        canvas.height = padding + titleHeight + infoHeight + headerHeight + calculatedItemsHeight + summaryHeight + 20;
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';
        let y = padding;
        
        // 渲染全新艺术字招牌 (代替图片Logo)
        ctx.textAlign = 'center';
        ctx.font = 'bold 38px "Arial Black", sans-serif';
        ctx.fillText("YeYeKao", canvas.width/2, y);
        y += 45;
        
        ctx.font = 'bold 22px "SimSun", "Segoe UI", serif';
        ctx.fillText("夜夜烤", canvas.width/2, y);
        y += 40;
        
        // 调整小票信息，加粗放大
        ctx.font = 'bold 19px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("📞 电话: 09795858987", canvas.width/2, y); y += 30;
        
        ctx.textAlign = 'left';
        ctx.font = 'bold 24px "Segoe UI", sans-serif'; 
        ctx.fillText(`桌号：${table}号桌`, 8, y); y += 34;
        
        ctx.font = 'bold 19px "Segoe UI", sans-serif';
        ctx.fillText(`时间：${timeStr}`, 8, y); y += 28;
        ctx.fillText(`支付：${method}`, 8, y); y += 32;
        ctx.font = 'bold 19px monospace';
        ctx.fillText("-------------------------------------------", 4, y); y += 24;
        
        // 新排版表头
        ctx.font = 'bold 20px "Segoe UI", sans-serif';
        ctx.textAlign = 'left'; ctx.fillText("品名", 6, y);
        ctx.textAlign = 'right'; ctx.fillText("单价×数量", 285, y);
        ctx.textAlign = 'right'; ctx.fillText("金额(Ks)", 375, y);
        y += 32;
        
        // 动态循环渲染菜品列表
        ctx.font = 'bold 19px "Segoe UI", sans-serif';
        for (let it of items) {
            let startY = y;
            ctx.textAlign = 'left';
            let lastY = drawTextWithWrapping(ctx, it.name, 6, y, 165, 24);
            
            ctx.textAlign = 'right';
            ctx.fillText(`${it.price}×${it.qty}`, 285, startY);
            ctx.fillText(formatNum(it.subtotal), 375, startY);
            
            y = Math.max(lastY + 24, startY + 32) + 8;
        }
        
        ctx.font = 'bold 19px monospace';
        ctx.textAlign = 'left';
        ctx.fillText("-------------------------------------------", 4, y); y += 24;
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText(`原价合计：${formatNum(total)} Ks`, 8, y); y += 30;
        if (discount > 0) ctx.fillText(`优惠金额：- ${formatNum(discount)} Ks`, 8, y), y+=30;
        
        ctx.font = 'bold 28px sans-serif'; 
        ctx.fillText(`实收金额：${formatNum(finalTotal)} Ks`, 8, y); y += 40;
        
        ctx.font = 'bold 19px sans-serif';
        if (note) ctx.fillText(`备注：${note}`, 8, y), y+=32;
        ctx.fillText("-------------------------------------------", 4, y); y+=24;
        ctx.textAlign = 'center';
        ctx.font = 'bold 21px sans-serif';
        ctx.fillText("感谢光临，欢迎下次惠顾！", canvas.width/2, y);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00];
        escPosBytes.push(widthBytes & 0xFF, (widthBytes >> 8) & 0xFF);
        escPosBytes.push(canvas.height & 0xFF, (canvas.height >> 8) & 0xFF);
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    let r = imgData.data[pixelIndex];
                    let g = imgData.data[pixelIndex+1];
                    let bl = imgData.data[pixelIndex+2];
                    let brightness = (r+g+bl)/3;
                    if (brightness < 165) byteVal |= (1 << (7-b)); 
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }

    // 高速无延迟分片发送函数
    async function sendChunked(characteristic, dataBytes, chunkSize=120) {
        for (let i=0; i<dataBytes.length; i+=chunkSize) {
            await characteristic.writeValue(dataBytes.slice(i, i+chunkSize));
        }
    }
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        if (!navigator.bluetooth) { statusDiv.innerText = "❌ 浏览器不支持Web Bluetooth"; return; }
        if (!printDataBytes) { statusDiv.innerText = "❌ 图像未生成"; return; }
        statusDiv.innerText = "🔍 正在搜索打印机...";
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 连接中...";
            const server = await device.gatt.connect();
            let service;
            try { service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455'); } catch(e) { service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); }
            const chars = await service.getCharacteristics();
            let writeChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            if (!writeChar) throw new Error("未找到写入特征");
            statusDiv.innerText = "⚡ 打印中...";
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            await new Promise(r=>setTimeout(r,5)); 
            await sendChunked(writeChar, printDataBytes, 120);
            await writeChar.writeValue(new Uint8Array([0x1D, 0x56, 0x41, 0x10])); 
            statusDiv.innerText = "🎉 打印成功！";
            setTimeout(() => { device.gatt.disconnect(); statusDiv.innerText = "⏰ 连接已关闭，就绪"; }, 1000);
        } catch (error) {
            statusDiv.innerText = "❌ 打印失败: " + error.message;
            console.error(error);
        }
    }
    
    window.onload = init;
</script>
</body>
</html>
