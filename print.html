    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 170, 80, 0.2);
            border: 1px solid #ffaa50;
            color: #ffefcf;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .btn-back {
            background: linear-gradient(120deg, #4b5563, #374151);
            margin-top: 10px;
        }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; word-break: break-word; }
        #printCanvas { display: none; }
        .order-preview {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .col-name { flex: 1; padding-right: 8px; word-break: break-all; }
        .col-price { width: 90px; text-align: right; }
        .col-total { width: 85px; text-align: right; }
    </style>
</head>

                projectId: "bbq-bill",
                storageBucket: "bbq-bill.appspot.com",
                messagingSenderId: "385739201",
                appId: "1:385739201:web:abc123xyz"
            };
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            
            const doc = await db.collection('orders').doc(id).get();
            if(!doc.exists) {
                document.getElementById('contentArea').innerHTML = '<div>❌ 订单未找到</div>';
                return false;
            }
            const data = doc.data();
            
            const table = data.table || '未知桌号';
            const discount = Number(data.discount || 0);
            const note = data.note || '';
            const method = data.method || '未指定';
            const items = data.items || [];
            const total = Number(data.total || 0);
            const finalTotal = Number(data.finalTotal || total);
            
            let html = `
                <div style="font-size:18px; font-weight:bold; color:#ffaa50; margin-bottom:12px;">桌号: ${escapeHtml(table)}</div>
                <div style="margin-bottom:6px; opacity:0.8;">时间: ${escapeHtml(data.time || '')}</div>
                <div style="margin-bottom:12px; opacity:0.8;">支付方式: ${escapeHtml(method)}</div>
                <div class="order-preview">
                    <div class="flex-row" style="font-weight:bold; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:4px; margin-bottom:6px;">
                        <span class="col-name">品名</span>
                        <span class="col-price">数量×单价</span>
                        <span class="col-total">金额</span>
                    </div>
            `;
            
            items.forEach(it => {
                const itemTotal = it.count * it.price;
                html += `
                    <div class="flex-row" style="margin-bottom:4px;">
                        <span class="col-name">${escapeHtml(it.name)}</span>
                        <span class="col-price">${it.count} × ${it.price}</span>
                        <span class="col-total">${itemTotal}</span>
                    </div>
                `;
            });
            
            html += `</div>`;
            
            // 核心前端页面计算展示修改
            const taxAmount = Math.round(total * 0.05);
            const newFinalTotal = total + taxAmount;

            html += `
                <div style="margin-top:12px; text-align:right; font-size:14px;">
                    <div>原价 (小计): <span style="font-weight:bold;">${total}</span></div>
                    <div style="color: #ffaa66;">5% 税费: <span style="font-weight:bold;">+${taxAmount}</span></div>
                    <div style="font-size:20px; color:#ffaa50; margin-top:4px;">实际收款金额: <span>${newFinalTotal}</span></div>
                </div>
            `;
            if(note) {
                html += `<div style="margin-top:10px; padding:8px; background:rgba(255,255,255,0.05); border-radius:12px; font-size:12px; color:#ffcf9f;">备注: ${escapeHtml(note)}</div>`;
            }
            
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('bluetoothBtn').style.display = 'block';
            
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            // 重新整理打印数据结构
            currentOrderData = {
                table, 
                discount, 
                note, 
                method, 
                items, 
                total, 
                taxAmount, // 新增税费值
                finalTotal: newFinalTotal, // 新的实际收款
                timeStr
            };
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML = `<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display = 'block';
            return false;
        }
    }
    
    function loadEmbeddedLogo() {
        if(EMBEDDED_LOGO_BASE64 && EMBEDDED_LOGO_BASE64.startsWith('data:image')){
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                customLogoImage = img;
                refreshPrint();
            };
            img.onerror = () => { customLogoImage = null; refreshPrint(); };
            img.src = EMBEDDED_LOGO_BASE64;
        } else {
            customLogoImage = null;
            refreshPrint();
        }
    }
    
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        loadEmbeddedLogo();
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
    }
    
    function escapeHtml(s){ if(!s)return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }

    // =================================== 🖨️ 高清画布图形绘制核心逻辑 ===================================
    function refreshPrint() {
        if(!currentOrderData) return;
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        // 分辨率提升核心：由于 width 变成了 768，基础步长乘 2 (scale = 2)
        const scale = 2;
        const baseWidth = 384; 
        const cWidth = baseWidth * scale; // 768
        
        // 动态计算整体高清高度
        let currentY = 20 * scale; 
        
        if (customLogoImage) { currentY += 90 * scale; }
        currentY += 45 * scale; // 店名
        currentY += 30 * scale; // 桌号
        currentY += 25 * scale; // 时间
        currentY += 25 * scale; // 支付方式
        currentY += 15 * scale; // 分割线
        
        // 商品列表行高
        currentOrderData.items.forEach(() => { currentY += 50 * scale; });
        
        currentY += 15 * scale; // 分割线
        currentY += 30 * scale; // 原价
        currentY += 30 * scale; // 税费行
        currentY += 40 * scale; // 实际收款
        
        if(currentOrderData.note) { currentY += 50 * scale; }
        currentY += 40 * scale; // 留白尾部高度
        
        canvas.height = currentY;
        
        // 开始高清绘制背景色与文字
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, cWidth, canvas.height);
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';
        
        let y = 15 * scale;
        
        // 1. 绘制 Logo
        if (customLogoImage) {
            const logoW = 160 * scale;
            const logoH = 80 * scale;
            const logoX = (cWidth - logoW) / 2;
            ctx.drawImage(customLogoImage, logoX, y, logoW, logoH);
            y += 85 * scale;
        }
        
        // 2. 标题文字字号翻倍
        ctx.font = `bold ${28 * scale}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText("夜夜烤", cWidth / 2, y);
        y += 40 * scale;
        
        // 3. 桌号
        ctx.font = `bold ${22 * scale}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(`桌号: ${currentOrderData.table}`, 16 * scale, y);
        y += 32 * scale;
        
        // 4. 小字信息
        ctx.font = `${14 * scale}px sans-serif`;
        ctx.fillText(`时间: ${currentOrderData.timeStr}`, 16 * scale, y);
        y += 24 * scale;
        ctx.fillText(`支付: ${currentOrderData.method}`, 16 * scale, y);
        y += 24 * scale;
        
        // 5. 分割线
        ctx.font = `${14 * scale}px sans-serif`;
        ctx.fillText("-".repeat(46), 16 * scale, y);
        y += 20 * scale;
        
        // 6. 循环打印高清菜品列表
        currentOrderData.items.forEach(it => {
            // 品名
            ctx.font = `bold ${16 * scale}px sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText(it.name, 16 * scale, y);
            y += 22 * scale;
            
            // 数量和单价金额
            ctx.font = `${15 * scale}px sans-serif`;
            ctx.fillText(`  ${it.count} × ${it.price}`, 16 * scale, y);
            
            ctx.textAlign = 'right';
            ctx.fillText((it.count * it.price).toString(), cWidth - (16 * scale), y);
            y += 26 * scale;
        });
        
        // 7. 第二道分割线
        ctx.textAlign = 'left';
        ctx.fillText("-".repeat(46), 16 * scale, y);
        y += 20 * scale;
        
        // 8. 结算区域数据重构展示
        ctx.font = `${16 * scale}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText("原价 (小计):", 16 * scale, y);
        ctx.textAlign = 'right';
        ctx.fillText(currentOrderData.total.toString(), cWidth - (16 * scale), y);
        y += 30 * scale;
        
        // 新增 5% 税费的高清画布打印渲染
        ctx.textAlign = 'left';
        ctx.fillText("5% 税费:", 16 * scale, y);
        ctx.textAlign = 'right';
        ctx.fillText(`+${currentOrderData.taxAmount}`, cWidth - (16 * scale), y);
        y += 30 * scale;
        
        // 实际收款金额加大字号加粗
        ctx.font = `bold ${22 * scale}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText("实际收款:", 16 * scale, y);
        ctx.textAlign = 'right';
        ctx.fillText(currentOrderData.finalTotal.toString(), cWidth - (16 * scale), y);
        y += 42 * scale;
        
        // 9. 备注
        if(currentOrderData.note){
            ctx.font = `${14 * scale}px sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText(`备注: ${currentOrderData.note}`, 16 * scale, y);
            y += 30 * scale;
        }

        // 💡 重点：此处已完整移除“谢谢光临，欢迎下次光临”的文字渲染逻辑
    }

    // =================================== ⚡ 蓝牙闪电底层传输驱动 ===================================
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "正在连接蓝牙打印机...";
        try {
            const canvas = document.getElementById('printCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;
            
            const gridWidth = w; 
            const gridHeight = h;
            const bitWidth = gridWidth;
            const byteWidth = bitWidth / 8;
            
            const dots = new Uint8Array(byteWidth * gridHeight);
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < bitWidth; x++) {
                    const idx = (y * gridWidth + x) * 4;
                    const r = imgData[idx];
                    const g = imgData[idx + 1];
                    const b = imgData[idx + 2];
                    const gray = r * 0.299 + g * 0.587 + b * 0.114;
                    if (gray < 140) {
                        const byteIdx = y * byteWidth + Math.floor(x / 8);
                        const bitIdx = 7 - (x % 8);
                        dots[byteIdx] |= (1 << bitIdx);
                    }
                }
            }
            
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            
            statusDiv.innerText = "设备已连，正在高速传送数据...";
            
            const initCmd = new Uint8Array([0x1B, 0x40]);
            await characteristic.writeValue(initCmd);
            
            // 传输位图指令适配 768 的 byteWidth
            const cmdHeader = new Uint8Array([0x1D, 0x76, 0x30, 0, byteWidth & 0xFF, (byteWidth >> 8) & 0xFF, gridHeight & 0xFF, (gridHeight >> 8) & 0xFF]);
            
            const chunkSize = 20;
            const totalLength = cmdHeader.length + dots.length + 4;
            const buffer = new Uint8Array(totalLength);
            buffer.set(cmdHeader, 0);
            buffer.set(dots, cmdHeader.length);
            buffer.set([0x1D, 0x56, 0x41, 10], cmdHeader.length + dots.length);
            
            for (let i = 0; i < buffer.length; i += chunkSize) {
                const chunk = buffer.slice(i, i + chunkSize);
                await characteristic.writeValue(chunk);
            }
            
            statusDiv.innerText = "🎉 打印成功！";
        } catch (error) {
            statusDiv.innerText = "❌ 错误: " + error.message;
        }
    }
    
    window.onload = init;
</script>
