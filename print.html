<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 170, 80, 0.2);
            border: 1px solid #ffaa50;
            color: #ffefcf;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary {
            background: linear-gradient(120deg, #6b21a5, #581c87);
        }
        .btn-back {
            background: linear-gradient(120deg, #4b5563, #374151);
            margin-top: 10px;
        }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; word-break: break-word; }
        #printCanvas { display: none; }
        .logo-upload-area {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px dashed #ffaa80;
        }
        .logo-label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        #logoPreviewImg {
            max-width: 100px;
            max-height: 60px;
            background: white;
            border-radius: 8px;
            object-fit: contain;
            padding: 4px;
            background: #f5e6d3;
        }
        .file-input-label {
            background: #ffaa50;
            color: #2a1a0e;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        .file-input-label input {
            display: none;
        }
        .info-note {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 6px;
        }
        .base64-output {
            background: #1e1a14;
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            margin-top: 10px;
            border: 1px solid #ffaa5044;
            display: none;
        }
        .copy-btn {
            background: #3b2c1c;
            border: none;
            color: #ffefcf;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            margin-top: 6px;
            cursor: pointer;
        }
        .order-preview {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="version-tag">v3.0 永久Logo+单价版</div>
        
        <!-- 永久Logo配置区（可隐藏，但保留用于更换） -->
        <div class="logo-upload-area">
            <div class="logo-label">🏷️ 店铺Logo (永久嵌入/可更换)</div>
            <div class="logo-preview">
                <img id="logoPreviewImg" alt="当前logo" style="max-width:100px; max-height:60px; background:white; border-radius:6px;">
                <label class="file-input-label">
                    📂 更换Logo并生成永久代码
                    <input type="file" id="logoUpload" accept="image/jpeg,image/png,image/webp">
                </label>
            </div>
            <div class="info-note">
                💡 提示：当前页面已内置永久Logo（自动加载）。如果您想更换成自己的图片，上传一次后会自动复制Base64代码，然后替换代码中的 <strong>EMBEDDED_LOGO_BASE64</strong> 变量即可永久生效。
            </div>
            <div id="base64Box" class="base64-output">
                <div style="font-weight:bold;">📋 新Logo的Base64代码 (复制后替换到HTML中):</div>
                <textarea id="base64Text" rows="2" readonly style="width:100%; background:#2a2218; color:#ffefcf; border:none; font-size:10px; margin-top:6px;"></textarea>
                <button id="copyBase64Btn" class="copy-btn">📋 复制代码</button>
            </div>
        </div>

        <div id="contentArea">📡 加载订单中...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 闪电图像打印 (含Logo+单价)</button>
        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="history.back()">⬅️ 返回上一页</button>
        
        <div id="status" class="status"></div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    // ======================= 🔥 在这里嵌入您自己的Logo (Base64) =======================
    // 您可以将自己的图片转换成Base64字符串，替换下面这个变量。
    // 示例是一个烧烤风格的小图标（炭火简图），您可以完全替换。
    const EMBEDDED_LOGO_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAAAkCAYAAAB6jFcNAAAACXBIWXMAAAsTAAALEwEAmpwYAAAB00lEQVR4nO2aPU7DQBCF35KLSBQRSBQRSBQRSBSISERKmihoUuYUNDZ0FG5BwfVo4y+y1yG2s46zXnkSrdd27M9vdrw7sSxL5+zAJnAMXALXwB3wDPwAfy6yHwC7wGmWZW90zowUgSfqvwEwAMZAW/ZsRbIEzIFK9tyJtJI8ABPgDXgr+pfAjOxVMSnY3tkyBzrAqOy/kL2qBbtVmJzIOrAFjMt+S/ZqWLG+5yKrwBZzDkw2idn/z2dWm9lU+3fA/M86UczJ1ovY0mT3rGzI7qkA+U29K/0x+U29K/0x+U29K/0x+U29K/0x+b8G5LvI4DHwbC32K+QHeCv7pbmR/e4gY/KbegEYy5O/cB8H2AWeaETxtG+kn/N4cfQpEfUfRcQ8T7cXJeq/9E1cREHZxy4H2Cv7hbnwFdOI+x4nd0VU9F8FHEWdwMu/qj/L/oeh2S9FJpeKLpJOTwX3dS9lvyTrXZJIuq/Bq+Lz7/JbKcQBP8Br2S/JGpftbVv5u2dUO73bMudtkTzJMhuyz0J2E4h5S9PJyOPh1YzJ/5UpKz2fMflPmZL+/0f1T29K/2D+hM+j/8Z9WvQDazg5CwG2jH0AAAAASUVORK5CYII=";
    // 如果不想用任何Logo，保留空字符串 '' 即可显示默认文字“夜夜烤烧烤”
    // ====================================================================

    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null;
    let currentOrderData = {
        table: '', discount: 0, note: '', method: '现金', items: [], total: 0, finalTotal: 0, timeStr: ''
    };
    let customLogoImage = null;      // 存储图片对象

    function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
    function formatNum(n) { return Number(n).toLocaleString(); }
    function cleanText(str) {
        if (!str) return '';
        return str.replace(/[\p{Emoji}\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
    }

    // 生成小票图像 (支持Logo)
    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, method, items, total, finalTotal, timeStr } = order;
        
        let rowHeight = 28;
        let padding = 12;
        let titleHeight = 0;
        let infoHeight = 28 * 4 + 24;
        let headerHeight = 32;
        let itemsHeight = items.length * rowHeight;
        let summaryHeight = 24 + 24 + 32 + (discount > 0 ? 24 : 0) + (note ? 35 : 0) + 28 + 28;
        
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            const maxLogoWidth = 280;
            let logoWidth = logoImg.naturalWidth;
            let logoHeight = logoImg.naturalHeight;
            let drawWidth = Math.min(logoWidth, maxLogoWidth);
            let drawHeight = (drawWidth / logoWidth) * logoHeight;
            titleHeight = drawHeight + 12;
        } else {
            titleHeight = 48;
        }
        
        let calculatedHeight = padding + titleHeight + infoHeight + headerHeight + itemsHeight + summaryHeight + 20;
        canvas.height = Math.max(600, calculatedHeight);
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';
        let y = padding;
        
        // 绘制Logo或店名
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            const maxLogoWidth = 280;
            let logoWidth = logoImg.naturalWidth;
            let logoHeight = logoImg.naturalHeight;
            let drawWidth = Math.min(logoWidth, maxLogoWidth);
            let drawHeight = (drawWidth / logoWidth) * logoHeight;
            let drawX = (canvas.width - drawWidth) / 2;
            ctx.drawImage(logoImg, drawX, y, drawWidth, drawHeight);
            y += drawHeight + 10;
        } else {
            ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("夜夜烤烧烤", canvas.width/2, y);
            y += 42;
        }
        
        // 电话 (已修改) + 基本信息
        ctx.font = '18px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("📞 电话: 09795858987", canvas.width/2, y); y += 26;
        ctx.textAlign = 'left';
        ctx.font = 'bold 20px "Segoe UI", sans-serif';
        ctx.fillText(`桌号：${table}号桌`, 8, y); y += 28;
        ctx.font = '17px "Segoe UI", sans-serif';
        ctx.fillText(`时间：${timeStr}`, 8, y); y += 24;
        ctx.fillText(`支付：${method}`, 8, y); y += 28;
        ctx.fillText("-------------------------------------------", 4, y); y += 22;
        
        // 表头 (品名, 单价×数量, 金额)
        ctx.font = 'bold 17px "Segoe UI", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText("品名", 6, y);
        ctx.fillText("单价×数量", 140, y);
        ctx.textAlign = 'right';
        ctx.fillText("金额(Ks)", 370, y);
        y += 28;
        
        ctx.font = '16px "Segoe UI", sans-serif';
        for (let it of items) {
            let name = it.name.length > 8 ? it.name.slice(0,7)+"…" : it.name;
            let priceQtyStr = `${it.price}×${it.qty}`;
            ctx.textAlign = 'left';
            ctx.fillText(name, 6, y);
            ctx.fillText(priceQtyStr, 140, y);
            ctx.textAlign = 'right';
            ctx.fillText(formatNum(it.subtotal), 370, y);
            y += rowHeight;
        }
        
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.fillText("-------------------------------------------", 4, y); y += 20;
        ctx.font = '18px sans-serif';
        ctx.fillText(`原价合计：${formatNum(total)} Ks`, 8, y); y += 26;
        if (discount > 0) ctx.fillText(`优惠金额：- ${formatNum(discount)} Ks`, 8, y), y+=26;
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText(`实收金额：${formatNum(finalTotal)} Ks`, 8, y); y += 34;
        ctx.font = '16px sans-serif';
        if (note) ctx.fillText(`备注：${note}`, 8, y), y+=28;
        ctx.fillText("-------------------------------------------", 4, y); y+=20;
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText("感谢光临，欢迎下次惠顾！", canvas.width/2, y);
        
        // 转ESC/POS点阵数据
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00];
        escPosBytes.push(widthBytes & 0xFF, (widthBytes >> 8) & 0xFF);
        escPosBytes.push(canvas.height & 0xFF, (canvas.height >> 8) & 0xFF);
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    let r = imgData.data[pixelIndex];
                    let g = imgData.data[pixelIndex+1];
                    let bl = imgData.data[pixelIndex+2];
                    let brightness = (r+g+bl)/3;
                    if (brightness < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }
    
    async function sendChunked(characteristic, dataBytes, chunkSize=120) {
        for (let i=0; i<dataBytes.length; i+=chunkSize) {
            await characteristic.writeValue(dataBytes.slice(i, i+chunkSize));
            await new Promise(r=>setTimeout(r,2));
        }
    }
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        if (!navigator.bluetooth) { statusDiv.innerText = "❌ 浏览器不支持Web Bluetooth"; return; }
        if (!printDataBytes) { statusDiv.innerText = "❌ 图像未生成"; return; }
        statusDiv.innerText = "🔍 正在搜索打印机...";
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 连接中...";
            const server = await device.gatt.connect();
            let service;
            try { service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455'); } catch(e) { service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); }
            const chars = await service.getCharacteristics();
            let writeChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            if (!writeChar) throw new Error("未找到写入特征");
            statusDiv.innerText = "⚡ 打印中...";
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40]));
            await new Promise(r=>setTimeout(r,30));
            await sendChunked(writeChar, printDataBytes, 120);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03]));
            statusDiv.innerText = "✅ 打印完成！";
        } catch(err) { statusDiv.innerText = "❌ 打印失败: "+err.message; }
    }
    
    // 刷新打印数据 + 预览
    async function refreshPrint() {
        const statusDiv = document.getElementById('status');
        if (!currentOrderData.items.length) return;
        statusDiv.innerText = "🖌️ 生成带Logo的小票...";
        if (customLogoImage && !customLogoImage.complete) await new Promise(r=>{ customLogoImage.onload=r; });
        printDataBytes = generateReceiptImageBytes(currentOrderData, customLogoImage);
        updatePreview();
        statusDiv.innerText = "✅ 小票就绪 (含单价+永久Logo)";
        document.getElementById('bluetoothBtn').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
    }
    
    function updatePreview() {
        const { table, discount, note, method, items, total, finalTotal, timeStr } = currentOrderData;
        let itemsHtml = items.map(i => `<div class="flex-row" style="margin-bottom:5px;"><span>${escapeHtml(i.name)}</span><span>${i.price}×${i.qty}</span><span>${formatNum(i.subtotal)}Ks</span></div>`).join('');
        document.getElementById('contentArea').innerHTML = `
            <div style="font-size:12px;">
                <div style="text-align:center; font-weight:bold;">🧾 订单预览 (单价模式)</div>
                <div>🏷️ 桌号: ${escapeHtml(table)}</div>
                <div>📞 电话: 09795858987</div>
                <div>⏰ ${timeStr}  💳 ${method}</div>
                <hr>
                ${itemsHtml}
                <hr>
                <div>💰 原价: ${formatNum(total)} Ks</div>
                ${discount>0?`<div>🎁 优惠: -${formatNum(discount)} Ks</div>`:''}
                <div style="font-weight:bold;">💵 实收: ${formatNum(finalTotal)} Ks</div>
                ${note?`<div>📝 备注: ${escapeHtml(note)}</div>`:''}
                <div style="text-align:center; margin-top:8px;">✨ 永久Logo已嵌入 ✨</div>
            </div>
        `;
    }
    
    // 从Firebase加载订单数据
    async function loadOrder() {
        const table = getQueryParam('table');
        const discount = Number(getQueryParam('discount')||'0');
        let note = cleanText(getQueryParam('note')||'');
        const method = getQueryParam('method')||'现金';
        if (!table) { document.getElementById('contentArea').innerHTML='<div>❌ 缺少桌号</div>'; return false; }
        try {
            const snapshot = await db.collection("pending_orders").where("table","==",table).get();
            if(snapshot.empty) throw new Error(`未找到${table}号桌订单`);
            let items=[], total=0;
            for(const doc of snapshot.docs){
                const order=doc.data();
                if(order.items){
                    for(const it of order.items){
                        let qty=Number(it.quantity)||0, price=Number(it.price)||0;
                        if(qty===0) continue;
                        let name=cleanText(it.name)||"菜品";
                        let subtotal=qty*price;
                        total+=subtotal;
                        items.push({name, qty, price, subtotal});
                    }
                }
            }
            if(items.length===0) throw new Error("无有效菜品");
            const finalTotal=Math.max(0,total-discount);
            const now=new Date();
            const timeStr=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            currentOrderData={table, discount, note, method, items, total, finalTotal, timeStr};
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML=`<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display='block';
            return false;
        }
    }
    
    // 从Base64加载内置Logo
    function loadEmbeddedLogo() {
        if(EMBEDDED_LOGO_BASE64 && EMBEDDED_LOGO_BASE64.startsWith('data:image')){
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                customLogoImage = img;
                document.getElementById('logoPreviewImg').src = EMBEDDED_LOGO_BASE64;
                refreshPrint();
            };
            img.onerror = () => { console.warn("内置Logo加载失败，使用默认店名"); customLogoImage=null; refreshPrint(); };
            img.src = EMBEDDED_LOGO_BASE64;
        } else {
            customLogoImage = null;
            refreshPrint();
        }
    }
    
    // 上传新Logo并生成Base64工具
    function initUploadTool() {
        const upload = document.getElementById('logoUpload');
        const base64Box = document.getElementById('base64Box');
        const base64Text = document.getElementById('base64Text');
        const copyBtn = document.getElementById('copyBase64Btn');
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const base64 = ev.target.result;
                base64Text.value = base64;
                base64Box.style.display = 'block';
                // 临时预览并刷新打印
                const tempImg = new Image();
                tempImg.onload = () => {
                    customLogoImage = tempImg;
                    document.getElementById('logoPreviewImg').src = base64;
                    refreshPrint();
                };
                tempImg.src = base64;
            };
            reader.readAsDataURL(file);
        });
        copyBtn.addEventListener('click', () => {
            base64Text.select();
            document.execCommand('copy');
            alert("Base64代码已复制，请替换代码中的 EMBEDDED_LOGO_BASE64 变量并重新上传到GitHub");
        });
    }
    
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        initUploadTool();
        loadEmbeddedLogo();  // 自动加载内置永久Logo
    }
    
    function escapeHtml(s){ if(!s)return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    window.onload = init;
</script>
</body>
</html>
