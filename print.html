<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 540px; width: 100%; }
        .card { background: rgba(35, 26, 18, 0.9); backdrop-filter: blur(10px); border-radius: 24px; padding: 25px; border: 1px solid rgba(255, 170, 80, 0.2); color: #ffefcf; }
        .btn { background: #ffaa50; color: #1a140e; padding: 16px; border-radius: 16px; font-weight: bold; border: none; width: 100%; margin-top: 20px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-back { background: rgba(255, 255, 255, 0.05); color: #ffefcf; margin-top: 10px; }
        hr { border: 0; border-top: 1px dashed rgba(255,180,100,0.3); margin: 15px 0; }
        .status { margin-top: 15px; font-size: 12px; color: #ffaa66; text-align: center; }
        #printCanvas { display: none; }
        .flex-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="contentArea">📡 正在读取数据...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 确认并打印小票</button>
        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="history.back()">⬅️ 返回</button>
        <div id="status" class="status"></div>
    </div>
</div>
<canvas id="printCanvas" width="384"></canvas>

<script>
    const LOGO_URL = "打印logo.png";
    const firebaseConfig = { apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", authDomain: "yeyekao-3878d.firebaseapp.com", projectId: "yeyekao-3878d", storageBucket: "yeyekao-3878d.firebasestorage.app", messagingSenderId: "560765118345", appId: "1:560765118345:web:5f24d021e7a6db90b76358" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null;
    let currentOrderData = { table: '', discount: 0, note: '', items: [], total: 0, tax: 0, finalTotal: 0, timeStr: '' };

    function formatNum(n) { return Math.round(n).toLocaleString(); }
    async function sendChunked(characteristic, dataBytes, chunkSize=120) {
        for (let i=0; i<dataBytes.length; i+=chunkSize) await characteristic.writeValue(dataBytes.slice(i, i+chunkSize));
    }

    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, items, total, tax, finalTotal, timeStr } = order;
        canvas.height = 800 + (items.length * 30);
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000'; ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText("夜夜烤烧烤", 192, 40);
        ctx.font = '16px sans-serif'; ctx.fillText("09795858987", 192, 70);
        ctx.textAlign = 'left'; ctx.fillText("Table: " + table, 20, 110);
        ctx.fillText("Time: " + timeStr, 20, 135);
        ctx.fillText("------------------------------------------", 10, 160);
        let y = 190;
        items.forEach(it => {
            ctx.fillText(it.name + " x" + it.qty, 20, y);
            ctx.textAlign = 'right'; ctx.fillText(formatNum(it.subtotal) + " Ks", 370, y);
            ctx.textAlign = 'left'; y += 30;
        });
        ctx.fillText("------------------------------------------", 10, y); y += 30;
        ctx.fillText("小计: " + formatNum(total) + " Ks", 20, y); y += 25;
        if(discount>0) { ctx.fillText("折扣: -" + formatNum(discount) + " Ks", 20, y); y += 25; }
        ctx.fillText("税费(5%): +" + formatNum(tax) + " Ks", 20, y); y += 30;
        ctx.font = 'bold 22px sans-serif'; ctx.fillText("总计: " + formatNum(finalTotal) + " Ks", 20, y);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, canvas.height & 0xFF, (canvas.height >> 8) & 0xFF];
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    if ((imgData.data[pixelIndex]+imgData.data[pixelIndex+1]+imgData.data[pixelIndex+2])/3 < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }

    async function bluetoothPrint() {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }], optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455');
            const chars = await service.getCharacteristics();
            const writeChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40]));
            await sendChunked(writeChar, printDataBytes, 120);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03]));
            document.getElementById('status').innerText = "✅ 打印完成";
        } catch(e) { document.getElementById('status').innerText = "❌ 错误: " + e.message; }
    }

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const snapshot = await db.collection("pending_orders").where("table","==",params.get('table')).get();
        let items = [], total = 0;
        snapshot.docs.forEach(doc => (doc.data().items||[]).forEach(it => { if(it.quantity>0) { total += it.quantity*it.price; items.push({name: it.name, qty: it.quantity, subtotal: it.quantity*it.price}); }}));
        const base = Math.max(0, total - Number(params.get('discount')||0));
        currentOrderData = { table: params.get('table'), items, total, tax: base*0.05, finalTotal: base*1.05, timeStr: new Date().toLocaleString() };
        
        printDataBytes = generateReceiptImageBytes(currentOrderData, null);
        document.getElementById('contentArea').innerHTML = `<div>订单预览 - Table ${currentOrderData.table}</div><hr><div>总计: ${formatNum(currentOrderData.finalTotal)} Ks</div>`;
        document.getElementById('bluetoothBtn').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('bluetoothBtn').onclick = bluetoothPrint;
    };
</script>
</body>
</html>
