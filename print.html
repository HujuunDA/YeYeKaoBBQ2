<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 170, 80, 0.2);
            border: 1px solid #ffaa50;
            color: #ffefcf;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .btn-back {
            background: linear-gradient(120deg, #4b5563, #374151);
            margin-top: 10px;
        }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; word-break: break-word; }
        #printCanvas { display: none; }
        .order-preview {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .col-name { flex: 1; padding-right: 8px; word-break: break-all; }
        .col-price { width: 90px; text-align: right; }
        .col-total { width: 85px; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="version-tag">v3.1 高速排版版</div>

        <div id="contentArea">📡 加载订单中...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 闪电图像打印 (含Logo+单价)</button>
        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="history.back()">⬅️ 返回上一页</button>
        
        <div id="status" class="status"></div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    // ======================= 🔥 已将冗长的图片代码替换为文字标志 =======================
    const EMBEDDED_LOGO_BASE64 = "";
    
    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDE_N8V-0S_kZp_RE7L3Wz9XW7b8p_lY8A",
        authDomain: "yyk-order.firebaseapp.com",
        projectId: "yyk-order",
        storageBucket: "yyk-order.appspot.com",
        messagingSenderId: "1057476537703",
        appId: "1:1057476537703:web:b1d8481ff2ba37b120c159"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    let currentOrderData = null;
    let customLogoImage = null;
    
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    async function loadOrder() {
        const id = getQueryParam('id');
        if(!id) {
            document.getElementById('contentArea').innerHTML = '<div>❌ 错误：URL中缺少订单ID (?id=xxx)</div>';
            document.getElementById('backBtn').style.display = 'block';
            return false;
        }
        try {
            const doc = await db.collection('orders').doc(id).get();
            if(!doc.exists){
                document.getElementById('contentArea').innerHTML = '<div>❌ 订单不存在</div>';
                document.getElementById('backBtn').style.display = 'block';
                return false;
            }
            const data = doc.data();
            const table = data.table || '未指定';
            const discount = data.discount || 0;
            const note = data.note || '';
            const method = data.method || '未指定';
            const items = data.items || [];
            
            let total = 0;
            items.forEach(item => { total += item.price * item.count; });
            const finalTotal = total - discount;
            
            let itemsHtml = '';
            items.forEach(item => {
                itemsHtml += `
                    <div class="flex-row" style="margin-top:6px;">
                        <span class="col-name">${escapeHtml(item.name)} x${item.count}</span>
                        <span class="col-price">${item.price}</span>
                        <span class="col-total">${item.price * item.count}</span>
                    </div>
                `;
            });
            
            let previewHtml = `
                <div style="font-size:18px; font-weight:bold; color:#ffaa50; text-align:center; margin-bottom:10px;">订单加载成功</div>
                <div><b>桌号：</b>${escapeHtml(table)}</div>
                <div><b>支付方式：</b>${escapeHtml(method)}</div>
                ${note ? `<div><b>备注：</b>${escapeHtml(note)}</div>` : ''}
                <hr>
                <div style="font-weight:bold; opacity:0.8; font-size:12px;" class="flex-row">
                    <span class="col-name">品名/数量</span>
                    <span class="col-price">单价</span>
                    <span class="col-total">小计</span>
                </div>
                <div style="max-height:220px; overflow-y:auto; margin-bottom:4px;">
                    ${itemsHtml}
                </div>
                <hr>
                <div class="flex-row"><span>总计：</span><span>${total}</span></div>
                ${discount > 0 ? `<div class="flex-row" style="color:#f87171;"><span>优惠：</span><span>-${discount}</span></div>` : ''}
                <div class="flex-row" style="font-size:16px; font-weight:bold; color:#4ade80; margin-top:4px;">
                    <span>应收：</span><span>${finalTotal} MMK</span>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = previewHtml;
            document.getElementById('bluetoothBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            
            const now = data.timestamp ? data.timestamp.toDate() : new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            currentOrderData = {table, discount, note, method, items, total, finalTotal, timeStr};
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML = `<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display = 'block';
            return false;
        }
    }
    
    function loadEmbeddedLogo() {
        if(EMBEDDED_LOGO_BASE64 && EMBEDDED_LOGO_BASE64.startsWith('data:image')){
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                customLogoImage = img;
                refreshPrint();
            };
            img.onerror = () => { customLogoImage = null; refreshPrint(); };
            img.src = EMBEDDED_LOGO_BASE64;
        } else {
            customLogoImage = null;
            refreshPrint();
        }
    }
    
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        loadEmbeddedLogo();
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
    }
    
    function escapeHtml(s){ if(!s)return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    
    function refreshPrint() {
        if(!currentOrderData) return;
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';
        
        let y = 10;
        
        // 绘制纯文本 YeYeKao 标志代替原本的 Base64 图像
        ctx.font = 'bold 32px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('YeYeKao', canvas.width / 2, y);
        y += 45;
        
        // 恢复默认排版对齐样式
        ctx.textAlign = 'left';
        ctx.font = '22px "Courier New", monospace';
        
        ctx.fillText(`桌号: ${currentOrderData.table}`, 14, y);
        y += 30;
        ctx.fillText(`时间: ${currentOrderData.timeStr}`, 14, y);
        y += 35;
        
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(12, y); ctx.lineTo(372, y); ctx.stroke();
        y += 15;
        
        ctx.font = '21px "Courier New", monospace';
        currentOrderData.items.forEach(item => {
            ctx.font = 'bold 21px "Courier New", monospace';
            ctx.fillText(item.name, 14, y);
            y += 26;
            
            ctx.font = '20px "Courier New", monospace';
            ctx.fillText(`   x${item.count}`, 14, y);
            
            const priceStr = String(item.price);
            ctx.fillText(priceStr, 220 - ctx.measureText(priceStr).width, y);
            
            const subtotalStr = String(item.price * item.count);
            ctx.fillText(subtotalStr, 370 - ctx.measureText(subtotalStr).width, y);
            y += 30;
        });
        
        y += 5;
        ctx.beginPath(); ctx.moveTo(12, y); ctx.lineTo(372, y); ctx.stroke();
        y += 15;
        
        ctx.font = '22px "Courier New", monospace';
        ctx.fillText(`总计:`, 14, y);
        const totalStr = `${currentOrderData.total}`;
        ctx.fillText(totalStr, 370 - ctx.measureText(totalStr).width, y);
        y += 30;
        
        if(currentOrderData.discount > 0) {
            ctx.fillText(`优惠:`, 14, y);
            const discStr = `-${currentOrderData.discount}`;
            ctx.fillText(discStr, 370 - ctx.measureText(discStr).width, y);
            y += 30;
        }
        
        ctx.font = 'bold 26px "Courier New", monospace';
        ctx.fillText(`应收:`, 14, y);
        const finalStr = `${currentOrderData.finalTotal} MMK`;
        ctx.fillText(finalStr, 370 - ctx.measureText(finalStr).width, y);
        y += 38;
        
        ctx.font = '20px "Courier New", monospace';
        ctx.fillText(`支付方式: ${currentOrderData.method}`, 14, y);
        y += 28;
        
        if(currentOrderData.note) {
            ctx.fillText(`备注: ${currentOrderData.note}`, 14, y);
            y += 30;
        }
        
        y += 10;
        ctx.font = 'italic 20px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('谢谢惠顾，欢迎下次光临！', canvas.width / 2, y);
        y += 40;
        
        const oldHeight = canvas.height;
        if(oldHeight !== y) {
            canvas.height = y;
            refreshPrint();
        }
    }
    
    // 蓝牙打印逻辑保持完全一致
    let printDevice = null;
    let printCharacteristic = null;
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        try {
            if (!printCharacteristic) {
                statusDiv.innerText = "🔍 正在搜索并连接蓝牙打印机...";
                printDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
                });
                const server = await printDevice.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                printCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                statusDiv.innerText = "✅ 打印机连接成功！正在进行闪电图像排版...";
            } else {
                statusDiv.innerText = "⚡ 正在使用已有连接进行闪电打印...";
            }
            
            const canvas = document.getElementById('printCanvas');
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const initCmds = new Uint8Array([0x1B, 0x40, 0x1B, 0x33, 0x00]);
            await sendBufferInChunks(initCmds);
            
            const widthBytes = canvas.width / 8;
            const height = canvas.height;
            
            for (let y = 0; y < height; y++) {
                const rowBytes = new Uint8Array(8 + widthBytes);
                rowBytes[0] = 0x1D; rowBytes[1] = 0x76; rowBytes[2] = 0x30; rowBytes[3] = 0x00;
                rowBytes[4] = widthBytes & 0xFF; rowBytes[5] = (widthBytes >> 8) & 0xFF;
                rowBytes[6] = 1 & 0xFF; rowBytes[7] = (1 >> 8) & 0xFF;
                
                for (let x = 0; x < widthBytes; x++) {
                    let byteVal = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const pixelX = x * 8 + bit;
                        const pixelIdx = (y * canvas.width + pixelX) * 4;
                        const r = imgData.data[pixelIdx];
                        const g = imgData.data[pixelIdx + 1];
                        const b = imgData.data[pixelIdx + 2];
                        const grey = r * 0.299 + g * 0.587 + b * 0.114;
                        if (grey < 128) {
                            byteVal |= (1 << (7 - bit));
                        }
                    }
                    rowBytes[8 + x] = byteVal;
                }
                await sendBufferInChunks(rowBytes);
            }
            
            const feedCmds = new Uint8Array([0x1B, 0x64, 0x05, 0x1D, 0x56, 0x42, 0x00]);
            await sendBufferInChunks(feedCmds);
            statusDiv.innerText = "🎉 闪电图像打印完成！";
            
        } catch (error) {
            statusDiv.innerText = "❌ 打印失败: " + error.message;
            printCharacteristic = null;
        }
    }
    
    async function sendBufferInChunks(buffer) {
        const chunkSize = 20;
        for (let i = 0; i < buffer.length; i += chunkSize) {
            const chunk = buffer.slice(i, i + chunkSize);
            await printCharacteristic.writeValue(chunk);
        }
    }
    
    window.onload = init;
</script>
</body>
</html>
