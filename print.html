<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 标明版本号：v1.1 终极图片打印版 -->
    <title>蓝牙打印 v1.1(图片版) - 夜夜烤烧烤</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.96); }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; }
        /* 隐藏后台画图用的画布 */
        #printCanvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="contentArea">📡 加载订单中...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 智能图像打印 (免字库防乱码)</button>
        <div id="status" class="status"></div>
    </div>
</div>

<!-- 隐藏的画布，专门用来把小票文字画成像素画 -->
<canvas id="printCanvas" width="384"></canvas>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null; // 存储转换后的图片像素字节流

    function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
    function formatNum(n) { return Number(n).toLocaleString(); }

    // 核心更改 v1.1：不再强制过滤语言，图片支持打印任何你能看到的文字
    function cleanText(str) {
        if (!str) return '';
        return str.replace(/[\p{Emoji}\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim();
    }

    // 将小票内容绘制到Canvas并转为热敏打印机点阵数据的核心算法
    function generateReceiptImageBytes(table, discount, note, method, items, total, finalTotal, timeStr) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        // 1. 动态计算画布高度
        let rowHeight = 28;
        let padding = 20;
        let calculatedHeight = padding * 2 + 180 + (items.length * rowHeight);
        if (note) calculatedHeight += 40;
        canvas.height = calculatedHeight;

        // 2. 刷白底，画黑字（热敏全黑白点阵）
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';

        let y = padding;

        // 店名
        ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("夜夜烤烧烤", 192, y);
        y += 36;

        // 小字信息
        ctx.font = '18px "Segoe UI", system-ui, sans-serif';
        ctx.fillText("电话: 123-4567-8901", 192, y); y += 24;
        ctx.fillText("星光美食街8号", 192, y); y += 30;

        // 分割线
        ctx.textAlign = 'left';
        ctx.fillText("------------------------------------------------", 10, y); y += 20;

        // 单据信息
        ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
        ctx.fillText(`桌号：${table}号桌`, 10, y); y += 26;
        ctx.font = '18px "Segoe UI", system-ui, sans-serif';
        ctx.fillText(`时间：${timeStr}`, 10, y); y += 24;
        ctx.fillText(`支付：${method}`, 10, y); y += 24;
        ctx.fillText("------------------------------------------------", 10, y); y += 24;

        // 表头
        ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
        ctx.fillText("菜品名称", 10, y);
        ctx.fillText("数量", 200, y);
        ctx.fillText("金额(Ks)", 290, y);
        y += 28;

        // 菜品列表
        ctx.font = '18px "Segoe UI", system-ui, sans-serif';
        for (let it of items) {
            let name = it.name.length > 10 ? it.name.slice(0, 9) + ".." : it.name;
            ctx.fillText(name, 10, y);
            ctx.fillText(it.qty.toString(), 210, y);
            ctx.fillText(formatNum(it.subtotal), 290, y);
            y += rowHeight;
        }

        ctx.fillText("------------------------------------------------", 10, y); y += 20;
        ctx.fillText(`原价合计：${formatNum(total)} Ks`, 10, y); y += 24;
        if (discount > 0) {
            ctx.fillText(`优惠金额：- ${formatNum(discount)} Ks`, 10, y); y += 24;
        }
        ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
        ctx.fillText(`实收金额：${formatNum(finalTotal)} Ks`, 10, y); y += 30;
        
        ctx.font = '18px "Segoe UI", system-ui, sans-serif';
        if (note) {
            ctx.fillText(`备注：${note}`, 10, y); y += 28;
        }
        ctx.fillText("------------------------------------------------", 10, y); y += 20;
        ctx.textAlign = 'center';
        ctx.fillText("感谢光临，欢迎下次惠顾！", 192, y);

        // 3. 将 Canvas 图案像素转化为打印机能读懂的 ESC/POS GS v 0 纯位图指令流
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [];

        // 位图打印指令头: GS v 0 0 (xL) (xH) (yL) (yH)
        escPosBytes.push(0x1D, 0x76, 0x30, 0x00);
        escPosBytes.push(widthBytes & 0xFF, (widthBytes >> 8) & 0xFF);
        escPosBytes.push(canvas.height & 0xFF, (canvas.height >> 8) & 0xFF);

        // 像素二值化算法（每8个全彩像素点压缩成1个电极开关字节）
        for (let i = 0; i < imgData.data.length; i += 32) {
            let byteVal = 0;
            for (let b = 0; b < 8; b++) {
                let pixelIndex = i + (b * 4);
                let r = imgData.data[pixelIndex];
                let g = imgData.data[pixelIndex + 1];
                let bVal = imgData.data[pixelIndex + 2];
                let brightness = (r + g + bVal) / 3;
                if (brightness < 128) { 
                    byteVal |= (1 << (7 - b)); // 黑色点置1
                }
            }
            escPosBytes.push(byteVal);
        }
        return new Uint8Array(escPosBytes);
    }

    async function sendChunked(characteristic, dataBytes, chunkSize = 20) {
        for (let i = 0; i < dataBytes.length; i += chunkSize) {
            const chunk = dataBytes.slice(i, i + chunkSize);
            await characteristic.writeValue(chunk);
            await new Promise(r => setTimeout(r, 20)); 
        }
    }

    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        if (!navigator.bluetooth) {
            statusDiv.innerText = "❌ 当前浏览器不支持 Web Bluetooth，请使用 Chrome 安卓版。";
            return;
        }
        if (!printDataBytes) {
            statusDiv.innerText = "❌ 图像未生成完毕，请稍后再试";
            return;
        }
        statusDiv.innerText = "🔍 正在搜索打印机...";
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [
                    { services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] },
                    { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }
                ],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 已选择设备，正在连接...";
            const server = await device.gatt.connect();
            let service;
            try {
                service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455');
            } catch(e) {
                service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            }
            const chars = await service.getCharacteristics();
            let writeChar = null;
            for (let c of chars) {
                if (c.properties.write || c.properties.writeWithoutResponse) {
                    writeChar = c;
                    break;
                }
            }
            if (!writeChar) throw new Error("未找到可写入特征");
            statusDiv.innerText = "📄 发送位图数据中（图像打印稍慢，请稍候）...";

            // 1. 初始化
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40]));
            await new Promise(r => setTimeout(r, 50));

            // 2. 发送全自研图像点阵数据包
            await sendChunked(writeChar, printDataBytes, 20);

            // 3. 走纸 3 行以便切纸
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03]));
            
            statusDiv.innerText = "✅ 图像打印完成！";
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "❌ 打印失败: " + err.message;
        }
    }

    window.onload = async function() {
        const table = getQueryParam('table');
        const discount = getQueryParam('discount') || '0';
        let note = getQueryParam('note') || '';
        const method = getQueryParam('method') || '现金';
        const contentDiv = document.getElementById('contentArea');
        const btn = document.getElementById('bluetoothBtn');
        const statusDiv = document.getElementById('status');

        if (!table) {
            contentDiv.innerHTML = '<div>❌ 缺少桌号参数</div>';
            return;
        }

        note = cleanText(note);
        contentDiv.innerHTML = '📡 读取订单中...';
        statusDiv.innerText = '';
        try {
            const snapshot = await db.collection("pending_orders").where("table", "==", table).get();
            if (snapshot.empty) throw new Error(`未找到 ${table} 号桌订单`);

            const docs = snapshot.docs;
            docs.sort((a,b) => (a.data().timestamp?.seconds||0) - (b.data().timestamp?.seconds||0));

            let items = [], total = 0;
            for (const doc of docs) {
                const order = doc.data();
                if (order.items) {
                    for (const it of order.items) {
                        const qty = Number(it.quantity) || 0;
                        const price = Number(it.price) || 0;
                        total += qty * price;
                        let cleanName = cleanText(it.name);
                        if (!cleanName) cleanName = "菜品";
                        items.push({ name: cleanName, qty, price, subtotal: qty*price });
                    }
                }
            }

            const finalTotal = Math.max(0, total - Number(discount));
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            // v1.1 核心更改：直接在后台秘密绘制黑白位图流
            statusDiv.innerText = "🔄 正在渲染高清点阵图像...";
            printDataBytes = generateReceiptImageBytes(table, discount, note, method, items, total, finalTotal, timeStr);

            // 手机前端屏幕预览
            const itemsPreview = items.map(i => `<div>${escapeHtml(i.name)} ×${i.qty}  ${formatNum(i.subtotal)} Ks</div>`).join('');
            contentDiv.innerHTML = `
                <div style="font-size:12px;">
                    <div style="text-align:center; font-weight:bold;">夜夜烤烧烤 (图像预览)</div>
                    <div>桌号: ${escapeHtml(table)}</div>
                    <div>时间: ${timeStr}</div>
                    <hr>
                    ${itemsPreview}
                    <hr>
                    <div>原价: ${formatNum(total)} Ks</div>
                    ${discount>0?`<div>优惠: -${formatNum(discount)} Ks</div>`:''}
                    <div style="font-weight:bold;">实收: ${formatNum(finalTotal)} Ks</div>
                    ${note?`<div>备注: ${escapeHtml(note)}</div>`:''}
                    <div style="text-align:center; margin-top:8px;">感谢光临</div>
                </div>
            `;
            btn.style.display = 'block';
            btn.onclick = bluetoothPrint;
            statusDiv.innerText = "✅ 图像编译成功！可以点击打印";
        } catch (err) {
            console.error(err);
            contentDiv.innerHTML = `<div>❌ 加载失败: ${err.message}</div>`;
        }
    };

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
</script>
</body>
</html>
