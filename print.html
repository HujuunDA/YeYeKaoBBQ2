<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 170, 80, 0.2);
            border: 1px solid #ffaa50;
            color: #ffefcf;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .btn-back {
            background: linear-gradient(120deg, #4b5563, #374151);
            margin-top: 10px;
        }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; word-break: break-word; }
        #printCanvas { display: none; }
        .order-preview {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .col-name { flex: 1; padding-right: 8px; word-break: break-all; }
        .col-price { width: 90px; text-align: right; }
        .col-total { width: 85px; text-align: right; }
    </style>
</head>

    // 辅助函数：处理Canvas文字自动换行
    function drawTextWithWrapping(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split('');
        let line = '';
        let currentY = y;
        
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, currentY);
        return currentY; // 返回当前行最后一行行首的Y坐标
    }

    // 生成小票图像 (全新高速排版引擎)
    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, method, items, total, finalTotal, timeStr } = order;
        
        // 临时绘制用于精确测算高度
        ctx.font = '16px "Segoe UI", sans-serif';
        let calculatedItemsHeight = 0;
        for (let it of items) {
            let itemLines = 1;
            let line = '';
            for (let char of it.name.split('')) {
                if (ctx.measureText(line + char).width > 165) {
                    itemLines++;
                    line = char;
                } else {
                    line += char;
                }
            }
            calculatedItemsHeight += Math.max(28, itemLines * 20) + 6;
        }

        let padding = 12;
        let titleHeight = (logoImg && logoImg.complete && logoImg.naturalWidth > 0) ? ((Math.min(logoImg.naturalWidth, 280) / logoImg.naturalWidth) * logoImg.naturalHeight + 12) : 48;
        let infoHeight = 28 * 4 + 24;
        let headerHeight = 32;
        let summaryHeight = 24 + 24 + 32 + (discount > 0 ? 24 : 0) + (note ? 35 : 0) + 28 + 28;
        
        canvas.height = padding + titleHeight + infoHeight + headerHeight + calculatedItemsHeight + summaryHeight + 20;
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'top';
        let y = padding;
        
        // 绘制Logo或店名
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            const maxLogoWidth = 280;
            let drawWidth = Math.min(logoImg.naturalWidth, maxLogoWidth);
            let drawHeight = (drawWidth / logoImg.naturalWidth) * logoImg.naturalHeight;
            ctx.drawImage(logoImg, (canvas.width - drawWidth) / 2, y, drawWidth, drawHeight);
            y += drawHeight + 10;
        } else {
            ctx.font = 'bold 32px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("夜夜烤烧烤", canvas.width/2, y);
            y += 42;
        }
        
        // 基本信息
        ctx.font = '18px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("📞 电话: 09795858987", canvas.width/2, y); y += 26;
        ctx.textAlign = 'left';
        ctx.font = 'bold 20px "Segoe UI", sans-serif';
        ctx.fillText(`桌号：${table}号桌`, 8, y); y += 28;
        ctx.font = '17px "Segoe UI", sans-serif';
        ctx.fillText(`时间：${timeStr}`, 8, y); y += 24;
        ctx.fillText(`支付：${method}`, 8, y); y += 28;
        ctx.fillText("-------------------------------------------", 4, y); y += 22;
        
        // 新排版表头：品名靠左(6)，单价数量靠右(285)，金额靠右(375)
        ctx.font = 'bold 17px "Segoe UI", sans-serif';
        ctx.textAlign = 'left'; ctx.fillText("品名", 6, y);
        ctx.textAlign = 'right'; ctx.fillText("单价×数量", 285, y);
        ctx.textAlign = 'right'; ctx.fillText("金额(Ks)", 375, y);
        y += 28;
        
        // 动态循环渲染菜品列表
        ctx.font = '16px "Segoe UI", sans-serif';
        for (let it of items) {
            let startY = y;
            ctx.textAlign = 'left';
            // 限制菜品宽度为 165px，超出自动换行，行高 20px
            let lastY = drawTextWithWrapping(ctx, it.name, 6, y, 165, 20);
            
            // 右侧信息对齐首行
            ctx.textAlign = 'right';
            ctx.fillText(`${it.price}×${it.qty}`, 285, startY);
            ctx.fillText(formatNum(it.subtotal), 375, startY);
            
            // 动态累加高度（保留间距）
            y = Math.max(lastY + 20, startY + 28) + 6;
        }
        
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.fillText("-------------------------------------------", 4, y); y += 20;
        ctx.font = '18px sans-serif';
        ctx.fillText(`原价合计：${formatNum(total)} Ks`, 8, y); y += 26;
        if (discount > 0) ctx.fillText(`优惠金额：- ${formatNum(discount)} Ks`, 8, y), y+=26;
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText(`实收金额：${formatNum(finalTotal)} Ks`, 8, y); y += 34;
        ctx.font = '16px sans-serif';
        if (note) ctx.fillText(`备注：${note}`, 8, y), y+=28;
        ctx.fillText("-------------------------------------------", 4, y); y+=20;
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText("感谢光临，欢迎下次惠顾！", canvas.width/2, y);
        
        // 转ESC/POS点阵数据
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00];
        escPosBytes.push(widthBytes & 0xFF, (widthBytes >> 8) & 0xFF);
        escPosBytes.push(canvas.height & 0xFF, (canvas.height >> 8) & 0xFF);
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    let r = imgData.data[pixelIndex];
                    let g = imgData.data[pixelIndex+1];
                    let bl = imgData.data[pixelIndex+2];
                    let brightness = (r+g+bl)/3;
                    if (brightness < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }
    
    // 高速无延迟分片发送
    async function sendChunked(characteristic, dataBytes, chunkSize=120) {
        for (let i=0; i<dataBytes.length; i+=chunkSize) {
            await characteristic.writeValue(dataBytes.slice(i, i+chunkSize));
            // 速度优化：取消2ms的无意义物理等待，由系统底层协议栈自行调度
        }
    }
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        if (!navigator.bluetooth) { statusDiv.innerText = "❌ 浏览器不支持Web Bluetooth"; return; }
        if (!printDataBytes) { statusDiv.innerText = "❌ 图像未生成"; return; }
        statusDiv.innerText = "🔍 正在搜索打印机...";
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 连接中...";
            const server = await device.gatt.connect();
            let service;
            try { service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455'); } catch(e) { service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); }
            const chars = await service.getCharacteristics();
            let writeChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            if (!writeChar) throw new Error("未找到写入特征");
            statusDiv.innerText = "⚡ 打印中...";
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40])); // 初始化
            await new Promise(r=>setTimeout(r,5)); // 缩短等待时间
            await sendChunked(writeChar, printDataBytes, 120);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03])); // 切纸/走纸
            statusDiv.innerText = "✅ 打印完成！";
        } catch(err) { statusDiv.innerText = "❌ 打印失败: "+err.message; }
    }
    
    async function refreshPrint() {
        const statusDiv = document.getElementById('status');
        if (!currentOrderData.items.length) return;
        statusDiv.innerText = "🖌️ 生成小票渲染中...";
        if (customLogoImage && !customLogoImage.complete) await new Promise(r=>{ customLogoImage.onload=r; });
        printDataBytes = generateReceiptImageBytes(currentOrderData, customLogoImage);
        updatePreview();
        statusDiv.innerText = "✅ 小票已就绪";
        document.getElementById('bluetoothBtn').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
    }
    
    function updatePreview() {
        const { table, discount, note, method, items, total, finalTotal, timeStr } = currentOrderData;
        let itemsHtml = items.map(i => `
            <div class="flex-row" style="margin-bottom:8px; font-size:13px;">
                <span class="col-name">${escapeHtml(i.name)}</span>
                <span class="col-price">${i.price}×${i.qty}</span>
                <span class="col-total">${formatNum(i.subtotal)}Ks</span>
            </div>
        `).join('');
        
        document.getElementById('contentArea').innerHTML = `
            <div style="font-size:12px;">
                <div style="text-align:center; font-weight:bold; margin-bottom: 10px;">🧾 订单预览 (高清点阵排版)</div>
                <div>🏷️ 桌号: ${escapeHtml(table)}</div>
                <div>📞 电话: 09795858987</div>
                <div>⏰ ${timeStr}  💳 ${method}</div>
                <hr>
                ${itemsHtml}
                <hr>
                <div>💰 原价: ${formatNum(total)} Ks</div>
                ${discount>0?`<div>🎁 优惠: -${formatNum(discount)} Ks</div>`:''}
                <div style="font-weight:bold; font-size:14px; margin-top:4px;">💵 实收: ${formatNum(finalTotal)} Ks</div>
                ${note?`<div>📝 备注: ${escapeHtml(note)}</div>`:''}
            </div>
        `;
    }
    
    async function loadOrder() {
        const table = getQueryParam('table');
        const discount = Number(getQueryParam('discount')||'0');
        let note = cleanText(getQueryParam('note')||'');
        const method = getQueryParam('method')||'现金';
        if (!table) { document.getElementById('contentArea').innerHTML='<div>❌ 缺少桌号</div>'; return false; }
        try {
            const snapshot = await db.collection("pending_orders").where("table","==",table).get();
            if(snapshot.empty) throw new Error(`未找到${table}号桌订单`);
            let items=[], total=0;
            for(const doc of snapshot.docs){
                const order=doc.data();
                if(order.items){
                    for(const it of order.items){
                        let qty=Number(it.quantity)||0, price=Number(it.price)||0;
                        if(qty===0) continue;
                        let name=cleanText(it.name)||"菜品";
                        let subtotal=qty*price;
                        total+=subtotal;
                        items.push({name, qty, price, subtotal});
                    }
                }
            }
            if(items.length===0) throw new Error("无有效菜品");
            const finalTotal=Math.max(0,total-discount);
            const now=new Date();
            const timeStr=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            currentOrderData={table, discount, note, method, items, total, finalTotal, timeStr};
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML=`<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display='block';
            return false;
        }
    }
    
    function loadEmbeddedLogo() {
        if(EMBEDDED_LOGO_BASE64 && EMBEDDED_LOGO_BASE64.startsWith('data:image')){
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                customLogoImage = img;
                refreshPrint();
            };
            img.onerror = () => { customLogoImage=null; refreshPrint(); };
            img.src = EMBEDDED_LOGO_BASE64;
        } else {
            customLogoImage = null;
            refreshPrint();
        }
    }
    
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        loadEmbeddedLogo();
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
    }
    
    function escapeHtml(s){ if(!s)return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    window.onload = init;
</script>
