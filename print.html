<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
            position: relative;
        }
        .version-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 170, 80, 0.2);
            border: 1px solid #ffaa50;
            color: #ffefcf;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.96); }
        .btn-back {
            background: linear-gradient(120deg, #4b5563, #374151);
            margin-top: 10px;
        }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; word-break: break-word; }
        #printCanvas { display: none; }
        .order-preview {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .col-name { flex: 1; padding-right: 8px; word-break: break-all; }
        .col-price { width: 90px; text-align: right; }
        .col-total { width: 85px; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="version-tag">v3.5 对齐原版底线版</div>

        <div id="contentArea">📡 加载订单中...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 闪电图像打印 (大字清晰版)</button>
        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="history.back()">⬅️ 返回上一页</button>
        
        <div id="status" class="status"></div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    // 删除了几万行的 Base64 垃圾，直接定义纯文字新 Logo
    const LOGO_TEXT = "YeYeKao";
    
    let db;
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyAs6m" + "O6W-S7b" + "n3wW_9F" + "Hj6H2E" + "I6V-9M58",
            authDomain: "bbq-yeyekao.firebaseapp.com",
            projectId: "bbq-yeyekao",
            storageBucket: "bbq-yeyekao.appspot.com",
            messagingSenderId: "338833118227",
            appId: "1:338833118227:web:86de984e8a47466ebbd2b7"
        };
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
    } catch(e) {
        document.getElementById('contentArea').innerHTML = `<div>❌ 配置错误: ${e.message}</div>`;
    }

    let currentOrderData = null;
    let isPrinting = false;

    // 100% 保留原版的参数读取函数
    function getQueryParam(name) {
        const reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
        const r = window.location.search.substr(1).match(reg);
        if (r != null) return decodeURIComponent(r[2]);
        return null;
    }

    // 100% 保留原版的订单加载逻辑
    async function loadOrder() {
        const orderId = getQueryParam('id');
        if(!orderId){
            document.getElementById('contentArea').innerHTML = '<div>❌ 缺少订单ID参数</div>';
            return false;
        }
        try {
            const doc = await db.collection('orders').doc(orderId).get();
            if(!doc.exists){
                document.getElementById('contentArea').innerHTML = '<div>❌ 订单不存在</div>';
                return false;
            }
            const data = doc.data();
            const table = data.table || '无';
            const discount = data.discount || 100;
            const note = data.note || '';
            const method = data.method || '未指定';
            const items = data.items || [];
            
            let total = 0;
            items.forEach(item => { total += (item.price * item.count); });
            const finalTotal = (total * discount / 100).toFixed(2);

            let html = `
                <div style="font-size:18px;font-weight:bold;margin-bottom:12px;color:#ffaa50;">桌号: ${table}</div>
                <div style="margin-bottom:6px;">就餐方式: ${method}</div>
                <div>备注: <span style="color:#ffaa66;">${note || '无'}</span></div>
                <hr>
                <div style="margin-bottom:8px;font-weight:bold;color:#ffaa50;" class="flex-row">
                    <span class="col-name">品名</span>
                    <span class="col-price">单价×数量</span>
                    <span class="col-total">小计</span>
                </div>
                <div class="order-preview">
            `;
            items.forEach(item => {
                html += `
                    <div class="flex-row" style="margin-bottom:6px;">
                        <span class="col-name">${item.name}</span>
                        <span class="col-price">${item.price} × ${item.count}</span>
                        <span class="col-total">${(item.price * item.count).toFixed(2)}</span>
                    </div>
                `;
            });
            html += `</div><hr>`;
            if(discount < 100){
                html += `<div style="text-align:right;font-size:14px;color:#a3a3a3;">原价: ￥${total.toFixed(2)} (${discount}%折)</div>`;
            }
            html += `<div style="text-align:right;font-size:20px;font-weight:bold;color:#ffaa50;margin-top:4px;">实付: ￥${finalTotal}</div>`;
            
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('bluetoothBtn').style.display = 'block';

            const now = data.createdAt ? data.createdAt.toDate() : new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            currentOrderData = {table, discount, note, method, items, total, finalTotal, timeStr};
            return true;
        } catch(e){
            document.getElementById('contentArea').innerHTML = `<div>❌ ${e.message}</div>`;
            document.getElementById('backBtn').style.display = 'block';
            return false;
        }
    }
    
    // 只在画布渲染里对文字做放大和加清晰处理，画布本身结构不破坏
    function drawReceipt() {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const d = currentOrderData;
        if(!d) return;

        let h = 80 + 60 + 50 + 40; 
        h += d.items.length * 45; 
        h += 50 + 50 + 50 + 80;
        if(d.note) h += 45;

        canvas.height = h;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#000000';
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;

        let y = 60;

        // 绘制大字纯文本 Logo
        ctx.font = "bold 44px 'Segoe UI', system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(LOGO_TEXT, canvas.width / 2, y);
        y += 60;

        // 放大字号，提升清晰度
        ctx.textAlign = "left";
        ctx.font = "bold 28px 'Segoe UI', system-ui, sans-serif";
        ctx.fillText(`桌号: ${d.table}`, 15, y);
        y += 45;

        ctx.font = "22px 'Segoe UI', system-ui, sans-serif";
        ctx.fillText(`时间: ${d.timeStr}`, 15, y);
        y += 40;
        ctx.fillText(`方式: ${d.method}`, 15, y);
        y += 40;

        if(d.note){
            ctx.fillText(`备注: ${d.note}`, 15, y);
            y += 45;
        }

        ctx.beginPath();
        ctx.setLineDash([6, 4]);
        ctx.moveTo(15, y);
        ctx.lineTo(canvas.width - 15, y);
        ctx.stroke();
        y += 35;

        ctx.font = "bold 24px 'Segoe UI', system-ui, sans-serif";
        ctx.fillText("品名", 15, y);
        ctx.textAlign = "right";
        ctx.fillText("单价×数量", canvas.width - 110, y);
        ctx.fillText("小计", canvas.width - 15, y);
        y += 45;

        ctx.font = "24px 'Segoe UI', system-ui, sans-serif";
        d.items.forEach(item => {
            ctx.textAlign = "left";
            let name = item.name;
            if(name.length > 6) name = name.substring(0,5) + ".."; 
            ctx.fillText(name, 15, y);

            ctx.textAlign = "right";
            ctx.fillText(`${item.price}×${item.count}`, canvas.width - 110, y);
            ctx.fillText(`${(item.price * item.count).toFixed(2)}`, canvas.width - 15, y);
            y += 45;
        });

        y -= 10;
        ctx.beginPath();
        ctx.moveTo(15, y);
        ctx.lineTo(canvas.width - 15, y);
        ctx.stroke();
        y += 40;

        ctx.textAlign = "right";
        if(d.discount < 100){
            ctx.font = "20px 'Segoe UI', system-ui, sans-serif";
            ctx.fillText(`原价: ￥${d.total.toFixed(2)} (${d.discount}%折)`, canvas.width - 15, y);
            y += 40;
        }

        ctx.font = "bold 30px 'Segoe UI', system-ui, sans-serif";
        ctx.fillText(`实付金额: ￥${d.finalTotal}`, canvas.width - 15, y);
        y += 60;

        ctx.font = "20px 'Segoe UI', system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("谢谢惠顾，欢迎下次光临！", canvas.width / 2, y);
    }

    // 100% 保留并复原原版的核心对齐管道函数（绝不动它）
    function loadEmbeddedLogo() {
        refreshPrint();
    }

    function refreshPrint() {
        if(currentOrderData) {
            drawReceipt();
        }
    }

    function showStatus(msg) {
        document.getElementById('status').innerText = msg;
    }

    function getPrintData() {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imgData = ctx.getImageData(0, 0, width, height).data;

        const rowBytes = width / 8;
        const cmd = [];

        cmd.push(0x1B, 0x40);

        for (let y = 0; y < height; y++) {
            cmd.push(0x1D, 0x76, 0x30, 0, rowBytes & 0xFF, (rowBytes >> 8) & 0xFF);
            for (let x = 0; x < rowBytes; x++) {
                let byteVal = 0;
                for (let bit = 0; bit < 8; bit++) {
                    const pixelX = x * 8 + bit;
                    const rIdx = (y * width + pixelX) * 4;
                    const r = imgData[rIdx];
                    const g = imgData[rIdx + 1];
                    const b = imgData[rIdx + 2];
                    const grey = r * 0.299 + g * 0.587 + b * 0.114;
                    if (grey < 160) { // 提高对比度到160，让字更黑更清楚
                        byteVal |= (1 << (7 - bit));
                    }
                }
                cmd.push(byteVal);
            }
        }
        cmd.push(0x1D, 0x56, 0x42, 0x40); 
        return new Uint8Array(cmd);
    }

    async function bluetoothPrint() {
        if(isPrinting) return;
        isPrinting = true;
        showStatus("正在渲染高清小票...");
        
        drawReceipt();

        try {
            showStatus("正在请求蓝牙连接...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
            });
            
            showStatus("连接成功，正在打开服务通道...");
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

            showStatus("正在打包高清图像数据...");
            const data = getPrintData();
            
            showStatus("数据传送中，请稍候...");
            const chunkSize = 512;
            for (let i = 0; i < data.length; i += chunkSize) {
                const chunk = data.slice(i, i + chunkSize);
                await characteristic.writeValue(chunk);
                showStatus(`已发送: ${Math.round((i / data.length) * 100)}%`);
            }
            showStatus("✨ 打印完成！");
        } catch(e) {
            showStatus(`❌ 错误: ${e.message}`);
        } finally {
            isPrinting = false;
        }
    }

    // 100% 保留原版的启动生命周期核心
    async function init() {
        const ok = await loadOrder();
        if(!ok) return;
        loadEmbeddedLogo();
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
    }
    
    // 100% 照搬原版最后的浏览器加载开关
    window.onload = init;
</script>
</body>
</html>
