<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 夜夜烤烧烤</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- 引入第三方 TextEncoder 库，完美支持浏览器端字符串转 GBK 字节 -->
    <script src="https://fastly.jsdelivr.net/npm/text-encoding@0.7.0/lib/encoding.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 170, 80, 0.5);
            color: #ffefcf;
        }
        .btn {
            background: linear-gradient(120deg, #0284c7, #0369a1);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.96); }
        hr { border-color: rgba(255,180,100,0.3); margin: 12px 0; }
        .status { margin-top: 12px; font-size: 12px; color: #ffaa66; }
        .preview-text { font-size: 12px; line-height: 1.4; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,180,100,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="contentArea">📡 加载订单中...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 蓝牙打印 (仅中文 GBK)</button>
        <div id="status" class="status"></div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentGBKData = null; 

    function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
    function formatNum(n) { return Number(n).toLocaleString(); }

    function keepOnlyChinese(str) {
        if (!str) return '';
        let filtered = str.replace(/[a-zA-Z]/g, '');
        filtered = filtered.replace(/[\p{Emoji}\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        const allowed = /[^\u4e00-\u9fff\u3400-\u4dbf0-9\s\.\:\-\—\,\。\、\：\；\！\？\（\）\【\】\《\》\…\·\-\+\×\÷\%\#\￥\（\）]/g;
        filtered = filtered.replace(allowed, '');
        return filtered.replace(/\s+/g, ' ').trim();
    }

    // 关键修改点：使用专用的编码库转换字符串为真正的 GBK 字节数组
    function stringToGBK(str) {
        return new Promise((resolve) => {
            // 使用引入的 TextEncoder 库进行 gbk 编码
            const encoder = new TextEncoder('gbk', { NONSTANDARD_allowLegacyEncoding: true });
            const gbkBytes = encoder.encode(str);
            resolve(gbkBytes);
        });
    }

    function generatePlainReceipt(table, discount, note, method, items, total, finalTotal, timeStr) {
        let lines = [];
        lines.push("夜夜烤烧烤");
        lines.push("电话 123-4567-8901");
        lines.push("星光美食街8号");
        lines.push("--------------------------------");
        lines.push(`桌号：${table}号桌`);
        lines.push(`时间：${timeStr}`);
        lines.push(`支付：${method}`);
        lines.push("--------------------------------");
        lines.push("菜品名称             数量  金额(Ks)");
        for (let it of items) {
            let name = it.name.length > 18 ? it.name.slice(0, 16) + ".." : it.name;
            // 修复补位：中文在GBK中占2个字节，直接用 padEnd 会导致排版错乱。此处简单用空格衔接
            let line = `${name}  x${it.qty}   ${formatNum(it.subtotal)}`;
            lines.push(line);
        }
        lines.push("--------------------------------");
        lines.push(`原价合计：${formatNum(total)} Ks`);
        if (discount > 0) lines.push(`优惠金额：- ${formatNum(discount)} Ks`);
        lines.push(`实收金额：${formatNum(finalTotal)} Ks`);
        if (note) lines.push(`备注：${note}`);
        lines.push("--------------------------------");
        lines.push("感谢光临，欢迎下次惠顾！");
        lines.push("\n\n\n"); // 留出物理撕纸空间
        return lines.join("\n");
    }

    async function sendChunked(characteristic, dataBytes, chunkSize = 20) {
        console.log(`总字节数: ${dataBytes.length}`);
        // 关键修改点：绝大多数便携式蓝牙打印机的单次接收上限是 20 字节。480 字节太大会造成打印机断开或丢包乱码
        for (let i = 0; i < dataBytes.length; i += chunkSize) {
            const chunk = dataBytes.slice(i, i + chunkSize);
            await characteristic.writeValue(chunk);
            await new Promise(r => setTimeout(r, 20)); // 短暂延迟，防止发太快打印机吃不下
        }
    }

    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        if (!navigator.bluetooth) {
            statusDiv.innerText = "❌ 当前浏览器不支持 Web Bluetooth，请使用 Chrome 安卓版。";
            return;
        }
        if (!currentGBKData) {
            statusDiv.innerText = "❌ 没有可打印的内容，请稍后再试";
            return;
        }
        statusDiv.innerText = "🔍 正在搜索打印机...";
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [
                    { services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] },
                    { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }
                ],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 已选择设备，正在连接...";
            const server = await device.gatt.connect();
            let service;
            try {
                service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455');
            } catch(e) {
                service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            }
            const chars = await service.getCharacteristics();
            let writeChar = null;
            for (let c of chars) {
                if (c.properties.write || c.properties.writeWithoutResponse) {
                    writeChar = c;
                    break;
                }
            }
            if (!writeChar) throw new Error("未找到可写入特征");
            statusDiv.innerText = "📄 发送数据中...";

            // 1. 初始化打印机
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40]));
            await new Promise(r => setTimeout(r, 50));

            // 2. 发送真正的 GBK 数据（改用 20 字节小包发送）
            await sendChunked(writeChar, currentGBKData, 20);

            // 3. 走纸并切纸
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03]));
            
            statusDiv.innerText = "✅ 蓝牙打印完成！";
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "❌ 打印失败: " + err.message;
        }
    }

    window.onload = async function() {
        const table = getQueryParam('table');
        const discount = getQueryParam('discount') || '0';
        let note = getQueryParam('note') || '';
        const method = getQueryParam('method') || '现金';
        const contentDiv = document.getElementById('contentArea');
        const btn = document.getElementById('bluetoothBtn');
        const statusDiv = document.getElementById('status');

        if (!table) {
            contentDiv.innerHTML = '<div>❌ 缺少桌号参数</div>';
            return;
        }

        note = keepOnlyChinese(note);
        contentDiv.innerHTML = '📡 读取订单中...';
        statusDiv.innerText = '';
        try {
            const snapshot = await db.collection("pending_orders").where("table", "==", table).get();
            if (snapshot.empty) throw new Error(`未找到 ${table} 号桌订单`);

            const docs = snapshot.docs;
            docs.sort((a,b) => (a.data().timestamp?.seconds||0) - (b.data().timestamp?.seconds||0));

            let items = [], total = 0;
            for (const doc of docs) {
                const order = doc.data();
                if (order.items) {
                    for (const it of order.items) {
                        const qty = Number(it.quantity) || 0;
                        const price = Number(it.price) || 0;
                        total += qty * price;
                        let cleanName = keepOnlyChinese(it.name);
                        if (!cleanName) cleanName = "菜品";
                        items.push({ name: cleanName, qty, price, subtotal: qty*price });
                    }
                }
            }

            const finalTotal = Math.max(0, total - Number(discount));
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            const plainText = generatePlainReceipt(table, discount, note, method, items, total, finalTotal, timeStr);
            
            statusDiv.innerText = "🔄 编码转换中...";
            currentGBKData = await stringToGBK(plainText);

            const itemsPreview = items.map(i => `<div>${escapeHtml(i.name)} ×${i.qty}  ${formatNum(i.subtotal)} Ks</div>`).join('');
            contentDiv.innerHTML = `
                <div style="font-size:12px;">
                    <div style="text-align:center; font-weight:bold;">夜夜烤烧烤</div>
                    <div>桌号: ${escapeHtml(table)}</div>
                    <div>时间: ${timeStr}</div>
                    <hr>
                    ${itemsPreview}
                    <hr>
                    <div>原价: ${formatNum(total)} Ks</div>
                    ${discount>0?`<div>优惠: -${formatNum(discount)} Ks</div>`:''}
                    <div style="font-weight:bold;">实收: ${formatNum(finalTotal)} Ks</div>
                    ${note?`<div>备注: ${escapeHtml(note)}</div>`:''}
                    <div style="text-align:center; margin-top:8px;">感谢光临</div>
                </div>
            `;
            btn.style.display = 'block';
            btn.onclick = bluetoothPrint;
            statusDiv.innerText = "✅ 数据准备就绪，可点击打印";
        } catch (err) {
            console.error(err);
            contentDiv.innerHTML = `<div>❌ 加载失败: ${err.message}</div>`;
        }
    };

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
</script>
</body>
</html>
