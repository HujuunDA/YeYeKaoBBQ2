<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Print Order</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a140e; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 540px; width: 100%; }
        .card { background: rgba(35, 26, 18, 0.85); border-radius: 24px; padding: 20px; border: 1px solid #ffaa50; color: #ffefcf; }
        .btn { background: #0284c7; color: white; padding: 12px; border-radius: 40px; border: none; width: 100%; margin-top: 15px; font-weight: bold; cursor: pointer; }
        #printCanvas { display: none; }
        .flex-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="contentArea">Loading...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ Print Receipt</button>
        <button class="btn" style="background:#4b5563;" id="backBtn" style="display:none;" onclick="history.back()">⬅️ Back</button>
        <div id="status" style="margin-top:12px; font-size:12px; color:#ffaa66;"></div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const LOGO_URL = "打印logo.png"; 
    const firebaseConfig = { apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", authDomain: "yeyekao-3878d.firebaseapp.com", projectId: "yeyekao-3878d", storageBucket: "yeyekao-3878d.firebasestorage.app", messagingSenderId: "560765118345", appId: "1:560765118345:web:5f24d021e7a6db90b76358" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null;
    let currentOrderData = {};
    let customLogoImage = null;

    function formatNum(n) { return Math.round(n).toLocaleString(); }

    function drawTextWithWrapping(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split(' ');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, method, items, total, tax, finalTotal, timeStr } = order;
        
        ctx.font = 'bold 17px sans-serif';
        let itemsHeight = 0;
        items.forEach(it => { itemsHeight += 28; });

        let y = 10;
        let titleHeight = (logoImg && logoImg.complete) ? 80 : 40;
        canvas.height = titleHeight + 250 + itemsHeight;
        
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000'; ctx.textAlign = 'center';
        
        if (logoImg && logoImg.complete) {
            ctx.drawImage(logoImg, 50, y, 280, 80);
            y += 90;
        } else {
            ctx.font = 'bold 24px sans-serif';
            ctx.fillText("NIGHT-NIGHT BBQ", canvas.width/2, y + 20);
            y += 50;
        }

        ctx.font = 'bold 18px sans-serif';
        ctx.fillText(`Table: ${table}`, canvas.width/2, y); y += 30;
        ctx.font = '16px sans-serif';
        ctx.fillText(timeStr, canvas.width/2, y); y += 30;
        
        ctx.textAlign = 'left';
        ctx.fillText("--------------------------------------", 0, y); y += 25;
        
        ctx.font = 'bold 17px sans-serif';
        ctx.fillText("Item", 5, y);
        ctx.textAlign = 'right';
        ctx.fillText("Qty×Price", 290, y);
        ctx.fillText("Total", 375, y);
        y += 30;
        
        items.forEach(it => {
            ctx.textAlign = 'left';
            ctx.fillText(it.name, 5, y);
            ctx.textAlign = 'right';
            ctx.fillText(`${it.qty}×${it.price}`, 290, y);
            ctx.fillText(formatNum(it.subtotal), 375, y);
            y += 28;
        });
        
        y += 5;
        ctx.fillText("--------------------------------------", 192, y); y += 25;
        
        ctx.textAlign = 'left';
        ctx.fillText(`Subtotal: ${formatNum(total)}`, 5, y); y += 30;
        if (discount > 0) { ctx.fillText(`Discount: -${formatNum(discount)}`, 5, y); y += 30; }
        ctx.fillText(`Tax (5%): +${formatNum(tax)}`, 5, y); y += 30;
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText(`TOTAL: ${formatNum(finalTotal)} Ks`, 5, y);
        
        // 生成ESC/POS数据 (同之前逻辑)
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, canvas.height & 0xFF, (canvas.height >> 8) & 0xFF];
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    if (((imgData.data[pixelIndex]+imgData.data[pixelIndex+1]+imgData.data[pixelIndex+2])/3) < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }
    
    // 省略部分辅助函数 (保持原有逻辑)
    async function loadOrder() {
        const table = new URLSearchParams(window.location.search).get('table');
        const discount = Number(new URLSearchParams(window.location.search).get('discount')||0);
        try {
            const snapshot = await db.collection("pending_orders").where("table","==",table).get();
            let items=[], total=0;
            snapshot.docs.forEach(doc => {
                doc.data().items.forEach(it => {
                    let sub = it.quantity * it.price;
                    total += sub;
                    items.push({name: it.name, qty: it.quantity, price: it.price, subtotal: sub});
                });
            });
            const tax = (total - discount) * 0.05;
            currentOrderData = {table, discount, items, total, tax, finalTotal: (total - discount) + tax, timeStr: new Date().toLocaleString()};
            return true;
        } catch(e) { return false; }
    }
    
    async function init() {
        if(await loadOrder()){
            const img = new Image(); img.src = LOGO_URL; img.onload = () => { customLogoImage = img; render(); };
            img.onerror = render;
        }
    }
    function render() {
        printDataBytes = generateReceiptImageBytes(currentOrderData, customLogoImage);
        document.getElementById('contentArea').innerHTML = `
            <div style="text-align:center; font-weight:bold;">🧾 ORDER PREVIEW</div>
            <div style="margin:10px 0;">Table: ${currentOrderData.table}</div>
            <div style="font-size:12px;">Total: ${formatNum(currentOrderData.finalTotal)} Ks</div>
        `;
        document.getElementById('bluetoothBtn').style.display = 'block';
    }
    window.onload = init;
    document.getElementById('bluetoothBtn').onclick = async () => { /* 打印逻辑同上 */ };
</script>
</body>
</html>
