<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>订单预览</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #2b2b2b; /* 深色背景，突出小票 */
            font-family: 'Courier New', Courier, monospace; /* 小票字体 */
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .receipt-card {
            background: #fffdf5; /* 仿热敏纸颜色 */
            width: 100%;
            max-width: 360px;
            min-height: 500px;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ccc;
        }

        .back-btn {
            background: #eee;
            border: 1px solid #ccc;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: #333;
        }

        .title-text { flex: 1; text-align: center; font-weight: bold; font-size: 16px; }

        .btn-print {
            margin-top: 20px;
            background: #222;
            color: #ffaa66;
            border: 1px solid #ffaa66;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-print:active { background: #333; }

        .status { margin-top: 15px; font-size: 12px; color: #666; text-align: center; }
        hr { border: none; border-top: 1px dashed #ccc; margin: 10px 0; }
        .flex-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="receipt-card">
    <div class="nav-bar">
        <button class="back-btn" onclick="history.back()">返回</button>
        <div class="title-text">订单预览</div>
    </div>
    
    <div id="contentArea">📡 加载中...</div>
    
    <button class="btn-print" id="bluetoothBtn" style="display:none;">确认打印</button>
    <div id="status" class="status"></div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const LOGO_URL = "打印logo.png"; 
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null;
    let currentOrderData = { table: '', discount: 0, note: '', items: [], total: 0, tax: 0, finalTotal: 0, timeStr: '' };
    let customLogoImage = null;

    function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
    function formatNum(n) { return Math.round(n).toLocaleString(); } 
    function cleanText(str) { return !str ? '' : str.replace(/[\p{Emoji}\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim(); }

    // (省略绘图逻辑，保持与之前版本一致，无需修改)
    function drawTextWithWrapping(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split('');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n];
                currentY += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, items, total, tax, finalTotal, timeStr } = order;
        
        ctx.font = 'bold 17px "Segoe UI", sans-serif';
        let calculatedItemsHeight = 0;
        for (let it of items) {
            let itemLines = 1;
            let line = '';
            for (let char of it.name.split('')) {
                if (ctx.measureText(line + char).width > 165) { itemLines++; line = char; } else { line += char; }
            }
            calculatedItemsHeight += Math.max(26, itemLines * 22) + 6;
        }

        let padding = 12;
        let titleHeight = (logoImg && logoImg.complete && logoImg.naturalWidth > 0) ? ((Math.min(logoImg.naturalWidth, 280) / logoImg.naturalWidth) * logoImg.naturalHeight + 12) : 40;
        let infoHeight = 26 * 3 + 16;
        let summaryHeight = 24 + 24 + 26 + 36 + (discount > 0 ? 24 : 0) + (note ? 32 : 0) + 24 + 24;
        
        canvas.height = padding + titleHeight + infoHeight + 28 + calculatedItemsHeight + summaryHeight + 30;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000'; ctx.textBaseline = 'top';
        let y = padding;
        
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            const drawWidth = Math.min(logoImg.naturalWidth, 280);
            const drawHeight = (drawWidth / logoImg.naturalWidth) * logoImg.naturalHeight;
            ctx.drawImage(logoImg, (canvas.width - drawWidth) / 2, y, drawWidth, drawHeight);
            y += drawHeight + 12;
        } else {
            ctx.font = 'bold 28px "Segoe UI", sans-serif';
            ctx.textAlign = 'center'; ctx.fillText("夜夜烤烧烤", canvas.width/2, y); y += 38;
        }
        
        ctx.font = 'bold 17px "Segoe UI", sans-serif';
        ctx.textAlign = 'center'; ctx.fillText("📞 09795858987", canvas.width/2, y); y += 26;
        ctx.textAlign = 'left';
        ctx.font = 'bold 22px "Segoe UI", sans-serif'; 
        ctx.fillText(`Table: ${table}`, 6, y); y += 32;
        ctx.font = 'bold 16px "Segoe UI", sans-serif';
        ctx.fillText(`Time: ${timeStr}`, 6, y); y += 24;
        
        ctx.font = 'bold 16px monospace';
        ctx.fillText("--------------------------------------", 4, y); y += 18;
        
        ctx.font = 'bold 17px "Segoe UI", sans-serif';
        ctx.textAlign = 'left'; ctx.fillText("Item", 6, y);
        ctx.textAlign = 'right'; ctx.fillText("Price×Qty", 280, y); 
        ctx.textAlign = 'right'; ctx.fillText("Amt", 378, y); y += 26;
        
        for (let it of items) {
            let startY = y;
            ctx.textAlign = 'left';
            let lastY = drawTextWithWrapping(ctx, it.name, 6, y, 165, 22);
            ctx.textAlign = 'right';
            ctx.fillText(`${it.price}×${it.qty}`, 280, startY);
            ctx.fillText(formatNum(it.subtotal), 378, startY);
            y = Math.max(lastY + 22, startY + 26) + 6;
        }
        
        ctx.font = 'bold 16px monospace';
        ctx.fillText("--------------------------------------", 4, y); y += 18;
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText(`Subtotal: ${formatNum(total)} Ks`, 6, y); y += 26;
        if (discount > 0) { ctx.fillText(`Discount: - ${formatNum(discount)} Ks`, 6, y); y += 26; }
        ctx.fillText(`Tax (5%): + ${formatNum(tax)} Ks`, 6, y); y += 26;
        ctx.font = 'bold 23px sans-serif'; 
        ctx.fillText(`Final: ${formatNum(finalTotal)} Ks`, 6, y); y += 34;
        ctx.font = 'bold 17px sans-serif';
        if (note) { ctx.fillText(`Note: ${note}`, 6, y); y += 26; }
        ctx.font = 'bold 16px monospace';
        ctx.fillText("--------------------------------------", 4, y); y += 18;
        ctx.textAlign = 'center'; ctx.font = 'bold 18px sans-serif'; 
        ctx.fillText("Thank you!", canvas.width/2, y);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, canvas.height & 0xFF, (canvas.height >> 8) & 0xFF];
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    let r = imgData.data[pixelIndex], g = imgData.data[pixelIndex+1], bl = imgData.data[pixelIndex+2];
                    if ((r+g+bl)/3 < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            let service;
            try { service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455'); } catch(e) { service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); }
            const writeChar = (await service.getCharacteristics()).find(c => c.properties.write || c.properties.writeWithoutResponse);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            
            // 发送数据
            for (let i=0; i<printDataBytes.length; i+=240) await writeChar.writeValue(printDataBytes.slice(i, i+240));
            
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03])); 
            statusDiv.innerText = "✅ 打印完成";
        } catch(err) { statusDiv.innerText = "❌ 错误: "+err.message; }
    }
    
    async function init() {
        // 加载逻辑保持不变...
        const table = getQueryParam('table');
        if (!table) { document.getElementById('contentArea').innerHTML='❌ 未找到订单'; return; }
        
        const snapshot = await db.collection("pending_orders").where("table","==",table).get();
        if(snapshot.empty) { document.getElementById('contentArea').innerHTML='❌ 订单为空'; return; }
        
        let items=[], total=0;
        snapshot.forEach(doc=>{
            const order=doc.data();
            if(order.items) order.items.forEach(it=>{
                let qty=Number(it.quantity)||0, price=Number(it.price)||0;
                if(qty>0) { total += qty*price; items.push({name: cleanText(it.name), qty, price, subtotal: qty*price}); }
            });
        });
        const tax = total * 0.05;
        currentOrderData = { table, discount: 0, note: '', items, total, tax, finalTotal: total+tax, timeStr: new Date().toLocaleString() };
        
        // 渲染页面
        document.getElementById('contentArea').innerHTML = `
            <div style="margin-bottom:10px; border-bottom:1px solid #ccc; padding-bottom:5px;">
                <strong>桌号: ${table}</strong><br>
                <small>${currentOrderData.timeStr}</small>
            </div>
            ${items.map(i=>`<div class="flex-row"><span>${i.name} x${i.qty}</span><span>${i.subtotal}Ks</span></div>`).join('')}
            <hr>
            <div class="flex-row"><span>合计:</span><span>${total}Ks</span></div>
            <div class="flex-row"><span>税费(5%):</span><span>${tax}Ks</span></div>
            <div class="flex-row" style="font-weight:bold; font-size:16px;"><span>应付:</span><span>${currentOrderData.finalTotal}Ks</span></div>
        `;
        document.getElementById('bluetoothBtn').style.display = 'block';
        document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
        
        // 生成图片数据
        if (LOGO_URL) {
            const img = new Image(); img.crossOrigin = 'Anonymous';
            img.onload = () => { customLogoImage = img; printDataBytes = generateReceiptImageBytes(currentOrderData, img); };
            img.onerror = () => { printDataBytes = generateReceiptImageBytes(currentOrderData, null); };
            img.src = LOGO_URL + "?t=" + Date.now();
        } else { printDataBytes = generateReceiptImageBytes(currentOrderData, null); }
    }
    
    window.onload = init;
</script>
</body>
</html>
