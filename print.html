<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蓝牙打印 - 烧烤店小票系统</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: radial-gradient(circle at 30% 10%, #2a2218, #1a140e, #0f0b07);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 540px; width: 100%; position: relative; }
        .card {
            background: rgba(35, 26, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 25px;
            border: 1px solid rgba(255, 170, 80, 0.3);
            color: #ffefcf;
        }
        .btn {
            background: #ffaa50;
            color: #1a140e;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s linear;
        }
        .btn:active { transform: scale(0.98); }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: #ffefcf;
            margin-top: 10px;
        }
        hr { border: 0; border-top: 1px dashed rgba(255,180,100,0.3); margin: 15px 0; }
        .status { margin-top: 15px; font-size: 12px; color: #ffaa66; text-align: center; }
        #printCanvas { display: none; }
        .flex-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .col-name { flex: 1; padding-right: 8px; word-break: break-all; }
        .col-price { width: 100px; text-align: right; }
        .col-total { width: 95px; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="contentArea">📡 Loading...</div>
        <button class="btn" id="bluetoothBtn" style="display:none;">🖨️ 确认并打印小票</button>
        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="history.back()">⬅️ 返回</button>
        <div id="status" class="status"></div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const LOGO_URL = "打印logo.png"; 
    const firebaseConfig = { 
        apiKey: "AIzaSyAQGZJpFrveak_gvga6Q8Q5MbxlDVVsxXE", 
        authDomain: "yeyekao-3878d.firebaseapp.com", 
        projectId: "yeyekao-3878d", 
        storageBucket: "yeyekao-3878d.firebasestorage.app", 
        messagingSenderId: "560765118345", 
        appId: "1:560765118345:web:5f24d021e7a6db90b76358" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let printDataBytes = null;
    let currentOrderData = { table: '', discount: 0, note: '', items: [], total: 0, tax: 0, finalTotal: 0, timeStr: '' };
    let customLogoImage = null;

    function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
    function formatNum(n) { return Math.round(n).toLocaleString(); } 
    function cleanText(str) { return str ? str.replace(/[\p{Emoji}\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').trim() : ''; }

    function drawTextWithWrapping(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split('');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n];
                currentY += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    function generateReceiptImageBytes(order, logoImg) {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const { table, discount, note, items, total, tax, finalTotal, timeStr } = order;
        
        ctx.font = 'bold 17px sans-serif';
        let calculatedItemsHeight = 0;
        for (let it of items) {
            let itemLines = 1;
            let line = '';
            for (let char of it.name.split('')) {
                if (ctx.measureText(line + char).width > 165) { itemLines++; line = char; } else { line += char; }
            }
            calculatedItemsHeight += Math.max(26, itemLines * 22) + 6;
        }

        let padding = 12;
        let titleHeight = (logoImg && logoImg.complete && logoImg.naturalWidth > 0) ? ((Math.min(logoImg.naturalWidth, 280) / logoImg.naturalWidth) * logoImg.naturalHeight + 12) : 40;
        let infoHeight = 26 * 3 + 16;
        let headerHeight = 28;
        let summaryHeight = 24 + 24 + 26 + 36 + (discount > 0 ? 24 : 0) + (note ? 32 : 0) + 24 + 24;
        
        canvas.height = padding + titleHeight + infoHeight + headerHeight + calculatedItemsHeight + summaryHeight + 30;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000'; ctx.textBaseline = 'top';
        let y = padding;
        
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            let drawWidth = Math.min(logoImg.naturalWidth, 280);
            let drawHeight = (drawWidth / logoImg.naturalWidth) * logoImg.naturalHeight;
            ctx.drawImage(logoImg, (canvas.width - drawWidth) / 2, y, drawWidth, drawHeight);
            y += drawHeight + 12;
        } else { ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center'; ctx.fillText("夜夜烤烧烤", canvas.width/2, y); y += 38; }
        
        ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center'; ctx.fillText("📞 09795858987", canvas.width/2, y); y += 26;
        ctx.textAlign = 'left'; ctx.font = 'bold 22px sans-serif'; ctx.fillText(`Table: ${table}`, 6, y); y += 32;
        ctx.font = 'bold 16px sans-serif'; ctx.fillText(`Time: ${timeStr}`, 6, y); y += 24;
        ctx.font = 'bold 16px monospace'; ctx.fillText("--------------------------------------", 4, y); y += 18;
        
        ctx.font = 'bold 17px sans-serif';
        ctx.textAlign = 'left'; ctx.fillText("Item", 6, y); ctx.textAlign = 'right'; ctx.fillText("Price × Qty", 280, y); ctx.textAlign = 'right'; ctx.fillText("Amt", 378, y); y += 26;
        
        for (let it of items) {
            let startY = y;
            ctx.textAlign = 'left';
            let lastY = drawTextWithWrapping(ctx, it.name, 6, y, 165, 22);
            ctx.textAlign = 'right'; ctx.fillText(`${it.price}×${it.qty}`, 280, startY); ctx.fillText(formatNum(it.subtotal), 378, startY);
            y = Math.max(lastY + 22, startY + 26) + 6;
        }
        
        ctx.font = 'bold 16px monospace'; ctx.fillText("--------------------------------------", 4, y); y += 18;
        ctx.font = 'bold 18px sans-serif'; ctx.fillText(`Subtotal: ${formatNum(total)} Ks`, 6, y); y += 26;
        if (discount > 0) { ctx.fillText(`Discount: - ${formatNum(discount)} Ks`, 6, y); y += 26; }
        ctx.fillText(`Tax (5%): + ${formatNum(tax)} Ks`, 6, y); y += 26;
        ctx.font = 'bold 23px sans-serif'; ctx.fillText(`Final: ${formatNum(finalTotal)} Ks`, 6, y); y += 34;
        if (note) { ctx.font = 'bold 17px sans-serif'; ctx.fillText(`Note: ${note}`, 6, y); y += 26; }
        
        ctx.font = 'bold 16px monospace'; ctx.fillText("--------------------------------------", 4, y); y += 18;
        ctx.textAlign = 'center'; ctx.font = 'bold 18px sans-serif'; ctx.fillText("Thank you!", canvas.width/2, y);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const widthBytes = canvas.width / 8;
        const escPosBytes = [0x1D, 0x76, 0x30, 0x00, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, canvas.height & 0xFF, (canvas.height >> 8) & 0xFF];
        let pixelIndex = 0;
        for (let h = 0; h < canvas.height; h++) {
            for (let w = 0; w < widthBytes; w++) {
                let byteVal = 0;
                for (let b = 0; b < 8; b++) {
                    let brightness = (imgData.data[pixelIndex]+imgData.data[pixelIndex+1]+imgData.data[pixelIndex+2])/3;
                    if (brightness < 128) byteVal |= (1 << (7-b));
                    pixelIndex += 4;
                }
                escPosBytes.push(byteVal);
            }
        }
        return new Uint8Array(escPosBytes);
    }
    
    async function sendChunked(characteristic, dataBytes, chunkSize=240) {
        for (let i=0; i<dataBytes.length; i+=chunkSize) await characteristic.writeValue(dataBytes.slice(i, i+chunkSize));
    }
    
    async function bluetoothPrint() {
        const statusDiv = document.getElementById('status');
        try {
            statusDiv.innerText = "🔍 寻找打印机...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['49535343-fe7d-4ae5-8fa9-9fafd205e455'] }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                optionalServices: ['49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
            });
            statusDiv.innerText = "✅ 连接中...";
            const server = await device.gatt.connect();
            let service = await server.getPrimaryService('49535343-fe7d-4ae5-8fa9-9fafd205e455').catch(()=>server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'));
            const chars = await service.getCharacteristics();
            let writeChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            statusDiv.innerText = "⚡ 打印中...";
            await writeChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            await sendChunked(writeChar, printDataBytes, 240);
            await writeChar.writeValue(new Uint8Array([0x1B, 0x64, 0x03])); 
            statusDiv.innerText = "✅ 打印完成！";
        } catch(err) { statusDiv.innerText = "❌ 错误: "+err.message; }
    }
    
    function updatePreview() {
        const { table, discount, note, items, total, tax, finalTotal, timeStr } = currentOrderData;
        let itemsHtml = items.map(i => `<div class="flex-row" style="margin-bottom:8px; font-size:13px;"><span class="col-name">${escapeHtml(i.name)}</span><span class="col-price">${i.price}×${i.qty}</span><span class="col-total">${formatNum(i.subtotal)}Ks</span></div>`).join('');
        document.getElementById('contentArea').innerHTML = `
            <div style="font-size:12px;">
                <div style="text-align:center; font-weight:bold; margin-bottom: 10px; font-size:16px;">🧾 订单预览</div>
                <div>🏷️ Table: ${escapeHtml(table)}</div>
                <div>⏰ ${timeStr}</div><hr>
                ${itemsHtml}<hr>
                <div>💰 小计: ${formatNum(total)} Ks</div>
                ${discount>0?`<div>🎁 折扣: -${formatNum(discount)} Ks</div>`:''}
                <div style="color: #ffaa66;">📊 税费 (5%): +${formatNum(tax)} Ks</div>
                <div style="font-weight:bold; font-size:16px; margin-top:8px;">💵 总计: ${formatNum(finalTotal)} Ks</div>
                ${note?`<div>📝 备注: ${escapeHtml(note)}</div>`:''}
            </div>
        `;
    }
    
    async function loadOrder() {
        const table = getQueryParam('table');
        if (!table) return false;
        try {
            const snapshot = await db.collection("pending_orders").where("table","==",table).get();
            let items=[], total=0;
            snapshot.docs.forEach(doc => {
                (doc.data().items||[]).forEach(it => {
                    let qty=Number(it.quantity)||0, price=Number(it.price)||0;
                    if(qty>0) { total += qty*price; items.push({name: cleanText(it.name), qty, price, subtotal: qty*price}); }
                });
            });
            const baseAmount = Math.max(0, total - Number(getQueryParam('discount')||'0'));
            currentOrderData={table, discount: Number(getQueryParam('discount')||'0'), note: cleanText(getQueryParam('note')||''), items, total, tax: baseAmount*0.05, finalTotal: baseAmount*1.05, timeStr: new Date().toLocaleString()};
            return true;
        } catch(e){ return false; }
    }
    
    async function init() {
        if(await loadOrder()) {
            const img = new Image(); img.crossOrigin = 'Anonymous';
            img.onload = () => { customLogoImage = img; printDataBytes = generateReceiptImageBytes(currentOrderData, img); updatePreview(); document.getElementById('bluetoothBtn').style.display='block'; document.getElementById('backBtn').style.display='block'; };
            img.onerror = () => { printDataBytes = generateReceiptImageBytes(currentOrderData, null); updatePreview(); document.getElementById('bluetoothBtn').style.display='block'; document.getElementById('backBtn').style.display='block'; };
            img.src = LOGO_URL + "?t=" + new Date().getTime();
            document.getElementById('bluetoothBtn').addEventListener('click', bluetoothPrint);
        }
    }
    function escapeHtml(s){ return (s||'').replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    window.onload = init;
</script>
</body>
</html>
